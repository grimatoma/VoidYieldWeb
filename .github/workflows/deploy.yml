name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_BASE_URL: /VoidYieldWeb/

      - name: Copy design mocks into dist
        run: |
          mkdir -p dist/mocks
          cp -r docs/design_mocks/. dist/mocks/
          cp design_mocks/home.html dist/mocks/
          cp design_mocks/29_standard_menu_console.html dist/mocks/
          mkdir -p dist/assets/fonts
          cp assets/fonts/VoidYieldTerminal.ttf dist/assets/fonts/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment

      - name: Write deployment links
        run: |
          {
            echo "## Deployment Links"
            echo ""
            echo "- Site: ${{ steps.deployment.outputs.page_url }}"
            echo "- Review home: ${{ steps.deployment.outputs.page_url }}mocks/home.html"
            echo "- Mocks index: ${{ steps.deployment.outputs.page_url }}mocks/"
            echo "- Standard menu console: ${{ steps.deployment.outputs.page_url }}mocks/29_standard_menu_console.html"
          } >> "$GITHUB_STEP_SUMMARY"

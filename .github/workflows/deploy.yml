name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_BASE_URL: /VoidYieldWeb/

      - name: Stage docs, mocks, and hub manifest into dist
        run: |
          set -euo pipefail
          mkdir -p dist/docs dist/mocks dist/assets/fonts

          # Regenerate the unified-hub manifest from the current filesystem
          # so the sidebar always reflects what was just shipped.
          node scripts/gen_hub_manifest.mjs

          # Full docs tree (markdown, hub index, hub manifest, phase-1 HTML mocks).
          cp -r docs/. dist/docs/

          # Full mocks tree (28 SVG screen mocks, HTML mockups, ui/ studies).
          cp -r design_mocks/. dist/mocks/

          # Pixel font for the hub + legacy pages.
          cp assets/fonts/VoidYieldTerminal.ttf dist/assets/fonts/

          # Disable Jekyll so files starting with '_' (e.g. _shared.md) ship as-is.
          touch dist/.nojekyll

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment

      - name: Write deployment links
        run: |
          {
            echo "## Deployment Links"
            echo ""
            echo "- Game: ${{ steps.deployment.outputs.page_url }}"
            echo "- **Docs &amp; Mocks Hub: ${{ steps.deployment.outputs.page_url }}docs/**"
            echo "- Mocks gallery (deep link): ${{ steps.deployment.outputs.page_url }}docs/#section=mocks"
            echo "- Specs gallery (deep link): ${{ steps.deployment.outputs.page_url }}docs/#section=specs"
            echo "- Game Design (deep link): ${{ steps.deployment.outputs.page_url }}docs/#path=docs/GAME_DESIGN.md"
            echo "- Legacy mocks index: ${{ steps.deployment.outputs.page_url }}mocks/"
            echo "- Legacy review home: ${{ steps.deployment.outputs.page_url }}mocks/home.html"
            echo "- Standard menu console: ${{ steps.deployment.outputs.page_url }}mocks/29_standard_menu_console.html"
          } >> "$GITHUB_STEP_SUMMARY"

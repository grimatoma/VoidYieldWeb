<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoidYield</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      /* Lock html as well — body:overflow:hidden alone isn't enough on iOS
         Safari, where 100vh > window.innerHeight (it includes the collapsed
         URL-bar area), so body ends up taller than the visible viewport and
         html scrolls. */
      html { overflow: hidden; width: 100%; height: 100%; overscroll-behavior: none; }
      body {
        background: #0D1B3E;
        overflow: hidden;
        width: 100%;
        height: 100%;
        /* Dynamic viewport units where supported — resilient to the mobile
           URL bar showing/hiding. Falls back to 100% above. */
        width: 100dvw;
        height: 100dvh;
        overscroll-behavior: none;
      }
      #game-container { width: 100%; height: 100%; overflow: hidden; }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="ui-layer"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

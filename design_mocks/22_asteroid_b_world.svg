<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" shape-rendering="crispEdges" font-family="monospace">
  <!-- Deep space background -->
  <rect width="960" height="540" fill="#06060e"/>
  <!-- stars -->
  <rect x="50"  y="30"  width="1" height="1" fill="#d4a843" fill-opacity="0.6"/>
  <rect x="150" y="60"  width="1" height="1" fill="#a88a4a" fill-opacity="0.4"/>
  <rect x="850" y="50"  width="2" height="2" fill="#d4a843" fill-opacity="0.5"/>
  <rect x="900" y="200" width="1" height="1" fill="#5a8fa8" fill-opacity="0.5"/>
  <rect x="480" y="20"  width="1" height="1" fill="#d4a843" fill-opacity="0.5"/>
  <rect x="680" y="70"  width="1" height="1" fill="#d4a843" fill-opacity="0.6"/>
  <rect x="30"  y="440" width="1" height="1" fill="#d4a843" fill-opacity="0.4"/>
  <rect x="920" y="420" width="1" height="1" fill="#a88a4a" fill-opacity="0.3"/>
  <rect x="320" y="55"  width="1" height="1" fill="#a88a4a" fill-opacity="0.4"/>

  <!-- ========== GAME WORLD (y=40 to 516) ========== -->
  <!-- Terrain: blue-grey crystal asteroid -->
  <rect x="0" y="40" width="960" height="476" fill="#1a1c28"/>
  <rect x="0" y="40" width="960" height="3"   fill="#13141e"/>
  <!-- subtle terrain variation patches -->
  <rect x="50"  y="60"  width="90"  height="60" fill="#1c1e2c" fill-opacity="0.5"/>
  <rect x="580" y="80"  width="130" height="70" fill="#1e2030" fill-opacity="0.4"/>
  <rect x="760" y="360" width="110" height="80" fill="#1c1e2c" fill-opacity="0.4"/>
  <rect x="200" y="300" width="80"  height="50" fill="#181a26" fill-opacity="0.4"/>
  <!-- crystal vein lines (passive scenery) -->
  <rect x="70"  y="180" width="160" height="1" fill="#2a4060" fill-opacity="0.5"/>
  <rect x="390" y="290" width="220" height="1" fill="#2a4060" fill-opacity="0.35"/>
  <rect x="700" y="190" width="130" height="1" fill="#2a4060" fill-opacity="0.45"/>

  <!-- Decorative crystal formations (non-interactive) -->
  <!-- top-right formation -->
  <g transform="translate(830,65)">
    <polygon points="10,0 1,22 19,22"  fill="#1e3050" stroke="#3a6080" stroke-width="1"/>
    <polygon points="22,5 14,24 30,24" fill="#1e3050" stroke="#3a6080" stroke-width="1"/>
    <polygon points="4,10 0,24 8,24"   fill="#162840" stroke="#3a6080" stroke-width="1"/>
    <rect x="9" y="2" width="2" height="5" fill="#8fc0d8" fill-opacity="0.45"/>
  </g>
  <!-- far-left formation -->
  <g transform="translate(36,185)">
    <polygon points="10,0 0,26 20,26"  fill="#1e3050" stroke="#3a6080" stroke-width="1"/>
    <polygon points="22,7 16,26 28,26" fill="#1e3050" stroke="#3a6080" stroke-width="1"/>
    <rect x="9" y="2" width="2" height="5" fill="#8fc0d8" fill-opacity="0.3"/>
  </g>
  <!-- bottom-right formation -->
  <g transform="translate(878,340)">
    <polygon points="9,0 2,18 16,18" fill="#1e3050" stroke="#3a6080" stroke-width="1"/>
    <rect x="8" y="2" width="2" height="4" fill="#8fc0d8" fill-opacity="0.3"/>
  </g>

  <!-- ========== CRYSTAL ORE NODE A (active) ========== -->
  <g transform="translate(178,155)">
    <!-- shadow -->
    <ellipse cx="16" cy="34" rx="16" ry="4" fill="#000000" fill-opacity="0.25"/>
    <!-- crystal cluster sprite -->
    <polygon points="16,0  5,22 27,22"  fill="#2a6080" stroke="#5a8fa8" stroke-width="1"/>
    <polygon points="9,6   1,26 17,26"  fill="#1e4860" stroke="#5a8fa8" stroke-width="1"/>
    <polygon points="23,4 15,24 31,24"  fill="#244070" stroke="#5a8fa8" stroke-width="1"/>
    <!-- highlight facets -->
    <rect x="14" y="2"  width="3" height="7" fill="#8fc0d8" fill-opacity="0.5"/>
    <rect x="9"  y="8"  width="2" height="4" fill="#8fc0d8" fill-opacity="0.3"/>
    <!-- mineable health bar -->
    <rect x="0"  y="30" width="34" height="4" fill="#15151a" stroke="#4a4a50"/>
    <rect x="1"  y="31" width="32" height="2" fill="#5a8fa8"/>
    <!-- interaction prompt -->
    <g transform="translate(-10,-28)">
      <rect width="72" height="16" fill="#1a1a1d" fill-opacity="0.92" stroke="#d4a843" stroke-width="1"/>
      <polygon points="34,16 38,22 42,16" fill="#1a1a1d" stroke="#d4a843" stroke-width="1"/>
      <rect x="4" y="3" width="12" height="10" fill="#2a2a2e" stroke="#d4a843"/>
      <text x="7"  y="12" fill="#d4a843" font-size="7">E</text>
      <text x="20" y="12" fill="#d4a843" font-size="8">MINE</text>
    </g>
  </g>

  <!-- ========== CRYSTAL ORE NODE B (depleted / respawning) ========== -->
  <g transform="translate(432,222)" opacity="0.6">
    <ellipse cx="12" cy="28" rx="12" ry="3" fill="#000000" fill-opacity="0.2"/>
    <polygon points="12,4 3,22 21,22"  fill="#1e4060" stroke="#3a5878" stroke-width="1"/>
    <polygon points="8,8  2,22 14,22"  fill="#18304a" stroke="#3a5878" stroke-width="1"/>
    <rect x="0"  y="26" width="26" height="4" fill="#15151a" stroke="#4a4a50"/>
    <rect x="1"  y="27" width="4"  height="2" fill="#5a8fa8"/>
    <text x="-8" y="42" fill="#4a4a50" font-size="7">RESPAWN 8s</text>
  </g>

  <!-- ========== RELAY STATION ========== -->
  <g transform="translate(636,112)">
    <!-- base platform -->
    <rect x="0"  y="80" width="88" height="14" fill="#2a2a2e" stroke="#4a4a50" stroke-width="2"/>
    <rect x="4"  y="82" width="3"  height="3"  fill="#d4a843"/>
    <rect x="81" y="82" width="3"  height="3"  fill="#d4a843"/>
    <!-- equipment body -->
    <rect x="18" y="42" width="52" height="40" fill="#2a2a2e" stroke="#4a4a50" stroke-width="2"/>
    <rect x="20" y="44" width="3"  height="3"  fill="#d4a843"/>
    <rect x="65" y="44" width="3"  height="3"  fill="#d4a843"/>
    <rect x="20" y="76" width="3"  height="3"  fill="#d4a843"/>
    <rect x="65" y="76" width="3"  height="3"  fill="#d4a843"/>
    <!-- antenna mast -->
    <rect x="40" y="0"  width="8"  height="44" fill="#3a3a40"/>
    <!-- cross-arms -->
    <rect x="14" y="10" width="60" height="4"  fill="#4a4a50"/>
    <rect x="22" y="24" width="44" height="3"  fill="#4a4a50"/>
    <!-- signal LEDs -->
    <rect x="12" y="8"  width="4" height="4" fill="#7cb87c"/>
    <rect x="72" y="8"  width="4" height="4" fill="#7cb87c" fill-opacity="0.5"/>
    <rect x="28" y="22" width="3" height="3" fill="#d4a843" fill-opacity="0.7"/>
    <!-- signal rings -->
    <circle cx="44" cy="4" r="7"  fill="none" stroke="#7cb87c" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="44" cy="4" r="14" fill="none" stroke="#7cb87c" stroke-opacity="0.15" stroke-width="1"/>
    <!-- screen on body -->
    <rect x="22" y="48" width="24" height="16" fill="#15151a" stroke="#4a4a50"/>
    <rect x="22" y="50" width="24" height="1"  fill="#d4a843" fill-opacity="0.1"/>
    <rect x="22" y="54" width="24" height="1"  fill="#d4a843" fill-opacity="0.1"/>
    <rect x="22" y="58" width="24" height="1"  fill="#d4a843" fill-opacity="0.1"/>
    <text x="24" y="57" fill="#7cb87c" font-size="7">LINK</text>
    <text x="24" y="62" fill="#7cb87c" font-size="5">A1 OK</text>
    <!-- vent on side -->
    <rect x="52" y="48" width="14" height="16" fill="#1a1a1d" stroke="#4a4a50"/>
    <rect x="54" y="52" width="10" height="1"  fill="#4a4a50"/>
    <rect x="54" y="56" width="10" height="1"  fill="#4a4a50"/>
    <rect x="54" y="60" width="10" height="1"  fill="#4a4a50"/>
    <!-- label -->
    <text x="2" y="108" fill="#a88a4a" font-size="9">RELAY STATION</text>
    <!-- interaction prompt -->
    <g transform="translate(-4,-28)">
      <rect width="96" height="16" fill="#1a1a1d" fill-opacity="0.92" stroke="#d4a843" stroke-width="1"/>
      <polygon points="46,16 50,22 54,16" fill="#1a1a1d" stroke="#d4a843" stroke-width="1"/>
      <rect x="4" y="3" width="12" height="10" fill="#2a2a2e" stroke="#d4a843"/>
      <text x="7"  y="12" fill="#d4a843" font-size="7">E</text>
      <text x="20" y="12" fill="#d4a843" font-size="8">CONFIGURE</text>
    </g>
  </g>

  <!-- ========== LANDING DOCK + SHIP ========== -->
  <g transform="translate(356,350)">
    <!-- dock platform -->
    <rect x="0" y="44" width="176" height="16" fill="#2a2a2e" stroke="#d4a843" stroke-width="2"/>
    <rect x="2"   y="46" width="3"  height="3" fill="#d4a843"/>
    <rect x="171" y="46" width="3"  height="3" fill="#d4a843"/>
    <!-- landing stripes -->
    <rect x="10"  y="46" width="10" height="12" fill="#d4a843" fill-opacity="0.15"/>
    <rect x="28"  y="46" width="10" height="12" fill="#d4a843" fill-opacity="0.15"/>
    <rect x="46"  y="46" width="10" height="12" fill="#d4a843" fill-opacity="0.15"/>
    <rect x="64"  y="46" width="10" height="12" fill="#d4a843" fill-opacity="0.15"/>
    <rect x="82"  y="46" width="10" height="12" fill="#d4a843" fill-opacity="0.15"/>
    <rect x="100" y="46" width="10" height="12" fill="#d4a843" fill-opacity="0.15"/>
    <rect x="118" y="46" width="10" height="12" fill="#d4a843" fill-opacity="0.15"/>
    <rect x="136" y="46" width="10" height="12" fill="#d4a843" fill-opacity="0.15"/>
    <rect x="154" y="46" width="10" height="12" fill="#d4a843" fill-opacity="0.15"/>
    <text x="58" y="57" fill="#7cb87c" font-size="8">SHIP DOCKED</text>
    <text x="40" y="72" fill="#a88a4a" font-size="9">LANDING DOCK</text>
    <!-- ship sprite above platform -->
    <g transform="translate(52,-42)">
      <polygon points="36,42 16,22 56,22" fill="#3a3a40" stroke="#4a4a50" stroke-width="1"/>
      <rect x="16" y="22" width="40" height="20" fill="#3a3a40" stroke="#4a4a50" stroke-width="1"/>
      <rect x="18" y="26" width="36" height="2" fill="#4a4a50"/>
      <rect x="18" y="31" width="36" height="2" fill="#4a4a50"/>
      <rect x="18" y="40" width="12" height="6" fill="#5a8fa8" fill-opacity="0.4"/>
      <rect x="42" y="40" width="12" height="6" fill="#5a8fa8" fill-opacity="0.4"/>
      <rect x="21" y="46" width="5"  height="2" fill="#d4a843" fill-opacity="0.2"/>
      <rect x="46" y="46" width="5"  height="2" fill="#d4a843" fill-opacity="0.2"/>
      <rect x="28" y="18" width="16" height="8" fill="#5a8fa8" fill-opacity="0.3" stroke="#4a4a50"/>
    </g>
    <!-- departure interaction prompt -->
    <g transform="translate(46,-66)">
      <rect width="96" height="16" fill="#1a1a1d" fill-opacity="0.92" stroke="#d4a843" stroke-width="1"/>
      <polygon points="46,16 50,22 54,16" fill="#1a1a1d" stroke="#d4a843" stroke-width="1"/>
      <rect x="4" y="3" width="12" height="10" fill="#2a2a2e" stroke="#d4a843"/>
      <text x="7"  y="12" fill="#d4a843" font-size="7">E</text>
      <text x="20" y="12" fill="#d4a843" font-size="8">DEPARTURE</text>
    </g>
  </g>

  <!-- ========== PLAYER SPRITE ========== -->
  <g transform="translate(308,356)">
    <ellipse cx="10" cy="38" rx="10" ry="3" fill="#000000" fill-opacity="0.3"/>
    <rect x="2"  y="28" width="7"  height="10" fill="#5a3a20"/>
    <rect x="11" y="28" width="7"  height="10" fill="#5a3a20"/>
    <rect x="0"  y="10" width="20" height="20" fill="#8b3a2a"/>
    <rect x="2"  y="14" width="16" height="3"  fill="#a84a3a"/>
    <rect x="20" y="12" width="14" height="3"  fill="#4a4a50"/>
    <rect x="30" y="8"  width="5"  height="8"  fill="#4a4a50"/>
    <rect x="2"  y="0"  width="16" height="12" fill="#4a4a50"/>
    <rect x="4"  y="2"  width="12" height="7"  fill="#5a8fa8" fill-opacity="0.4"/>
  </g>

  <!-- ========== HUD TOP BAR ========== -->
  <rect width="960" height="40" fill="#1a1a1d" fill-opacity="0.93" stroke="#4a4a50"/>

  <!-- Crystal counter (top-left) — info-blue rivets for A2 theme -->
  <g transform="translate(8,4)">
    <rect width="116" height="32" fill="#2a2a2e" stroke="#4a4a50"/>
    <rect x="2"   y="2"  width="3" height="3" fill="#5a8fa8"/>
    <rect x="111" y="2"  width="3" height="3" fill="#5a8fa8"/>
    <rect x="2"   y="27" width="3" height="3" fill="#5a8fa8"/>
    <rect x="111" y="27" width="3" height="3" fill="#5a8fa8"/>
    <polygon points="14,24 10,13 14,6 18,13" fill="#5a8fa8"/>
    <polygon points="14,24 18,13 22,18"       fill="#3a6888"/>
    <text x="28" y="13" fill="#a88a4a" font-size="7">CRYSTAL</text>
    <text x="28" y="27" fill="#5a8fa8" font-size="14" font-weight="bold">0012</text>
  </g>

  <!-- Location plate (center) -->
  <g transform="translate(310,5)">
    <rect width="340" height="30" fill="#2a2a2e" stroke="#5a8fa8" stroke-width="1"/>
    <rect x="2"   y="2"  width="3" height="3" fill="#5a8fa8"/>
    <rect x="335" y="2"  width="3" height="3" fill="#5a8fa8"/>
    <rect x="2"   y="25" width="3" height="3" fill="#5a8fa8"/>
    <rect x="335" y="25" width="3" height="3" fill="#5a8fa8"/>
    <text x="86"  y="14" fill="#5a8fa8" font-size="11" font-weight="bold">A2 · CRYSTAL DRIFT</text>
    <text x="60"  y="26" fill="#a88a4a" font-size="7">RELAY: LINKED  ·  SIGNAL: STRONG  ·  A1 ONLINE</text>
  </g>

  <!-- Credits plate (top-right) -->
  <g transform="translate(840,4)">
    <rect width="112" height="32" fill="#2a2a2e" stroke="#4a4a50"/>
    <rect x="2"   y="2"  width="3" height="3" fill="#d4a843"/>
    <rect x="107" y="2"  width="3" height="3" fill="#d4a843"/>
    <rect x="2"   y="27" width="3" height="3" fill="#d4a843"/>
    <rect x="107" y="27" width="3" height="3" fill="#d4a843"/>
    <text x="8" y="13" fill="#a88a4a" font-size="7">CR</text>
    <text x="8" y="27" fill="#d4a843" font-size="14" font-weight="bold">002,340</text>
  </g>

  <!-- Settings cog (top-right corner) -->
  <g transform="translate(932,6)">
    <rect width="20" height="20" fill="#2a2a2e" stroke="#4a4a50"/>
    <rect x="8"  y="2"  width="4" height="16" fill="#4a4a50"/>
    <rect x="2"  y="8"  width="16" height="4"  fill="#4a4a50"/>
    <rect x="7"  y="7"  width="6"  height="6"  fill="#2a2a2e"/>
    <rect x="9"  y="9"  width="2"  height="2"  fill="#a88a4a"/>
  </g>

  <!-- ========== ANNOTATION PANEL (bottom-left) ========== -->
  <g transform="translate(8,416)">
    <rect width="360" height="116" fill="#1a1a1d" fill-opacity="0.95" stroke="#4a4a50" stroke-width="2"/>
    <rect x="2"   y="2"   width="3" height="3" fill="#d4a843"/>
    <rect x="355" y="2"   width="3" height="3" fill="#d4a843"/>
    <rect x="2"   y="111" width="3" height="3" fill="#d4a843"/>
    <rect x="355" y="111" width="3" height="3" fill="#d4a843"/>
    <text x="10" y="15" fill="#a88a4a" font-size="9">A2 SCENE KEY</text>
    <rect x="8"  y="20"  width="344" height="1" fill="#4a4a50"/>
    <!-- items -->
    <polygon points="16,28 11,38 21,38" fill="#5a8fa8" stroke="#8fc0d8" stroke-width="1"/>
    <text x="28" y="36" fill="#d4a843" font-size="8">CRYSTAL ORE NODE — 2 CR/unit · 10s regen (vs 3s on A1)</text>
    <rect x="10" y="44"  width="8"  height="10" fill="#2a2a2e" stroke="#7cb87c" stroke-width="1"/>
    <text x="24" y="52" fill="#d4a843" font-size="8">RELAY STATION — A1 signal link · cargo route config (upgrade req.)</text>
    <rect x="10" y="60"  width="8"  height="10" fill="#2a2a2e" stroke="#d4a843" stroke-width="2"/>
    <text x="24" y="68" fill="#d4a843" font-size="8">LANDING DOCK — departure panel · ship cargo hold access</text>
    <rect x="8"  y="76"  width="344" height="1" fill="#4a4a50"/>
    <text x="10" y="88"  fill="#4a4a50" font-size="7">No Shop or Sell Terminal on arrival. Crystal must be loaded into ship and sold at A1.</text>
    <text x="10" y="99"  fill="#4a4a50" font-size="7">Relay Station upgrade (500 CR) unlocks inter-asteroid cargo drone routes.</text>
    <text x="10" y="110" fill="#4a4a50" font-size="7">Scarcity by design: crystal nodes regen slower, no automation until relay upgraded.</text>
  </g>

  <!-- Bottom label bar -->
  <rect x="0" y="516" width="960" height="24" fill="#1a1a1d"/>
  <text x="8" y="532" fill="#a88a4a" font-size="10">12 — ASTEROID B WORLD LAYOUT  ·  Crystal Drift · crystal nodes, relay station, landing dock · no shop on arrival</text>
</svg>

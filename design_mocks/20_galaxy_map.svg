<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" shape-rendering="crispEdges" font-family="monospace">
  <defs>
    <pattern id="deepstars" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#06060a"/>
      <rect x="12" y="18" width="1" height="1" fill="#d4a843"/>
      <rect x="60" y="40" width="1" height="1" fill="#a88a4a"/>
      <rect x="80" y="80" width="2" height="2" fill="#d4a843"/>
      <rect x="32" y="70" width="1" height="1" fill="#7cb87c"/>
      <rect x="88" y="24" width="1" height="1" fill="#5a8fa8"/>
    </pattern>
    <pattern id="neardust" width="220" height="220" patternUnits="userSpaceOnUse">
      <rect x="40" y="80" width="2" height="2" fill="#4a4a50"/>
      <rect x="150" y="160" width="2" height="2" fill="#4a4a50"/>
      <rect x="190" y="30" width="2" height="2" fill="#4a4a50"/>
    </pattern>
  </defs>
  <rect width="960" height="540" fill="url(#deepstars)"/>
  <rect width="960" height="540" fill="url(#neardust)"/>

  <!-- header bar -->
  <rect x="0" y="0" width="960" height="40" fill="#1a1a1d" stroke="#4a4a50"/>
  <text x="16" y="26" fill="#d4a843" font-size="14" font-weight="bold">GALAXY MAP</text>
  <text x="160" y="26" fill="#a88a4a" font-size="10">SECTOR: UNNAMED · 3 KNOWN BODIES</text>
  <g transform="translate(924,10)">
    <rect width="20" height="20" fill="#2a2a2e" stroke="#8b3a2a"/>
    <text x="5" y="14" fill="#8b3a2a" font-size="12">X</text>
  </g>

  <!-- routes -->
  <!-- A1-A2 dashed (travelable) -->
  <line x1="210" y1="320" x2="500" y2="220" stroke="#d4a843" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- A1-A2 solid (cargo route active) -->
  <line x1="214" y1="324" x2="504" y2="224" stroke="#d4a843" stroke-width="1"/>
  <!-- cargo drone traveling -->
  <g transform="translate(360,270)">
    <rect x="-4" y="-3" width="8" height="6" fill="#d4a843"/>
    <rect x="-6" y="-1" width="2" height="2" fill="#d4a843"/>
    <rect x="4" y="-1" width="2" height="2" fill="#d4a843"/>
  </g>

  <!-- A2-A3 dashed locked -->
  <line x1="520" y1="220" x2="770" y2="360" stroke="#4a4a50" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- A1 — current, highlighted -->
  <g transform="translate(170,280)">
    <circle cx="40" cy="40" r="52" fill="none" stroke="#d4a843" stroke-width="1" stroke-dasharray="2,3"/>
    <circle cx="40" cy="40" r="32" fill="#3a2a1e"/>
    <circle cx="30" cy="30" r="6" fill="#2a1a10"/>
    <circle cx="50" cy="48" r="8" fill="#4a3020"/>
    <circle cx="22" cy="52" r="4" fill="#2a1a10"/>
    <text x="-4" y="108" fill="#d4a843" font-size="11" font-weight="bold">A1 · IRON ROCK</text>
    <text x="2" y="122" fill="#7cb87c" font-size="9">YOU ARE HERE</text>
  </g>

  <!-- A2 — travelable -->
  <g transform="translate(460,160)">
    <circle cx="40" cy="40" r="28" fill="#2a3a4a"/>
    <polygon points="30,28 44,18 50,34 38,40" fill="#5a8fa8"/>
    <polygon points="28,48 40,52 48,46 44,58" fill="#8fc0d8"/>
    <text x="-6" y="86" fill="#d4a843" font-size="11" font-weight="bold">A2 · CRYSTAL DRIFT</text>
    <text x="8" y="100" fill="#a88a4a" font-size="9">CRYSTAL · FUEL</text>
  </g>

  <!-- A3 — locked -->
  <g transform="translate(730,320)" opacity="0.6">
    <circle cx="40" cy="40" r="30" fill="#1e1a2a" stroke="#4a4a50" stroke-dasharray="3,3"/>
    <text x="26" y="46" fill="#4a4a50" font-size="18" font-weight="bold">???</text>
    <text x="0" y="90" fill="#4a4a50" font-size="11" font-weight="bold">A3 · UNKNOWN</text>
    <text x="10" y="104" fill="#4a4a50" font-size="9">REQUIRES A2 SCAN</text>
  </g>

  <!-- Legend -->
  <g transform="translate(16,430)">
    <rect width="280" height="92" fill="#1a1a1d" stroke="#4a4a50"/>
    <text x="8" y="14" fill="#a88a4a" font-size="9">LEGEND</text>
    <line x1="10" y1="28" x2="40" y2="28" stroke="#d4a843" stroke-dasharray="4,2"/>
    <text x="48" y="31" fill="#d4a843" font-size="8">TRAVEL ROUTE</text>
    <line x1="10" y1="44" x2="40" y2="44" stroke="#d4a843" stroke-width="1"/>
    <text x="48" y="47" fill="#d4a843" font-size="8">CARGO ROUTE · 1 ACTIVE</text>
    <line x1="10" y1="60" x2="40" y2="60" stroke="#4a4a50" stroke-dasharray="3,3"/>
    <text x="48" y="63" fill="#4a4a50" font-size="8">LOCKED / UNSCANNED</text>
    <circle cx="22" cy="78" r="6" fill="none" stroke="#7cb87c"/>
    <text x="38" y="81" fill="#7cb87c" font-size="8">CURRENT LOCATION</text>
  </g>

  <!-- action bar bottom-right -->
  <g transform="translate(600,438)">
    <rect width="344" height="84" fill="#1a1a1d" stroke="#4a4a50"/>
    <text x="10" y="16" fill="#a88a4a" font-size="9">SELECTED: A2 · CRYSTAL DRIFT</text>
    <text x="10" y="30" fill="#a88a4a" font-size="8">FUEL: N/A (FIRST LAUNCH FREE)</text>
    <!-- buttons -->
    <g transform="translate(10,40)">
      <rect width="160" height="34" fill="#2a2a2e" stroke="#7cb87c" stroke-width="2"/>
      <text x="54" y="22" fill="#7cb87c" font-size="12" font-weight="bold">TRAVEL</text>
    </g>
    <g transform="translate(180,40)">
      <rect width="154" height="34" fill="#2a2a2e" stroke="#4a4a50"/>
      <text x="56" y="22" fill="#d4a843" font-size="12">CLOSE</text>
    </g>
  </g>

  <g>
    <rect x="320" y="516" width="280" height="24" fill="#1a1a1d"/>
    <text x="328" y="532" fill="#a88a4a" font-size="10">10 — GALAXY MAP</text>
  </g>
</svg>

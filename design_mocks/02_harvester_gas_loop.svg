<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <style>
      .bg { fill: #0A0A12; }
      .label { fill: #C0C0C8; font-family: monospace; font-size: 11px; }
      .amber { fill: #D4A845; }
      .green { fill: #7CB87C; }
      .dim { fill: #4A4A50; }
      .title { fill: #D4A845; font-family: monospace; font-size: 12px; font-weight: bold; }
      .small { fill: #C0C0C8; font-family: monospace; font-size: 9px; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D4A845" opacity="0.8"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7CB87C" opacity="0.8"/>
    </marker>
    <marker id="arr-dim" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4A4A50" opacity="0.8"/>
    </marker>
  </defs>

  <rect width="800" height="480" class="bg"/>
  <rect x="1" y="1" width="798" height="478" fill="none" stroke="#404048" stroke-width="1"/>

  <!-- Title -->
  <text x="20" y="24" class="title">HARVESTER + GAS LOOP — TOP-DOWN VIEW</text>
  <line x1="20" y1="30" x2="780" y2="30" stroke="#404048" stroke-width="1"/>

  <!-- ═══ GAS COLLECTOR (top-left) ═══ -->
  <rect x="60" y="60" width="110" height="90" rx="4" fill="#0E1A0E" stroke="#7CB87C" stroke-width="1.5"/>
  <text x="115" y="78" fill="#7CB87C" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">GAS COLLECTOR</text>
  <text x="115" y="91" class="small" text-anchor="middle">Personal  BER:6</text>
  <!-- Wind turbine icon -->
  <line x1="115" y1="100" x2="115" y2="118" stroke="#7CB87C" stroke-width="2"/>
  <ellipse cx="115" cy="99" rx="12" ry="4" fill="none" stroke="#7CB87C" stroke-width="1.5" transform="rotate(-30,115,99)"/>
  <ellipse cx="115" cy="99" rx="12" ry="4" fill="none" stroke="#7CB87C" stroke-width="1.5" transform="rotate(90,115,99)"/>
  <!-- Gas tank fill -->
  <rect x="75" y="122" width="80" height="14" rx="2" fill="#070710" stroke="#404048" stroke-width="1"/>
  <rect x="76" y="123" width="56" height="12" rx="1" fill="#7CB87C" opacity="0.6"/>
  <text x="115" y="133" class="small" text-anchor="middle" fill="#0A0A12">GAS 70%</text>
  <!-- Deposit circle below -->
  <ellipse cx="115" cy="165" rx="40" ry="12" fill="#0A1A0A" stroke="#7CB87C" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="115" y="169" fill="#4A4A50" font-family="monospace" font-size="8" text-anchor="middle">GAS DEPOSIT</text>

  <!-- ═══ MINERAL HARVESTER (center) ═══ -->
  <rect x="310" y="160" width="180" height="160" rx="6" fill="#1A1A0E" stroke="#D4A845" stroke-width="2"/>
  <text x="400" y="182" fill="#D4A845" font-family="monospace" font-size="11" text-anchor="middle" font-weight="bold">MINERAL HARVESTER</text>
  <text x="400" y="196" fill="#4A4A50" font-family="monospace" font-size="9" text-anchor="middle">Medium  BER:11</text>

  <!-- Drill icon -->
  <rect x="385" y="202" width="30" height="40" rx="3" fill="#0A0A12" stroke="#D4A845" stroke-width="1"/>
  <polygon points="395,242 405,242 400,256" fill="#D4A845" opacity="0.8"/>
  <circle cx="400" cy="218" r="6" fill="none" stroke="#D4A845" stroke-width="1.5"/>
  <line x1="394" y1="212" x2="406" y2="224" stroke="#D4A845" stroke-width="1"/>
  <line x1="406" y1="212" x2="394" y2="224" stroke="#D4A845" stroke-width="1"/>

  <!-- Fuel tank bar -->
  <text x="330" y="268" fill="#4A4A50" font-family="monospace" font-size="9">FUEL</text>
  <rect x="355" y="258" width="90" height="12" rx="2" fill="#070710" stroke="#404048" stroke-width="1"/>
  <rect x="356" y="259" width="30" height="10" rx="1" fill="#D4A845" opacity="0.7"/>
  <text x="450" y="268" fill="#D4A845" font-family="monospace" font-size="9">22%</text>

  <!-- Hopper bar -->
  <text x="330" y="286" fill="#4A4A50" font-family="monospace" font-size="9">HOPPER</text>
  <rect x="355" y="276" width="90" height="12" rx="2" fill="#070710" stroke="#404048" stroke-width="1"/>
  <rect x="356" y="277" width="67" height="10" rx="1" fill="#C0C0C8" opacity="0.5"/>
  <text x="450" y="286" fill="#C0C0C8" font-family="monospace" font-size="9">74%</text>

  <!-- Status -->
  <rect x="340" y="296" width="120" height="16" rx="2" fill="#0A1A0A" stroke="#7CB87C" stroke-width="0.5"/>
  <text x="400" y="308" fill="#7CB87C" font-family="monospace" font-size="9" text-anchor="middle">● EXTRACTING  5.1 u/min</text>

  <!-- Deposit below harvester -->
  <ellipse cx="400" cy="345" rx="70" ry="20" fill="#1A1400" stroke="#D4A845" stroke-width="0.5" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="400" y="349" fill="#D4A845" font-family="monospace" font-size="8" text-anchor="middle">◆ VORAX DEPOSIT — 71% CONC.</text>

  <!-- ═══ STORAGE DEPOT (right) ═══ -->
  <rect x="620" y="170" width="120" height="80" rx="4" fill="#0E0E1A" stroke="#C0C0C8" stroke-width="1"/>
  <text x="680" y="190" fill="#C0C0C8" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">STORAGE DEPOT</text>
  <!-- Fill bar -->
  <rect x="635" y="200" width="90" height="14" rx="2" fill="#070710" stroke="#404048" stroke-width="1"/>
  <rect x="636" y="201" width="54" height="12" rx="1" fill="#C0C0C8" opacity="0.4"/>
  <text x="680" y="211" class="small" text-anchor="middle" fill="#C0C0C8">ORE 60%</text>
  <text x="680" y="232" class="small" text-anchor="middle">VORAX: 600 u</text>
  <text x="680" y="244" class="small" text-anchor="middle" fill="#4A4A50">cap: 1000</text>

  <!-- ═══ DRONE 1: HAULING FUEL (top path) ═══ -->
  <!-- Drone icon -->
  <polygon points="175,120 168,136 182,136" fill="#D4A845" opacity="0.9"/>
  <circle cx="175" cy="120" r="6" fill="#0A0A12" stroke="#D4A845" stroke-width="1.5"/>
  <text x="175" y="148" fill="#D4A845" font-family="monospace" font-size="8" text-anchor="middle">REFUELING</text>
  <!-- Gas canister -->
  <rect x="168" y="152" width="14" height="10" rx="2" fill="#7CB87C" opacity="0.8"/>
  <text x="175" y="160" fill="#0A0A12" font-family="monospace" font-size="7" text-anchor="middle">GAS</text>

  <!-- Path: Gas Collector → Drone → Harvester -->
  <path d="M170,150 Q240,90 310,220" fill="none" stroke="#7CB87C" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-g)"/>
  <text x="238" y="130" fill="#7CB87C" font-family="monospace" font-size="9">carrying gas →</text>

  <!-- ═══ DRONE 2: EMPTYING HOPPER (bottom path) ═══ -->
  <polygon points="520,390 513,406 527,406" fill="#C0C0C8" opacity="0.9"/>
  <circle cx="520" cy="390" r="6" fill="#0A0A12" stroke="#C0C0C8" stroke-width="1.5"/>
  <text x="520" y="418" fill="#C0C0C8" font-family="monospace" font-size="8" text-anchor="middle">HAULING</text>
  <!-- Ore payload icon -->
  <rect x="513" y="374" width="14" height="10" rx="1" fill="#D4A845" opacity="0.7"/>
  <text x="520" y="382" fill="#0A0A12" font-family="monospace" font-size="7" text-anchor="middle">ORE</text>

  <!-- Path: Harvester → Drone → Depot -->
  <path d="M490,310 Q530,370 620,230" fill="none" stroke="#D4A845" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr)"/>
  <text x="567" y="350" fill="#D4A845" font-family="monospace" font-size="9">carrying ore →</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="20" y="390" width="260" height="75" rx="4" fill="#0E0E1A" stroke="#404048" stroke-width="1"/>
  <text x="30" y="408" class="title" font-size="10">LEGEND</text>
  <line x1="50" y1="418" x2="80" y2="418" stroke="#7CB87C" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="88" y="422" class="label" font-size="10">Fuel drone route (gas → harvester)</text>
  <line x1="50" y1="433" x2="80" y2="433" stroke="#D4A845" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="88" y="437" class="label" font-size="10">Haul drone route (ore → depot)</text>
  <text x="30" y="452" class="label" font-size="9">Harvester stops when: fuel = 0 OR hopper = 100%</text>
  <text x="30" y="462" fill="#D4A845" font-family="monospace" font-size="9">Drones on LOOP task handle both circuits.</text>

  <!-- Extraction rate note -->
  <rect x="310" y="60" width="360" height="90" rx="4" fill="#0E0E1A" stroke="#404048" stroke-width="1"/>
  <text x="490" y="80" fill="#D4A845" font-family="monospace" font-size="11" text-anchor="middle" font-weight="bold">EXTRACTION FORMULA</text>
  <text x="490" y="98" fill="#C0C0C8" font-family="monospace" font-size="12" text-anchor="middle">Units/min = BER × (Conc/100) × (ER/1000)</text>
  <line x1="330" y1="106" x2="650" y2="106" stroke="#404048" stroke-width="1"/>
  <text x="490" y="122" fill="#4A4A50" font-family="monospace" font-size="10" text-anchor="middle">Example: 11 × 0.71 × 0.640 = 5.00 u/min</text>
  <text x="490" y="138" fill="#7CB87C" font-family="monospace" font-size="9" text-anchor="middle">Better survey placement + higher ER deposit = more ore</text>
</svg>

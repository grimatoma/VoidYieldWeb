<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <defs>
    <style>
      .label { fill: #C0C0C8; font-family: monospace; font-size: 10px; }
      .amber { fill: #D4A845; }
      .green { fill: #7CB87C; }
      .dim { fill: #4A4A50; }
      .title { fill: #D4A845; font-family: monospace; font-size: 12px; font-weight: bold; }
    </style>
    <marker id="la" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#D4A845" opacity="0.8"/>
    </marker>
    <marker id="lag" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#7CB87C" opacity="0.8"/>
    </marker>
  </defs>

  <rect width="800" height="520" fill="#0A0A12"/>
  <rect x="1" y="1" width="798" height="518" fill="none" stroke="#404048" stroke-width="1"/>

  <text x="20" y="24" class="title">LOGISTICS PANEL — GALAXY ROUTES VIEW</text>
  <line x1="20" y1="30" x2="780" y2="30" stroke="#404048" stroke-width="1"/>

  <!-- ═══ LEFT COLUMN: Galaxy Map ═══ -->
  <rect x="15" y="44" width="430" height="462" rx="4" fill="#08080F" stroke="#404048" stroke-width="1"/>
  <text x="230" y="62" fill="#D4A845" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">GALAXY MAP — LOGISTICS OVERLAY  [L]</text>
  <line x1="20" y1="68" x2="440" y2="68" stroke="#404048" stroke-width="1"/>

  <!-- Stars -->
  <circle cx="60" cy="100" r="1" fill="#C0C0C8" opacity="0.3"/>
  <circle cx="140" cy="130" r="1" fill="#C0C0C8" opacity="0.2"/>
  <circle cx="200" cy="90" r="1.5" fill="#C0C0C8" opacity="0.25"/>
  <circle cx="270" cy="150" r="1" fill="#C0C0C8" opacity="0.3"/>
  <circle cx="380" cy="110" r="1" fill="#C0C0C8" opacity="0.2"/>
  <circle cx="350" cy="200" r="1" fill="#C0C0C8" opacity="0.3"/>
  <circle cx="80" cy="320" r="1" fill="#C0C0C8" opacity="0.25"/>
  <circle cx="420" cy="380" r="1" fill="#C0C0C8" opacity="0.2"/>
  <circle cx="100" cy="420" r="1" fill="#C0C0C8" opacity="0.3"/>
  <circle cx="310" cy="440" r="1.5" fill="#C0C0C8" opacity="0.25"/>
  <circle cx="160" cy="470" r="1" fill="#C0C0C8" opacity="0.2"/>
  <circle cx="390" cy="460" r="1" fill="#C0C0C8" opacity="0.3"/>

  <!-- ══ Planet A1 ══ -->
  <!-- Asteroid belt representation -->
  <ellipse cx="130" cy="230" rx="45" ry="45" fill="none" stroke="#404048" stroke-width="0.5" opacity="0.4" stroke-dasharray="3,4"/>
  <ellipse cx="130" cy="230" rx="38" ry="38" fill="#181818" stroke="#7CB87C" stroke-width="2"/>
  <ellipse cx="130" cy="230" rx="26" ry="10" fill="none" stroke="#7CB87C" stroke-width="1" opacity="0.4"/>
  <!-- Rocky texture -->
  <circle cx="118" cy="220" r="8" fill="#141414" stroke="#404048" stroke-width="0.5"/>
  <circle cx="138" cy="235" r="6" fill="#101010" stroke="#404048" stroke-width="0.5"/>
  <circle cx="125" cy="240" r="5" fill="#141414" stroke="#404048" stroke-width="0.5"/>
  <!-- Planet label -->
  <text x="130" y="284" fill="#7CB87C" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">A1 — IRON ROCK</text>
  <!-- Status dot -->
  <circle cx="130" cy="290" r="4" fill="#7CB87C" opacity="0.8"/>
  <text x="140" y="294" fill="#7CB87C" font-family="monospace" font-size="8">ACTIVE</text>

  <!-- ══ Planet B ══ -->
  <ellipse cx="310" cy="190" rx="36" ry="36" fill="#0A0A20" stroke="#D4A845" stroke-width="2"/>
  <!-- Atmospheric swirl -->
  <path d="M285,184 Q297,174 310,178 Q323,182 330,192" fill="none" stroke="#404080" stroke-width="1.5" opacity="0.6"/>
  <path d="M282,196 Q295,186 310,190 Q325,194 332,204" fill="none" stroke="#404080" stroke-width="1" opacity="0.4"/>
  <ellipse cx="310" cy="202" rx="28" ry="8" fill="none" stroke="#6060A0" stroke-width="0.8" opacity="0.3"/>
  <text x="310" y="238" fill="#D4A845" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">PLANET B</text>
  <text x="310" y="250" fill="#4A4A50" font-family="monospace" font-size="8" text-anchor="middle">VORTEX DRIFT</text>
  <circle cx="310" cy="256" r="4" fill="#7CB87C" opacity="0.8"/>
  <text x="320" y="260" fill="#7CB87C" font-family="monospace" font-size="8">ACTIVE</text>

  <!-- ══ Planet C ══ -->
  <ellipse cx="370" cy="380" rx="32" ry="32" fill="#0A0808" stroke="#C0C0C8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Shattered appearance -->
  <line x1="355" y1="365" x2="385" y2="395" stroke="#C0C0C8" stroke-width="0.5" opacity="0.3"/>
  <line x1="358" y1="395" x2="382" y2="365" stroke="#C0C0C8" stroke-width="0.5" opacity="0.3"/>
  <circle cx="370" cy="380" r="18" fill="#100808" stroke="#404048" stroke-width="0.5"/>
  <text x="370" y="424" fill="#C0C0C8" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">PLANET C</text>
  <text x="370" y="436" fill="#4A4A50" font-family="monospace" font-size="8" text-anchor="middle">SHATTERED RING</text>
  <circle cx="370" cy="442" r="4" fill="#D44040" opacity="0.8"/>
  <text x="380" y="446" fill="#D44040" font-family="monospace" font-size="8">STALLED</text>

  <!-- ══ ROUTE A1 → Planet B (ACTIVE, outbound) ══ -->
  <path d="M168,220 Q220,190 272,195" fill="none" stroke="#7CB87C" stroke-width="2" stroke-dasharray="8,4" opacity="0.7" marker-end="url(#lag)"/>
  <!-- Route label -->
  <text x="215" y="196" fill="#7CB87C" font-family="monospace" font-size="8" text-anchor="middle">ROUTE 1</text>

  <!-- Ship ISV CARVER mid-route outbound -->
  <!-- Ship icon at ~40% of route arc -->
  <g transform="translate(213,208)">
    <polygon points="0,-7 -4,5 4,5" fill="#D4A845" opacity="0.95" transform="rotate(30)"/>
    <ellipse cx="0" cy="3" rx="3" ry="2" fill="#D4A845" opacity="0.4" transform="rotate(30)"/>
  </g>
  <!-- Progress bar below ship -->
  <rect x="186" y="218" width="60" height="8" rx="1" fill="#070710" stroke="#404048" stroke-width="0.5"/>
  <rect x="187" y="219" width="24" height="6" rx="0.5" fill="#D4A845" opacity="0.8"/>
  <text x="216" y="226" fill="#4A4A50" font-family="monospace" font-size="7" text-anchor="middle">40%</text>

  <!-- Return route Planet B → A1 (dashed return) -->
  <path d="M272,205 Q220,215 168,232" fill="none" stroke="#D4A845" stroke-width="1.2" stroke-dasharray="4,6" opacity="0.4" marker-end="url(#la)"/>

  <!-- ══ ROUTE A1 → Planet C (STALLED, red) ══ -->
  <path d="M165,248 Q230,340 338,365" fill="none" stroke="#D44040" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6" marker-end="url(#la)"/>
  <text x="240" y="320" fill="#D44040" font-family="monospace" font-size="8" transform="rotate(45,240,320)">ROUTE 2 — STALLED</text>

  <!-- ══ ROUTE Planet B → Planet C ══ -->
  <path d="M320,222 Q360,290 355,348" fill="none" stroke="#D4A845" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5" marker-end="url(#la)"/>
  <text x="345" y="295" fill="#4A4A50" font-family="monospace" font-size="8">ROUTE 3</text>

  <!-- ═══ RIGHT COLUMN: Route Details Panel ═══ -->
  <rect x="455" y="44" width="330" height="220" rx="4" fill="#0E0E1A" stroke="#7CB87C" stroke-width="1.5"/>
  <!-- Panel header -->
  <rect x="455" y="44" width="330" height="28" rx="4" fill="#0A1A0A"/>
  <text x="620" y="63" fill="#7CB87C" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">ROUTE 1 — ISV CARVER</text>
  <circle cx="773" cy="58" r="5" fill="#7CB87C" opacity="0.8"/>
  <text x="762" y="58" fill="#7CB87C" font-family="monospace" font-size="8" text-anchor="end">ACTIVE</text>

  <!-- Route info -->
  <text x="468" y="91" fill="#4A4A50" font-family="monospace" font-size="9">FROM:</text>
  <text x="510" y="91" fill="#C0C0C8" font-family="monospace" font-size="9">A1 — Iron Rock</text>
  <text x="468" y="107" fill="#4A4A50" font-family="monospace" font-size="9">TO:</text>
  <text x="510" y="107" fill="#C0C0C8" font-family="monospace" font-size="9">Planet B — Vortex Drift</text>
  <text x="468" y="123" fill="#4A4A50" font-family="monospace" font-size="9">SHIP:</text>
  <text x="510" y="123" fill="#D4A845" font-family="monospace" font-size="9">Medium Freighter</text>
  <text x="468" y="139" fill="#4A4A50" font-family="monospace" font-size="9">DISPATCH:</text>
  <text x="535" y="139" fill="#C0C0C8" font-family="monospace" font-size="9">Auto — hold 80% full</text>

  <line x1="464" y1="148" x2="778" y2="148" stroke="#404048" stroke-width="1"/>

  <!-- Transit progress bar -->
  <text x="468" y="164" fill="#4A4A50" font-family="monospace" font-size="9">TRANSIT:</text>
  <rect x="530" y="154" width="200" height="12" rx="2" fill="#070710" stroke="#404048" stroke-width="0.5"/>
  <rect x="531" y="155" width="80" height="10" rx="1" fill="#D4A845" opacity="0.8"/>
  <text x="735" y="164" fill="#D4A845" font-family="monospace" font-size="9">~1m 45s</text>

  <!-- Outbound cargo -->
  <text x="468" y="184" fill="#D4A845" font-family="monospace" font-size="9" font-weight="bold">OUTBOUND CARGO:</text>
  <text x="468" y="198" fill="#C0C0C8" font-family="monospace" font-size="9">• Steel Plates      ×  800</text>
  <text x="468" y="212" fill="#C0C0C8" font-family="monospace" font-size="9">• Alloy Rods        ×  200</text>

  <!-- Hold fill indicator -->
  <text x="468" y="230" fill="#4A4A50" font-family="monospace" font-size="9">HOLD FILL:</text>
  <rect x="530" y="220" width="200" height="12" rx="2" fill="#070710" stroke="#404048" stroke-width="0.5"/>
  <rect x="531" y="221" width="167" height="10" rx="1" fill="#7CB87C" opacity="0.7"/>
  <text x="735" y="230" fill="#7CB87C" font-family="monospace" font-size="9">1000/1200</text>

  <line x1="464" y1="240" x2="778" y2="240" stroke="#404048" stroke-width="1"/>

  <!-- Return cargo -->
  <text x="468" y="256" fill="#7CB87C" font-family="monospace" font-size="9" font-weight="bold">RETURN CARGO:</text>
  <text x="468" y="270" fill="#C0C0C8" font-family="monospace" font-size="9">• Crystal Lattices  ×  600</text>
  <text x="468" y="284" fill="#C0C0C8" font-family="monospace" font-size="9">• Energy Cells      ×  100</text>

  <!-- ─── Second panel: Stalled Route ─── -->
  <rect x="455" y="278" width="330" height="180" rx="4" fill="#1A0808" stroke="#D44040" stroke-width="1.5"/>
  <rect x="455" y="278" width="330" height="28" rx="4" fill="#120404"/>
  <text x="620" y="297" fill="#D44040" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">⚠ ROUTE 2 — ISV MORROW</text>
  <circle cx="773" cy="292" r="5" fill="#D44040" opacity="0.8"/>

  <text x="468" y="324" fill="#4A4A50" font-family="monospace" font-size="9">FROM/TO:</text>
  <text x="525" y="324" fill="#C0C0C8" font-family="monospace" font-size="9">A1 → Planet C</text>
  <text x="468" y="340" fill="#4A4A50" font-family="monospace" font-size="9">STATUS:</text>
  <text x="514" y="340" fill="#D44040" font-family="monospace" font-size="9">STALLED — 48 min no dispatch</text>
  <text x="468" y="356" fill="#4A4A50" font-family="monospace" font-size="9">CAUSE:</text>
  <text x="514" y="356" fill="#D44040" font-family="monospace" font-size="9">Export buffer at 23% (need 80%)</text>
  <text x="468" y="376" fill="#4A4A50" font-family="monospace" font-size="9">BUFFER:</text>
  <rect x="520" y="366" width="200" height="12" rx="2" fill="#070710" stroke="#404048" stroke-width="0.5"/>
  <rect x="521" y="367" width="46" height="10" rx="1" fill="#D44040" opacity="0.7"/>
  <text x="725" y="376" fill="#D44040" font-family="monospace" font-size="9">276 / 1,200 units</text>
  <text x="468" y="396" fill="#4A4A50" font-family="monospace" font-size="9">LIKELY CAUSE: Harvester stalled on A1 — check fuel.</text>
  <text x="468" y="412" fill="#D44040" font-family="monospace" font-size="8">[ OVERRIDE SEND ]   [ VIEW A1 HARVESTERS ]</text>

  <!-- ─── Third panel: Route summary / fleet ─── -->
  <rect x="455" y="472" width="330" height="34" rx="4" fill="#0E0E1A" stroke="#404048" stroke-width="1"/>
  <text x="468" y="488" fill="#4A4A50" font-family="monospace" font-size="9">FLEET SUMMARY:</text>
  <text x="570" y="488" fill="#C0C0C8" font-family="monospace" font-size="9">3 ships   ·   47 trips today   ·   340 RF consumed</text>
  <text x="468" y="501" fill="#4A4A50" font-family="monospace" font-size="9">ROUTES:</text>
  <text x="510" y="501" fill="#7CB87C" font-family="monospace" font-size="9">1 ACTIVE</text>
  <text x="565" y="501" fill="#D4A845" font-family="monospace" font-size="9">1 LOADING</text>
  <text x="640" y="501" fill="#D44040" font-family="monospace" font-size="9">1 STALLED</text>
</svg>

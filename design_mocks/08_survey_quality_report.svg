<svg xmlns="http://www.w3.org/2000/svg" width="800" height="580" viewBox="0 0 800 580">
  <defs>
    <style>
      .label { fill: #C0C0C8; font-family: monospace; font-size: 10px; }
      .amber { fill: #D4A845; }
      .green { fill: #7CB87C; }
      .dim { fill: #4A4A50; }
      .title { fill: #D4A845; font-family: monospace; font-size: 12px; font-weight: bold; }
    </style>
  </defs>

  <rect width="800" height="580" fill="#0A0A12"/>
  <rect x="1" y="1" width="798" height="578" fill="none" stroke="#404048" stroke-width="1"/>

  <text x="20" y="24" class="title">SURVEY QUALITY REPORT — UI PANEL MOCKUP</text>
  <line x1="20" y1="30" x2="780" y2="30" stroke="#404048" stroke-width="1"/>

  <!-- Two panels side-by-side: panel on left = the actual in-game panel, right = annotations -->

  <!-- ══ MAIN PANEL (left, centered) ══ -->
  <rect x="140" y="45" width="400" height="500" rx="6" fill="#0E0E1A" stroke="#D4A845" stroke-width="2"/>

  <!-- Panel header -->

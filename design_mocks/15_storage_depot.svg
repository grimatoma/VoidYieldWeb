<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" shape-rendering="crispEdges" font-family="monospace">
  <rect width="960" height="540" fill="#1a1a1d"/>

  <!-- diegetic depot sprite on left -->
  <g transform="translate(120,180)">
    <text x="0" y="-12" fill="#a88a4a" font-size="10">IN-WORLD DEPOT SPRITE (5 FILL STATES)</text>
    <!-- empty -->
    <g>
      <rect x="0" y="0" width="60" height="60" fill="#3a3a3e" stroke="#15151a"/>
      <rect x="4" y="4" width="52" height="52" fill="#2a2a2e"/>
      <text x="8" y="74" fill="#4a4a50" font-size="8">EMPTY</text>
    </g>
    <g transform="translate(70,0)">
      <rect x="0" y="0" width="60" height="60" fill="#3a3a3e" stroke="#15151a"/>
      <rect x="4" y="4" width="52" height="52" fill="#2a2a2e"/>
      <rect x="4" y="42" width="52" height="14" fill="#8b5a2a"/>
      <text x="12" y="74" fill="#4a4a50" font-size="8">1/4</text>
    </g>
    <g transform="translate(140,0)">
      <rect x="0" y="0" width="60" height="60" fill="#3a3a3e" stroke="#15151a"/>
      <rect x="4" y="4" width="52" height="52" fill="#2a2a2e"/>
      <rect x="4" y="30" width="52" height="26" fill="#8b5a2a"/>
      <text x="12" y="74" fill="#4a4a50" font-size="8">1/2</text>
    </g>
    <g transform="translate(210,0)">
      <rect x="0" y="0" width="60" height="60" fill="#3a3a3e" stroke="#15151a"/>
      <rect x="4" y="4" width="52" height="52" fill="#2a2a2e"/>
      <rect x="4" y="18" width="52" height="38" fill="#8b5a2a"/>
      <text x="12" y="74" fill="#4a4a50" font-size="8">3/4</text>
    </g>
    <g transform="translate(280,0)">
      <rect x="0" y="0" width="60" height="60" fill="#3a3a3e" stroke="#15151a"/>
      <rect x="4" y="4" width="52" height="52" fill="#8b5a2a"/>
      <rect x="10" y="10" width="40" height="6" fill="#a86a33"/>
      <text x="6" y="74" fill="#8b3a2a" font-size="8">FULL!</text>
    </g>
  </g>

  <!-- panel on right -->
  <g transform="translate(560,100)">
    <rect width="320" height="340" fill="#2a2a2e" stroke="#4a4a50" stroke-width="2"/>
    <g fill="#d4a843">
      <rect x="4" y="4" width="3" height="3"/>
      <rect x="313" y="4" width="3" height="3"/>
      <rect x="4" y="333" width="3" height="3"/>
      <rect x="313" y="333" width="3" height="3"/>
    </g>
    <rect x="0" y="0" width="320" height="32" fill="#15151a"/>
    <text x="10" y="22" fill="#d4a843" font-size="13" font-weight="bold">STORAGE DEPOT</text>
    <g transform="translate(292,8)">
      <rect width="18" height="18" fill="#2a2a2e" stroke="#8b3a2a"/>
      <text x="4" y="14" fill="#8b3a2a" font-size="12">X</text>
    </g>

    <!-- capacity readout -->
    <text x="14" y="60" fill="#a88a4a" font-size="10">CAPACITY</text>
    <text x="14" y="84" fill="#d4a843" font-size="22" font-weight="bold">047 / 050</text>

    <g transform="translate(14,94)">
      <rect width="292" height="14" fill="#15151a" stroke="#4a4a50"/>
      <g fill="#d4a843">
        <rect x="2" y="2" width="22" height="10"/>
        <rect x="26" y="2" width="22" height="10"/>
        <rect x="50" y="2" width="22" height="10"/>
        <rect x="74" y="2" width="22" height="10"/>
        <rect x="98" y="2" width="22" height="10"/>
        <rect x="122" y="2" width="22" height="10"/>
        <rect x="146" y="2" width="22" height="10"/>
        <rect x="170" y="2" width="22" height="10"/>
        <rect x="194" y="2" width="22" height="10"/>
        <rect x="218" y="2" width="22" height="10"/>
      </g>
    </g>

    <!-- Deposit button -->
    <g transform="translate(24,130)">
      <rect width="272" height="44" fill="#2a2a2e" stroke="#d4a843" stroke-width="2"/>
      <text x="48" y="28" fill="#d4a843" font-size="14" font-weight="bold">DEPOSIT CARRIED (07)</text>
    </g>

    <!-- Upgrades -->
    <rect x="14" y="190" width="292" height="2" fill="#4a4a50"/>
    <text x="14" y="210" fill="#a88a4a" font-size="10">UPGRADES</text>
    <g transform="translate(14,220)">
      <rect width="292" height="46" fill="#1a1a1d" stroke="#4a4a50"/>
      <text x="10" y="18" fill="#d4a843" font-size="11" font-weight="bold">EXPANSION I</text>
      <text x="10" y="32" fill="#a88a4a" font-size="8">+25 capacity</text>
      <rect x="216" y="12" width="66" height="22" fill="#2a2a2e" stroke="#d4a843"/>
      <text x="226" y="27" fill="#d4a843" font-size="11">100 CR</text>
    </g>
    <g transform="translate(14,272)" opacity="0.55">
      <rect width="292" height="46" fill="#1a1a1d" stroke="#4a4a50"/>
      <text x="10" y="18" fill="#a88a4a" font-size="11" font-weight="bold">EXPANSION II</text>
      <text x="10" y="32" fill="#a88a4a" font-size="8">+50 capacity</text>
      <rect x="216" y="12" width="66" height="22" fill="#2a2a2e" stroke="#8b3a2a"/>
      <text x="222" y="27" fill="#8b3a2a" font-size="11">250 CR</text>
    </g>
  </g>

  <g>
    <rect x="0" y="516" width="960" height="24" fill="#1a1a1d"/>
    <text x="8" y="532" fill="#a88a4a" font-size="10">05 — STORAGE DEPOT  ·  in-world fill stages + interaction panel</text>
  </g>
</svg>

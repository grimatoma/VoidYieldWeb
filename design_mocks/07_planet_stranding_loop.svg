<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <defs>
    <style>
      .label { fill: #C0C0C8; font-family: monospace; font-size: 10px; }
      .amber { fill: #D4A845; }
      .green { fill: #7CB87C; }
      .dim { fill: #4A4A50; }
      .title { fill: #D4A845; font-family: monospace; font-size: 12px; font-weight: bold; }
    </style>
    <marker id="ca" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#D4A845" opacity="0.8"/>
    </marker>
    <marker id="cag" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#7CB87C" opacity="0.8"/>
    </marker>
  </defs>

  <rect width="800" height="520" fill="#0A0A12"/>
  <rect x="1" y="1" width="798" height="518" fill="none" stroke="#404048" stroke-width="1"/>

  <text x="20" y="24" class="title">PLANET STRANDING LOOP — FIRST LANDING COMMITMENT CYCLE</text>
  <line x1="20" y1="30" x2="780" y2="30" stroke="#404048" stroke-width="1"/>

  <!-- Planet B background ambience -->
  <ellipse cx="400" cy="280" rx="380" ry="240" fill="#08080F" stroke="#20204A" stroke-width="0.5" opacity="0.5"/>
  <text x="400" y="490" fill="#20204A" font-family="monospace" font-size="11" text-anchor="middle">PLANET B — VORTEX DRIFT</text>

  <!-- Nodes in a loop arrangement -->
  <!-- Node positions (clockwise from top):
    LAND: 400, 60
    FUEL WARNING: 650, 160
    SURVEY GAS: 680, 320
    PLACE COLLECTOR: 530, 430
    COLLECT GAS: 270, 430
    SYNTHESIZE FUEL: 120, 320
    LAUNCH: 150, 160
  -->

  <!-- ══ NODE 1: LAND ══ -->
  <rect x="320" y="45" width="160" height="70" rx="6" fill="#0A0A20" stroke="#D4A845" stroke-width="2"/>
  <text x="400" y="65" fill="#D4A845" font-family="monospace" font-size="11" text-anchor="middle" font-weight="bold">LAND</text>
  <!-- Rocket landing icon -->
  <polygon points="400,72 393,88 407,88" fill="#D4A845" opacity="0.8"/>
  <line x1="400" y1="88" x2="400" y2="98" stroke="#D4A845" stroke-width="1.5"/>
  <line x1="400" y1="98" x2="390" y2="106" stroke="#D4A845" stroke-width="1"/>
  <line x1="400" y1="98" x2="410" y2="106" stroke="#D4A845" stroke-width="1"/>
  <text x="400" y="108" fill="#4A4A50" font-family="monospace" font-size="8" text-anchor="middle">arrive from A1</text>

  <!-- Arrow: LAND → FUEL WARNING (curve to right) -->
  <path d="M480,80 Q580,80 640,155" fill="none" stroke="#D4A845" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#ca)"/>

  <!-- ══ NODE 2: FUEL WARNING ══ -->
  <rect x="570" y="145" width="160" height="70" rx="6" fill="#1A0808" stroke="#D44040" stroke-width="1.5"/>
  <text x="650" y="165" fill="#D44040" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">⚠ FUEL WARNING</text>
  <!-- Fuel gauge icon -->
  <rect x="610" y="172" width="80" height="12" rx="2" fill="#070710" stroke="#404048" stroke-width="1"/>
  <rect x="611" y="173" width="14" height="10" rx="1" fill="#D44040" opacity="0.8"/>
  <text x="650" y="197" fill="#C0C0C8" font-family="monospace" font-size="8" text-anchor="middle">20 units remain</text>
  <text x="650" y="208" fill="#D44040" font-family="monospace" font-size="8" text-anchor="middle">need 100 to launch</text>

  <!-- Arrow: FUEL WARNING → SURVEY GAS -->
  <path d="M660,215 Q675,270 675,310" fill="none" stroke="#D4A845" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#ca)"/>

  <!-- ══ NODE 3: SURVEY GAS ══ -->
  <rect x="570" y="308" width="160" height="70" rx="6" fill="#0E0E1A" stroke="#D4A845" stroke-width="1.5"/>
  <text x="650" y="328" fill="#D4A845" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">SURVEY FOR GAS</text>
  <!-- Scan icon -->
  <circle cx="650" cy="352" r="18" fill="none" stroke="#D4A845" stroke-width="1" opacity="0.5"/>
  <circle cx="650" cy="352" r="10" fill="none" stroke="#D4A845" stroke-width="1" opacity="0.7"/>
  <circle cx="650" cy="352" r="4" fill="#D4A845" opacity="0.6"/>
  <text x="650" y="372" fill="#7CB87C" font-family="monospace" font-size="8" text-anchor="middle">GAS: 52% CONC found</text>

  <!-- Arrow: SURVEY GAS → PLACE COLLECTOR -->
  <path d="M635,378 Q580,420 535,425" fill="none" stroke="#7CB87C" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#cag)"/>

  <!-- ══ NODE 4: PLACE COLLECTOR ══ -->
  <rect x="390" y="415" width="165" height="70" rx="6" fill="#0A1A0A" stroke="#7CB87C" stroke-width="1.5"/>
  <text x="472" y="435" fill="#7CB87C" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">PLACE GAS COLLECTOR</text>
  <!-- Collector icon -->
  <line x1="472" y1="448" x2="472" y2="462" stroke="#7CB87C" stroke-width="2"/>
  <ellipse cx="472" cy="446" rx="10" ry="3" fill="none" stroke="#7CB87C" stroke-width="1.5"/>
  <ellipse cx="472" cy="446" rx="10" ry="3" fill="none" stroke="#7CB87C" stroke-width="1.5" transform="rotate(60,472,446)"/>
  <text x="472" y="474" fill="#4A4A50" font-family="monospace" font-size="8" text-anchor="middle">self-powered, begins immediately</text>

  <!-- Arrow: PLACE COLLECTOR → COLLECT GAS -->
  <path d="M390,450 Q330,450 278,445" fill="none" stroke="#7CB87C" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#cag)"/>

  <!-- ══ NODE 5: COLLECT GAS ══ -->
  <rect x="115" y="415" width="160" height="70" rx="6" fill="#0A1A0A" stroke="#7CB87C" stroke-width="1.5"/>
  <text x="195" y="435" fill="#7CB87C" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">COLLECT GAS</text>
  <!-- Progress bar -->
  <rect x="130" y="444" width="130" height="12" rx="2" fill="#070710" stroke="#404048" stroke-width="1"/>
  <rect x="131" y="445" width="104" height="10" rx="1" fill="#7CB87C" opacity="0.6"/>
  <text x="195" y="453" fill="#0A0A12" font-family="monospace" font-size="7" text-anchor="middle">300 / 300 gas</text>
  <text x="195" y="474" fill="#4A4A50" font-family="monospace" font-size="8" text-anchor="middle">~25 min at 52% conc.</text>

  <!-- Arrow: COLLECT GAS → SYNTHESIZE -->
  <path d="M125,415 Q110,370 118,315" fill="none" stroke="#D4A845" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#ca)"/>

  <!-- ══ NODE 6: SYNTHESIZE FUEL ══ -->
  <rect x="55" y="240" width="165" height="70" rx="6" fill="#1A1400" stroke="#D4A845" stroke-width="1.5"/>
  <text x="137" y="260" fill="#D4A845" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">SYNTHESIZE FUEL</text>
  <!-- Chemical process icon -->
  <rect x="100" y="268" width="24" height="24" rx="2" fill="#0A0A12" stroke="#D4A845" stroke-width="1"/>
  <text x="112" y="283" fill="#D4A845" font-family="monospace" font-size="10" text-anchor="middle">⚗</text>
  <text x="137" y="296" fill="#C0C0C8" font-family="monospace" font-size="8" text-anchor="middle">3 Gas → 1 Rocket Fuel</text>
  <text x="137" y="307" fill="#7CB87C" font-family="monospace" font-size="8" text-anchor="middle">300 gas → 100 RF ✓</text>

  <!-- Arrow: SYNTHESIZE → LAUNCH -->
  <path d="M118,240 Q135,195 148,170" fill="none" stroke="#7CB87C" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#cag)"/>

  <!-- ══ NODE 7: LAUNCH ══ -->
  <rect x="65" y="100" width="175" height="70" rx="6" fill="#0A2A0A" stroke="#7CB87C" stroke-width="2.5"/>
  <text x="152" y="120" fill="#7CB87C" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">LAUNCH ↑</text>
  <!-- Rocket rising -->
  <polygon points="152,128 145,148 159,148" fill="#D4A845" opacity="0.9"/>
  <text x="152" y="160" fill="#4A4A50" font-family="monospace" font-size="8" text-anchor="middle">return to A1 any time</text>

  <!-- Arrow LAUNCH back to top (dashed return) -->
  <path d="M240,135 Q320,80 318,65" fill="none" stroke="#7CB87C" stroke-width="1.2" stroke-dasharray="4,5" opacity="0.5" marker-end="url(#cag)"/>
  <text x="290" y="90" fill="#4A4A50" font-family="monospace" font-size="8" text-anchor="middle" opacity="0.7">can re-land</text>

  <!-- Center status display -->
  <rect x="305" y="195" width="192" height="105" rx="5" fill="#0E0E1A" stroke="#404048" stroke-width="1"/>
  <text x="401" y="213" fill="#D4A845" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">STRANDING STATUS</text>
  <line x1="315" y1="218" x2="487" y2="218" stroke="#404048" stroke-width="1"/>
  <text x="315" y="232" fill="#4A4A50" font-family="monospace" font-size="8">FUEL:</text>
  <rect x="355" y="222" width="120" height="9" rx="1" fill="#070710" stroke="#404048" stroke-width="0.5"/>
  <rect x="356" y="223" width="17" height="7" rx="0.5" fill="#D44040" opacity="0.8"/>
  <text x="480" y="231" fill="#D44040" font-family="monospace" font-size="8">20/100</text>
  <text x="315" y="248" fill="#4A4A50" font-family="monospace" font-size="8">GOAL:</text>
  <text x="355" y="248" fill="#C0C0C8" font-family="monospace" font-size="8">collect 300 gas units</text>
  <text x="315" y="262" fill="#4A4A50" font-family="monospace" font-size="8">TIME EST:</text>
  <text x="375" y="262" fill="#7CB87C" font-family="monospace" font-size="8">~25–35 minutes</text>
  <text x="315" y="278" fill="#4A4A50" font-family="monospace" font-size="8">BONUS:</text>
  <text x="355" y="278" fill="#C0C0C8" font-family="monospace" font-size="8">survey planet while waiting</text>
  <text x="315" y="292" fill="#D4A845" font-family="monospace" font-size="8">NO DANGER — just committed.</text>

  <!-- Time estimate box -->
  <rect x="20" y="40" width="220" height="50" rx="3" fill="#0E0E1A" stroke="#404048" stroke-width="1"/>
  <text x="30" y="57" fill="#4A4A50" font-family="monospace" font-size="9">ARRIVAL SUPPLIES:</text>
  <text x="30" y="71" fill="#C0C0C8" font-family="monospace" font-size="9">5 Gas Canisters (250 units)</text>
  <text x="30" y="82" fill="#C0C0C8" font-family="monospace" font-size="9">1 Gas Collector deed</text>

  <rect x="560" y="40" width="220" height="50" rx="3" fill="#0E0E1A" stroke="#404048" stroke-width="1"/>
  <text x="570" y="57" fill="#4A4A50" font-family="monospace" font-size="9">STRANDING RESOLVED WHEN:</text>
  <text x="570" y="71" fill="#7CB87C" font-family="monospace" font-size="9">Fuel tank = 100 RF units</text>
  <text x="570" y="82" fill="#4A4A50" font-family="monospace" font-size="9">Then: build outpost at leisure</text>
</svg>

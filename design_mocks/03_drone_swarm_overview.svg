<svg xmlns="http://www.w3.org/2000/svg" width="800" height="540" viewBox="0 0 800 540">
  <defs>
    <style>
      .label { fill: #C0C0C8; font-family: monospace; font-size: 10px; }
      .amber { fill: #D4A845; }
      .green { fill: #7CB87C; }
      .dim { fill: #4A4A50; }
      .title { fill: #D4A845; font-family: monospace; font-size: 12px; font-weight: bold; }
      .tag { font-family: monospace; font-size: 8px; }
    </style>
    <marker id="a1" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#D4A845" opacity="0.6"/>
    </marker>
    <marker id="a2" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#7CB87C" opacity="0.6"/>
    </marker>
    <marker id="a3" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#C0C0C8" opacity="0.6"/>
    </marker>
    <marker id="a4" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#9090C8" opacity="0.6"/>
    </marker>
  </defs>

  <rect width="800" height="540" fill="#0A0A12"/>
  <rect x="1" y="1" width="798" height="538" fill="none" stroke="#404048" stroke-width="1"/>

  <!-- Title -->
  <text x="20" y="24" class="title">DRONE SWARM OVERVIEW — TOP-DOWN OPERATIONS VIEW</text>
  <line x1="20" y1="30" x2="780" y2="30" stroke="#404048" stroke-width="1"/>

  <!-- ══ STORAGE DEPOT (center-bottom) ══ -->
  <rect x="330" y="390" width="140" height="60" rx="4" fill="#141428" stroke="#C0C0C8" stroke-width="1.5"/>
  <text x="400" y="412" fill="#C0C0C8" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">STORAGE DEPOT</text>
  <rect x="345" y="418" width="110" height="10" rx="2" fill="#070710" stroke="#404048" stroke-width="1"/>
  <rect x="346" y="419" width="66" height="8" rx="1" fill="#C0C0C8" opacity="0.4"/>
  <text x="400" y="427" class="label" text-anchor="middle" font-size="8">ORE 60%</text>
  <text x="400" y="442" fill="#4A4A50" font-family="monospace" font-size="8" text-anchor="middle">1200 / 2000 units</text>

  <!-- ══ DRONE BAY (center) ══ -->
  <rect x="340" y="220" width="120" height="60" rx="4" fill="#14140A" stroke="#D4A845" stroke-width="1.5"/>
  <text x="400" y="240" fill="#D4A845" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">FLEET COMMAND</text>
  <text x="400" y="254" fill="#4A4A50" font-family="monospace" font-size="9" text-anchor="middle">DRONE BAY</text>
  <text x="400" y="270" fill="#7CB87C" font-family="monospace" font-size="9" text-anchor="middle">22 active / 25 fleet</text>

  <!-- ══ REFINERIES ══ -->
  <rect x="180" y="290" width="90" height="50" rx="3" fill="#1A0E0A" stroke="#D4A845" stroke-width="1"/>
  <text x="225" y="308" fill="#D4A845" font-family="monospace" font-size="9" text-anchor="middle">REFINERY</text>
  <text x="225" y="320" fill="#7CB87C" font-family="monospace" font-size="8" text-anchor="middle">● RUNNING</text>
  <text x="225" y="332" fill="#4A4A50" font-family="monospace" font-size="8" text-anchor="middle">5 u/batch</text>

  <rect x="530" y="290" width="90" height="50" rx="3" fill="#1A0E0A" stroke="#D4A845" stroke-width="1"/>
  <text x="575" y="308" fill="#D4A845" font-family="monospace" font-size="9" text-anchor="middle">REFINERY</text>
  <text x="575" y="320" fill="#7CB87C" font-family="monospace" font-size="8" text-anchor="middle">● RUNNING</text>
  <text x="575" y="332" fill="#4A4A50" font-family="monospace" font-size="8" text-anchor="middle">5 u/batch</text>

  <!-- ══ HARVESTERS ══ -->
  <!-- Top-left cluster -->
  <rect x="60" y="70" width="80" height="55" rx="3" fill="#1A1A0E" stroke="#D4A845" stroke-width="1"/>
  <text x="100" y="88" fill="#D4A845" font-family="monospace" font-size="8" text-anchor="middle">HARVESTER A</text>
  <rect x="68" y="93" width="64" height="8" rx="1" fill="#070710" stroke="#404048" stroke-width="0.5"/>
  <rect x="69" y="94" width="16" height="6" rx="0.5" fill="#D4A845" opacity="0.6"/>
  <text x="100" y="100" fill="#D4A845" font-family="monospace" font-size="7" text-anchor="middle">FUEL 20%</text>
  <rect x="68" y="105" width="64" height="8" rx="1" fill="#070710" stroke="#404048" stroke-width="0.5"/>
  <rect x="69" y="106" width="51" height="6" rx="0.5" fill="#C0C0C8" opacity="0.4"/>
  <text x="100" y="113" fill="#C0C0C8" font-family="monospace" font-size="7" text-anchor="middle">HOP 79%</text>

  <!-- Top-right cluster -->
  <rect x="660" y="70" width="80" height="55" rx="3" fill="#1A1A0E" stroke="#D4A845" stroke-width="1"/>
  <text x="700" y="88" fill="#D4A845" font-family="monospace" font-size="8" text-anchor="middle">HARVESTER B</text>
  <rect x="668" y="93" width="64" height="8" rx="1" fill="#070710" stroke="#404048" stroke-width="0.5"/>
  <rect x="669" y="94" width="41" height="6" rx="0.5" fill="#D4A845" opacity="0.6"/>
  <text x="700" y="100" fill="#D4A845" font-family="monospace" font-size="7" text-anchor="middle">FUEL 63%</text>
  <rect x="668" y="105" width="64" height="8" rx="1" fill="#070710" stroke="#404048" stroke-width="0.5"/>
  <rect x="669" y="106" width="32" height="6" rx="0.5" fill="#C0C0C8" opacity="0.4"/>
  <text x="700" y="113" fill="#C0C0C8" font-family="monospace" font-size="7" text-anchor="middle">HOP 49%</text>

  <!-- Far top harvester -->
  <rect x="340" y="55" width="120" height="55" rx="3" fill="#1A1A0E" stroke="#D4A845" stroke-width="1"/>
  <text x="400" y="73" fill="#D4A845" font-family="monospace" font-size="8" text-anchor="middle">HARVESTER C (ELITE)</text>
  <rect x="350" y="78" width="100" height="8" rx="1" fill="#070710" stroke="#404048" stroke-width="0.5"/>
  <rect x="351" y="79" width="72" height="6" rx="0.5" fill="#D4A845" opacity="0.6"/>
  <text x="400" y="86" fill="#D4A845" font-family="monospace" font-size="7" text-anchor="middle">FUEL 71%</text>
  <rect x="350" y="92" width="100" height="8" rx="1" fill="#070710" stroke="#404048" stroke-width="0.5"/>
  <rect x="351" y="93" width="55" height="6" rx="0.5" fill="#C0C0C8" opacity="0.4"/>
  <text x="400" y="100" fill="#C0C0C8" font-family="monospace" font-size="7" text-anchor="middle">HOP 54%</text>

  <!-- ══ DRONE PATHS ══ -->

  <!-- MINING drones (blue) → to/from far deposits (top corners, organic ore nodes) -->
  <circle cx="50" cy="165" r="8" fill="#101018" stroke="#4848A0" stroke-width="1"/>
  <text x="50" y="178" fill="#4848A0" font-family="monospace" font-size="7" text-anchor="middle">ORE NODE</text>
  <circle cx="750" cy="165" r="8" fill="#101018" stroke="#4848A0" stroke-width="1"/>
  <text x="750" y="178" fill="#4848A0" font-family="monospace" font-size="7" text-anchor="middle">ORE NODE</text>

  <!-- REFUELING drones (amber dashes) — traveling to harvesters low on fuel -->
  <!-- Drone refueling A -->
  <polygon points="138,165 130,178 146,178" fill="#D4A845" opacity="0.85"/>
  <text x="138" y="190" fill="#D4A845" font-family="monospace" font-size="7" text-anchor="middle">REFUELING</text>
  <line x1="340" y1="250" x2="155" y2="172" stroke="#D4A845" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#a1)"/>

  <!-- Drone hauling ore from A -->
  <polygon points="185" />
  <polygon points="178,210 170,224 186,224" fill="#C0C0C8" opacity="0.75"/>
  <text x="178" y="236" fill="#C0C0C8" font-family="monospace" font-size="7" text-anchor="middle">HAULING</text>
  <line x1="180" y1="224" x2="265" y2="330" stroke="#C0C0C8" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#a3)"/>

  <!-- Mining drone left -->
  <polygon points="80" />
  <polygon points="76,248 68,262 84,262" fill="#8080C0" opacity="0.75"/>
  <text x="76" y="274" fill="#8080C0" font-family="monospace" font-size="7" text-anchor="middle">MINING</text>
  <line x1="76" y1="248" x2="58" y2="172" stroke="#8080C0" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#a4)"/>

  <!-- Drone right side hauling -->
  <polygon points="624,200 616,214 632,214" fill="#C0C0C8" opacity="0.75"/>
  <text x="624" y="226" fill="#C0C0C8" font-family="monospace" font-size="7" text-anchor="middle">HAULING</text>
  <line x1="624" y1="200" x2="530" y2="310" stroke="#C0C0C8" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#a3)"/>

  <!-- Mining drone right -->
  <polygon points="724,248 716,262 732,262" fill="#8080C0" opacity="0.75"/>
  <text x="724" y="274" fill="#8080C0" font-family="monospace" font-size="7" text-anchor="middle">MINING</text>
  <line x1="724" y1="248" x2="742" y2="172" stroke="#8080C0" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#a4)"/>

  <!-- Refinery drones -->
  <polygon points="310,300 302,314 318,314" fill="#7CB87C" opacity="0.85"/>
  <text x="310" y="326" fill="#7CB87C" font-family="monospace" font-size="7" text-anchor="middle">CARRYING</text>
  <text x="310" y="335" fill="#7CB87C" font-family="monospace" font-size="7" text-anchor="middle">ORE→REF</text>

  <!-- Idle drones at bay -->
  <polygon points="380" />
  <polygon points="370,280 362,294 378,294" fill="#4A4A50" opacity="0.75"/>
  <text x="370" y="306" fill="#4A4A50" font-family="monospace" font-size="7" text-anchor="middle">IDLE</text>
  <polygon points="430,280 422,294 438,294" fill="#4A4A50" opacity="0.75"/>
  <text x="430" y="306" fill="#4A4A50" font-family="monospace" font-size="7" text-anchor="middle">IDLE</text>

  <!-- Haul from refinery to depot -->
  <polygon points="340,380 332,366 348,366" fill="#C0C0C8" opacity="0.75"/>
  <line x1="340" y1="370" x2="340" y2="390" stroke="#C0C0C8" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#a3)"/>

  <!-- ══ LEGEND ══ -->
  <rect x="20" y="450" width="760" height="75" rx="4" fill="#0E0E1A" stroke="#404048" stroke-width="1"/>
  <text x="30" y="468" class="title" font-size="10">DRONE TASK STATES</text>

  <!-- Swatches -->
  <polygon points="100,475 93,488 107,488" fill="#8080C0" opacity="0.85"/>
  <text x="115" y="485" class="label">MINING — scout/heavy at ore node or deposit</text>

  <polygon points="100,498 93,511 107,511" fill="#D4A845" opacity="0.85"/>
  <text x="115" y="508" class="label">REFUELING — refinery drone carrying gas to harvester</text>

  <polygon points="420,475 413,488 427,488" fill="#C0C0C8" opacity="0.75"/>
  <text x="435" y="485" class="label">HAULING — drone carrying ore/materials to depot or refinery</text>

  <polygon points="420,498 413,511 427,511" fill="#4A4A50" opacity="0.75"/>
  <text x="435" y="508" class="label">IDLE — awaiting task assignment in zone or at bay</text>
</svg>

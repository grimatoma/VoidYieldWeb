<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" shape-rendering="crispEdges" font-family="monospace">
  <!-- dimmed world behind -->
  <rect width="960" height="540" fill="#1a1a1d" fill-opacity="1"/>
  <rect width="960" height="540" fill="#0a0a10" fill-opacity="0.6"/>
  <text x="380" y="60" fill="#4a4a50" font-size="18">// game paused //</text>

  <g transform="translate(320,90)">
    <rect width="320" height="400" fill="#2a2a2e" stroke="#4a4a50" stroke-width="2"/>
    <g fill="#d4a843">
      <rect x="4" y="4" width="3" height="3"/>
      <rect x="313" y="4" width="3" height="3"/>
      <rect x="4" y="393" width="3" height="3"/>
      <rect x="313" y="393" width="3" height="3"/>
    </g>
    <rect x="0" y="0" width="320" height="36" fill="#15151a"/>
    <text x="120" y="24" fill="#d4a843" font-size="16" font-weight="bold">PAUSED</text>

    <!-- action buttons -->
    <g transform="translate(40,56)">
      <rect width="240" height="36" fill="#2a2a2e" stroke="#d4a843" stroke-width="2"/>
      <text x="92" y="24" fill="#d4a843" font-size="13" font-weight="bold">RESUME</text>
    </g>
    <g transform="translate(40,100)">
      <rect width="240" height="36" fill="#2a2a2e" stroke="#4a4a50"/>
      <text x="84" y="24" fill="#d4a843" font-size="13">SETTINGS</text>
    </g>
    <g transform="translate(40,144)">
      <rect width="240" height="36" fill="#2a2a2e" stroke="#4a4a50"/>
      <text x="64" y="24" fill="#d4a843" font-size="13">SAVE &amp; QUIT</text>
    </g>

    <!-- divider -->
    <rect x="20" y="194" width="280" height="2" fill="#4a4a50"/>
    <text x="134" y="214" fill="#a88a4a" font-size="10">SETTINGS</text>

    <!-- sliders -->
    <g transform="translate(20,224)">
      <text x="0" y="12" fill="#a88a4a" font-size="10">SFX</text>
      <rect x="60" y="2" width="180" height="12" fill="#15151a" stroke="#4a4a50"/>
      <g fill="#d4a843">
        <rect x="62" y="4" width="12" height="8"/>
        <rect x="76" y="4" width="12" height="8"/>
        <rect x="90" y="4" width="12" height="8"/>
        <rect x="104" y="4" width="12" height="8"/>
        <rect x="118" y="4" width="12" height="8"/>
        <rect x="132" y="4" width="12" height="8"/>
        <rect x="146" y="4" width="12" height="8"/>
        <rect x="160" y="4" width="12" height="8"/>
      </g>
      <text x="246" y="12" fill="#d4a843" font-size="10">80%</text>
    </g>
    <g transform="translate(20,248)">
      <text x="0" y="12" fill="#a88a4a" font-size="10">MUSIC</text>
      <rect x="60" y="2" width="180" height="12" fill="#15151a" stroke="#4a4a50"/>
      <g fill="#d4a843">
        <rect x="62" y="4" width="12" height="8"/>
        <rect x="76" y="4" width="12" height="8"/>
        <rect x="90" y="4" width="12" height="8"/>
        <rect x="104" y="4" width="12" height="8"/>
        <rect x="118" y="4" width="12" height="8"/>
        <rect x="132" y="4" width="12" height="8"/>
      </g>
      <text x="246" y="12" fill="#d4a843" font-size="10">60%</text>
    </g>

    <!-- toggles -->
    <g transform="translate(20,280)">
      <text x="0" y="12" fill="#a88a4a" font-size="10">SHAKE</text>
      <rect x="200" y="0" width="50" height="18" fill="#2a2a2e" stroke="#7cb87c"/>
      <rect x="222" y="2" width="26" height="14" fill="#7cb87c"/>
      <text x="225" y="13" fill="#15151a" font-size="9">ON</text>
    </g>
    <g transform="translate(20,306)">
      <text x="0" y="12" fill="#a88a4a" font-size="10">COLORBLIND</text>
      <rect x="200" y="0" width="50" height="18" fill="#2a2a2e" stroke="#4a4a50"/>
      <rect x="202" y="2" width="22" height="14" fill="#4a4a50"/>
      <text x="226" y="13" fill="#4a4a50" font-size="9">OFF</text>
    </g>

    <!-- dropdown -->
    <g transform="translate(20,332)">
      <text x="0" y="12" fill="#a88a4a" font-size="10">PIXEL SCALE</text>
      <rect x="180" y="0" width="80" height="18" fill="#15151a" stroke="#4a4a50"/>
      <text x="188" y="13" fill="#d4a843" font-size="10">AUTO</text>
      <polygon points="246,4 254,4 250,12" fill="#d4a843"/>
    </g>
    <g transform="translate(20,358)">
      <text x="0" y="12" fill="#a88a4a" font-size="10">CONTROLS</text>
      <rect x="180" y="0" width="80" height="18" fill="#2a2a2e" stroke="#4a4a50"/>
      <text x="198" y="13" fill="#d4a843" font-size="10">REBIND</text>
    </g>
  </g>

  <g>
    <rect x="0" y="516" width="960" height="24" fill="#1a1a1d"/>
    <text x="8" y="532" fill="#a88a4a" font-size="10">07 — PAUSE / SETTINGS OVERLAY</text>
  </g>
</svg>

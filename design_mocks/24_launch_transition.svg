<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" shape-rendering="crispEdges" font-family="monospace">
  <defs>
    <pattern id="warpstars" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="#04040a"/>
      <rect x="20"  y="14"  width="1" height="1" fill="#d4a843" fill-opacity="0.7"/>
      <rect x="88"  y="30"  width="1" height="1" fill="#a88a4a" fill-opacity="0.5"/>
      <rect x="50"  y="72"  width="2" height="2" fill="#d4a843" fill-opacity="0.6"/>
      <rect x="100" y="90"  width="1" height="1" fill="#5a8fa8" fill-opacity="0.4"/>
      <rect x="10"  y="100" width="1" height="1" fill="#a88a4a" fill-opacity="0.4"/>
      <rect x="70"  y="50"  width="1" height="1" fill="#d4a843" fill-opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="960" height="540" fill="url(#warpstars)"/>

  <!-- Star speed streaks radiating from center (warp effect) -->
  <!-- horizontal streaks -->
  <line x1="480" y1="270" x2="20"  y2="160" stroke="#d4a843" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="480" y1="270" x2="940" y2="160" stroke="#d4a843" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="480" y1="270" x2="20"  y2="380" stroke="#d4a843" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="480" y1="270" x2="940" y2="380" stroke="#d4a843" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="480" y1="270" x2="0"   y2="270" stroke="#d4a843" stroke-opacity="0.18" stroke-width="1"/>
  <line x1="480" y1="270" x2="960" y2="270" stroke="#d4a843" stroke-opacity="0.18" stroke-width="1"/>
  <line x1="480" y1="270" x2="0"   y2="50"  stroke="#d4a843" stroke-opacity="0.1"  stroke-width="1"/>
  <line x1="480" y1="270" x2="960" y2="50"  stroke="#d4a843" stroke-opacity="0.1"  stroke-width="1"/>
  <line x1="480" y1="270" x2="0"   y2="490" stroke="#d4a843" stroke-opacity="0.1"  stroke-width="1"/>
  <line x1="480" y1="270" x2="960" y2="490" stroke="#d4a843" stroke-opacity="0.1"  stroke-width="1"/>
  <line x1="480" y1="270" x2="480" y2="0"   stroke="#d4a843" stroke-opacity="0.2"  stroke-width="1"/>
  <line x1="480" y1="270" x2="240" y2="0"   stroke="#d4a843" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="480" y1="270" x2="720" y2="0"   stroke="#d4a843" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Ship silhouette (ascending center-right, tilted slightly up) -->
  <g transform="translate(560,120) rotate(-20)">
    <!-- engine glow (trailing) -->
    <rect x="18" y="52" width="6"  height="14" fill="#5a8fa8" fill-opacity="0.5"/>
    <rect x="30" y="52" width="6"  height="14" fill="#5a8fa8" fill-opacity="0.5"/>
    <rect x="18" y="64" width="6"  height="10" fill="#5a8fa8" fill-opacity="0.3"/>
    <rect x="30" y="64" width="6"  height="10" fill="#5a8fa8" fill-opacity="0.3"/>
    <rect x="20" y="72" width="4"  height="20" fill="#d4a843" fill-opacity="0.35"/>
    <rect x="32" y="72" width="4"  height="20" fill="#d4a843" fill-opacity="0.35"/>
    <!-- hull -->
    <polygon points="27,0 10,20 44,20" fill="#4a4a50"/>
    <rect x="10" y="20" width="34" height="32" fill="#3a3a40"/>
    <rect x="12" y="24" width="30" height="2"  fill="#4a4a50"/>
    <rect x="12" y="30" width="30" height="2"  fill="#4a4a50"/>
    <rect x="12" y="36" width="30" height="2"  fill="#4a4a50"/>
    <!-- engine ports -->
    <rect x="14" y="50" width="10" height="6"  fill="#5a8fa8" fill-opacity="0.6"/>
    <rect x="30" y="50" width="10" height="6"  fill="#5a8fa8" fill-opacity="0.6"/>
    <!-- cockpit -->
    <rect x="22" y="16" width="10" height="8"  fill="#5a8fa8" fill-opacity="0.35" stroke="#4a4a50"/>
  </g>

  <!-- ========== TRANSIT OVERLAY PANEL ========== -->
  <!-- scrim -->
  <rect x="180" y="140" width="600" height="264" fill="#1a1a1d" fill-opacity="0.88"/>
  <rect x="180" y="140" width="600" height="264" fill="none"   stroke="#4a4a50" stroke-width="2"/>
  <!-- panel rivets -->
  <rect x="184" y="144" width="4" height="4" fill="#d4a843"/>
  <rect x="772" y="144" width="4" height="4" fill="#d4a843"/>
  <rect x="184" y="396" width="4" height="4" fill="#d4a843"/>
  <rect x="772" y="396" width="4" height="4" fill="#d4a843"/>

  <!-- header stripe -->
  <rect x="180" y="140" width="600" height="36" fill="#15151a"/>
  <text x="316" y="165" fill="#d4a843" font-size="18" font-weight="bold">TRANSIT IN PROGRESS</text>

  <!-- route info -->
  <g transform="translate(188,194)">
    <!-- from -->
    <text x="0"   y="14" fill="#a88a4a" font-size="9">DEPARTING</text>
    <text x="0"   y="28" fill="#d4a843" font-size="13" font-weight="bold">A1 · IRON ROCK</text>
    <!-- arrow -->
    <text x="218" y="28" fill="#4a4a50" font-size="18">──────▶</text>
    <!-- to -->
    <text x="362" y="14" fill="#a88a4a" font-size="9">ARRIVING</text>
    <text x="362" y="28" fill="#5a8fa8" font-size="13" font-weight="bold">A2 · CRYSTAL DRIFT</text>
  </g>

  <!-- divider -->
  <rect x="196" y="236" width="568" height="1" fill="#4a4a50"/>

  <!-- progress bar label + ETA -->
  <text x="196" y="256" fill="#a88a4a" font-size="9">FLIGHT PROGRESS</text>
  <text x="724" y="256" fill="#d4a843" font-size="9" font-weight="bold">ETA  14s</text>

  <!-- segmented progress bar (12 cells, 6 filled) -->
  <g transform="translate(196,262)">
    <rect width="568" height="14" fill="#0a0a10" stroke="#4a4a50"/>
    <rect x="2"  y="2" width="44" height="10" fill="#5a8fa8"/>
    <rect x="48" y="2" width="44" height="10" fill="#5a8fa8"/>
    <rect x="94" y="2" width="44" height="10" fill="#5a8fa8"/>
    <rect x="140" y="2" width="44" height="10" fill="#5a8fa8"/>
    <rect x="186" y="2" width="44" height="10" fill="#5a8fa8"/>
    <rect x="232" y="2" width="44" height="10" fill="#5a8fa8"/>
    <!-- remaining empty cells -->
    <rect x="278" y="2" width="44" height="10" fill="#2a2a2e"/>
    <rect x="324" y="2" width="44" height="10" fill="#2a2a2e"/>
    <rect x="370" y="2" width="44" height="10" fill="#2a2a2e"/>
    <rect x="416" y="2" width="44" height="10" fill="#2a2a2e"/>
    <rect x="462" y="2" width="44" height="10" fill="#2a2a2e"/>
    <rect x="508" y="2" width="44" height="10" fill="#2a2a2e"/>
    <!-- cell dividers -->
    <rect x="46"  y="0" width="2" height="14" fill="#0a0a10"/>
    <rect x="92"  y="0" width="2" height="14" fill="#0a0a10"/>
    <rect x="138" y="0" width="2" height="14" fill="#0a0a10"/>
    <rect x="184" y="0" width="2" height="14" fill="#0a0a10"/>
    <rect x="230" y="0" width="2" height="14" fill="#0a0a10"/>
    <rect x="276" y="0" width="2" height="14" fill="#0a0a10"/>
    <rect x="322" y="0" width="2" height="14" fill="#0a0a10"/>
    <rect x="368" y="0" width="2" height="14" fill="#0a0a10"/>
    <rect x="414" y="0" width="2" height="14" fill="#0a0a10"/>
    <rect x="460" y="0" width="2" height="14" fill="#0a0a10"/>
    <rect x="506" y="0" width="2" height="14" fill="#0a0a10"/>
  </g>

  <!-- cargo summary -->
  <g transform="translate(188,296)">
    <rect width="568" height="44" fill="#15151a" stroke="#4a4a50"/>
    <text x="10" y="15" fill="#a88a4a" font-size="9">SHIP CARGO HOLD</text>
    <!-- item icons + counts -->
    <polygon points="52,32 46,22 52,16 58,22" fill="#5a8fa8"/>
    <text x="62"  y="30" fill="#d4a843" font-size="9">CRYSTAL  x12</text>
    <rect x="158" y="20" width="8" height="8" fill="#a88a4a"/>
    <text x="170" y="30" fill="#d4a843" font-size="9">ORE  x0</text>
    <text x="10"  y="40" fill="#4a4a50" font-size="7">Max hold: 50 units · Sell at A1 terminal on arrival</text>
  </g>

  <!-- ABORT button -->
  <g transform="translate(188,352)">
    <rect width="568" height="32" fill="#2a2a2e" stroke="#8b3a2a" stroke-width="1"/>
    <text x="246" y="21" fill="#8b3a2a" font-size="11">ABORT TRANSIT  (return to A1)</text>
  </g>

  <!-- flavor -->
  <text x="480" y="418" fill="#4a4a50" font-size="8" text-anchor="middle">TRANSIT IS AUTOMATIC — PLAYER CANNOT MOVE DURING FLIGHT</text>

  <!-- Bottom label bar -->
  <rect x="0" y="516" width="960" height="24" fill="#1a1a1d"/>
  <text x="8" y="532" fill="#a88a4a" font-size="10">14 — LAUNCH / TRAVEL TRANSITION  ·  in-flight overlay · progress bar · cargo summary · abort option</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" shape-rendering="crispEdges" font-family="monospace">
  <!-- Near-black background — boot context, nothing loaded yet -->
  <rect width="960" height="540" fill="#04040a"/>

  <!-- Distant star noise — very sparse, very dim -->
  <rect x="80"  y="40"  width="1" height="1" fill="#d4a843" fill-opacity="0.25"/>
  <rect x="400" y="80"  width="1" height="1" fill="#a88a4a" fill-opacity="0.2"/>
  <rect x="780" y="30"  width="1" height="1" fill="#d4a843" fill-opacity="0.2"/>
  <rect x="200" y="480" width="1" height="1" fill="#a88a4a" fill-opacity="0.15"/>
  <rect x="820" y="460" width="1" height="1" fill="#d4a843" fill-opacity="0.2"/>
  <rect x="560" y="500" width="1" height="1" fill="#a88a4a" fill-opacity="0.15"/>
  <rect x="100" y="280" width="1" height="1" fill="#d4a843" fill-opacity="0.15"/>
  <rect x="860" y="310" width="1" height="1" fill="#a88a4a" fill-opacity="0.15"/>

  <!-- Very faint asteroid silhouette at bottom — sets mood -->
  <path d="M 0 440 Q 180 410 360 440 Q 560 475 960 430 L 960 540 L 0 540 Z" fill="#0c0c14"/>
  <path d="M 0 460 Q 200 430 400 460 Q 600 490 960 450 L 960 480 Q 600 510 400 480 Q 200 450 0 480 Z" fill="#0e0e18"/>

  <!-- ========== TITLE LOGO ========== -->
  <g transform="translate(0,140)">
    <!-- rust shadow offset -->
    <text x="162" y="82" fill="#8b3a2a" font-size="80" font-weight="bold" font-family="monospace">VOID YIELD</text>
    <!-- amber primary -->
    <text x="160" y="80" fill="#d4a843" font-size="80" font-weight="bold" font-family="monospace">VOID YIELD</text>
    <!-- subtitle -->
    <text x="356" y="106" fill="#a88a4a" font-size="13">— A MINER&apos;S PROBLEM —</text>
  </g>

  <!-- ========== BOOT LOG (terminal-style scrolling text area) ========== -->
  <g transform="translate(280,280)">
    <rect width="400" height="120" fill="#0a0a10" stroke="#4a4a50"/>
    <!-- scanlines -->
    <g fill="#d4a843" fill-opacity="0.05">
      <rect y="4"   width="400" height="1"/>
      <rect y="12"  width="400" height="1"/>
      <rect y="20"  width="400" height="1"/>
      <rect y="28"  width="400" height="1"/>
      <rect y="36"  width="400" height="1"/>
      <rect y="44"  width="400" height="1"/>
      <rect y="52"  width="400" height="1"/>
      <rect y="60"  width="400" height="1"/>
      <rect y="68"  width="400" height="1"/>
      <rect y="76"  width="400" height="1"/>
      <rect y="84"  width="400" height="1"/>
      <rect y="92"  width="400" height="1"/>
      <rect y="100" width="400" height="1"/>
      <rect y="108" width="400" height="1"/>
      <rect y="116" width="400" height="1"/>
    </g>
    <!-- boot log lines (oldest at top, dimmer) -->
    <text x="10" y="16"  fill="#4a4a50" font-size="8">VOID OS 0.1  ·  BOOT SEQUENCE STARTED</text>
    <text x="10" y="28"  fill="#4a4a50" font-size="8">CHECKING HULL INTEGRITY.................. OK</text>
    <text x="10" y="40"  fill="#a88a4a" font-size="8">LOADING MINING SYSTEMS................... OK</text>
    <text x="10" y="52"  fill="#a88a4a" font-size="8">CALIBRATING DRILL DRIVER................. OK</text>
    <text x="10" y="64"  fill="#a88a4a" font-size="8">SYNCING RESOURCE DATABASE................ OK</text>
    <text x="10" y="76"  fill="#d4a843" font-size="8">INITIALIZING DRONE SUBSYSTEM............. OK</text>
    <text x="10" y="88"  fill="#d4a843" font-size="8">LOADING SAVE DATA........................ </text>
    <text x="248" y="88" fill="#7cb87c" font-size="8">FOUND</text>
    <text x="10" y="100" fill="#d4a843" font-size="8">ESTABLISHING RELAY LINK..................</text>
    <text x="10" y="112" fill="#d4a843" font-size="8">READY_<rect x="0" y="-10" width="6" height="12" fill="#d4a843"/></text>
    <!-- blinking cursor annotation -->
    <text x="54"  y="112" fill="#d4a843" font-size="8">_</text>
    <text x="310" y="116" fill="#4a4a50" font-size="7">[cursor blinks here]</text>
  </g>

  <!-- ========== LOADING BAR ========== -->
  <g transform="translate(280,416)">
    <text x="0" y="-4" fill="#a88a4a" font-size="8">INITIALIZING</text>
    <rect width="400" height="12" fill="#0a0a10" stroke="#4a4a50"/>
    <!-- 11 of 14 cells filled -->
    <rect x="2"   y="2" width="26" height="8" fill="#d4a843"/>
    <rect x="30"  y="2" width="26" height="8" fill="#d4a843"/>
    <rect x="58"  y="2" width="26" height="8" fill="#d4a843"/>
    <rect x="86"  y="2" width="26" height="8" fill="#d4a843"/>
    <rect x="114" y="2" width="26" height="8" fill="#d4a843"/>
    <rect x="142" y="2" width="26" height="8" fill="#d4a843"/>
    <rect x="170" y="2" width="26" height="8" fill="#d4a843"/>
    <rect x="198" y="2" width="26" height="8" fill="#d4a843"/>
    <rect x="226" y="2" width="26" height="8" fill="#d4a843"/>
    <rect x="254" y="2" width="26" height="8" fill="#d4a843"/>
    <rect x="282" y="2" width="26" height="8" fill="#d4a843"/>
    <rect x="310" y="2" width="26" height="8" fill="#d4a843" fill-opacity="0.35"/>
    <rect x="338" y="2" width="26" height="8" fill="#2a2a2e"/>
    <rect x="366" y="2" width="26" height="8" fill="#2a2a2e"/>
    <!-- dividers -->
    <rect x="28"  y="0" width="2" height="12" fill="#0a0a10"/>
    <rect x="56"  y="0" width="2" height="12" fill="#0a0a10"/>
    <rect x="84"  y="0" width="2" height="12" fill="#0a0a10"/>
    <rect x="112" y="0" width="2" height="12" fill="#0a0a10"/>
    <rect x="140" y="0" width="2" height="12" fill="#0a0a10"/>
    <rect x="168" y="0" width="2" height="12" fill="#0a0a10"/>
    <rect x="196" y="0" width="2" height="12" fill="#0a0a10"/>
    <rect x="224" y="0" width="2" height="12" fill="#0a0a10"/>
    <rect x="252" y="0" width="2" height="12" fill="#0a0a10"/>
    <rect x="280" y="0" width="2" height="12" fill="#0a0a10"/>
    <rect x="308" y="0" width="2" height="12" fill="#0a0a10"/>
    <rect x="336" y="0" width="2" height="12" fill="#0a0a10"/>
    <rect x="364" y="0" width="2" height="12" fill="#0a0a10"/>
  </g>

  <!-- version string bottom-left -->
  <text x="12"  y="508" fill="#4a4a50" font-size="8">BUILT FROM SCRAP  ·  PRE-ALPHA</text>
  <text x="12"  y="520" fill="#a88a4a" font-size="9">v0.1</text>

  <!-- studio / platform tags bottom-right -->
  <g transform="translate(880,498)">
    <rect width="16" height="16" fill="#2a2a2e" stroke="#4a4a50"/>
    <text x="3" y="12" fill="#d4a843" font-size="10">ITC</text>
    <rect x="22" y="0" width="16" height="16" fill="#2a2a2e" stroke="#4a4a50"/>
    <text x="26" y="12" fill="#d4a843" font-size="10">DC</text>
  </g>

  <!-- Bottom label bar -->
  <rect x="0" y="516" width="960" height="24" fill="#1a1a1d"/>
  <text x="8" y="532" fill="#a88a4a" font-size="10">15 — BOOT / SPLASH  ·  boot log terminal, segmented load bar, near-black mood · no UI loaded yet</text>
</svg>

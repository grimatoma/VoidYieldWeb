<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" shape-rendering="crispEdges" font-family="monospace">
  <defs>
    <pattern id="starsmenu" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="#0a0a10"/>
      <rect x="12" y="20" width="1" height="1" fill="#d4a843"/>
      <rect x="48" y="36" width="1" height="1" fill="#a88a4a"/>
      <rect x="28" y="60" width="1" height="1" fill="#7cb87c"/>
      <rect x="68" y="12" width="2" height="2" fill="#d4a843"/>
      <rect x="58" y="72" width="1" height="1" fill="#a88a4a"/>
    </pattern>
  </defs>
  <rect width="960" height="540" fill="url(#starsmenu)"/>

  <!-- distant planet -->
  <g transform="translate(720,80)">
    <circle cx="0" cy="0" r="64" fill="#3a2a1e"/>
    <circle cx="-10" cy="-14" r="8" fill="#2a1a10"/>
    <circle cx="18" cy="10" r="12" fill="#4a3020"/>
  </g>

  <!-- foreground asteroid silhouette -->
  <g>
    <path d="M 0 420 Q 200 380 400 420 Q 600 460 960 410 L 960 540 L 0 540 Z" fill="#15151a"/>
    <path d="M 0 430 Q 200 400 400 430 Q 600 470 960 420 L 960 440 Q 600 480 400 440 Q 200 410 0 440 Z" fill="#1a1a1d"/>
  </g>

  <!-- miner silhouette -->
  <g transform="translate(180,380)">
    <rect x="0" y="0" width="16" height="24" fill="#2a2a2e"/>
    <rect x="-2" y="24" width="6" height="10" fill="#2a2a2e"/>
    <rect x="12" y="24" width="6" height="10" fill="#2a2a2e"/>
    <rect x="16" y="6" width="14" height="2" fill="#2a2a2e"/>
    <rect x="28" y="4" width="3" height="6" fill="#2a2a2e"/>
  </g>

  <!-- drifting drone -->
  <g transform="translate(600,240)">
    <rect x="0" y="0" width="18" height="12" fill="#4a4a50"/>
    <rect x="-3" y="3" width="3" height="6" fill="#4a4a50"/>
    <rect x="18" y="3" width="3" height="6" fill="#4a4a50"/>
    <rect x="7" y="12" width="1" height="4" fill="#d4a843" fill-opacity="0.6"/>
    <rect x="10" y="12" width="1" height="4" fill="#d4a843" fill-opacity="0.6"/>
  </g>

  <!-- TITLE LOGO -->
  <g transform="translate(240,110)">
    <!-- shadow/rust offset -->
    <text x="2" y="62" fill="#8b3a2a" font-size="64" font-weight="bold" font-family="monospace">VOID YIELD</text>
    <text x="0" y="60" fill="#d4a843" font-size="64" font-weight="bold" font-family="monospace">VOID YIELD</text>
    <text x="96" y="88" fill="#a88a4a" font-size="12">— A MINER&apos;S PROBLEM —</text>
  </g>

  <!-- buttons stack -->
  <g transform="translate(360,230)">
    <g>
      <rect width="240" height="36" fill="#2a2a2e" stroke="#d4a843" stroke-width="2"/>
      <rect x="2" y="2" width="3" height="3" fill="#d4a843"/>
      <rect x="235" y="2" width="3" height="3" fill="#d4a843"/>
      <rect x="2" y="31" width="3" height="3" fill="#d4a843"/>
      <rect x="235" y="31" width="3" height="3" fill="#d4a843"/>
      <text x="76" y="24" fill="#d4a843" font-size="14" font-weight="bold">NEW GAME</text>
    </g>
    <g transform="translate(0,46)">
      <rect width="240" height="36" fill="#2a2a2e" stroke="#4a4a50"/>
      <text x="80" y="24" fill="#d4a843" font-size="13">CONTINUE</text>
      <text x="108" y="33" fill="#a88a4a" font-size="7">SAVE — 32 MIN</text>
    </g>
    <g transform="translate(0,92)">
      <rect width="240" height="36" fill="#2a2a2e" stroke="#4a4a50"/>
      <text x="82" y="24" fill="#d4a843" font-size="13">SETTINGS</text>
    </g>
    <g transform="translate(0,138)" opacity="0.6">
      <rect width="240" height="36" fill="#2a2a2e" stroke="#4a4a50"/>
      <text x="90" y="24" fill="#d4a843" font-size="13">CREDITS</text>
    </g>
  </g>

  <!-- version -->
  <text x="12" y="524" fill="#a88a4a" font-size="9">v0.1 — PRE-ALPHA</text>
  <text x="12" y="508" fill="#4a4a50" font-size="8">BUILT FROM SCRAP</text>
  <!-- social -->
  <g transform="translate(880,500)">
    <rect width="16" height="16" fill="#2a2a2e" stroke="#4a4a50"/>
    <text x="3" y="12" fill="#d4a843" font-size="10">ITC</text>
    <rect x="24" width="16" height="16" fill="#2a2a2e" stroke="#4a4a50"/>
    <text x="28" y="12" fill="#d4a843" font-size="10">DC</text>
  </g>

  <g>
    <rect x="0" y="516" width="720" height="24" fill="none"/>
    <text x="360" y="532" fill="#a88a4a" font-size="10">08 — MAIN MENU</text>
  </g>
</svg>

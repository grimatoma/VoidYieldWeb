<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="spaceGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d0a1e"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <radialGradient id="warpPortal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c090ff" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#6030c0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2010a0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hudBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1e38" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#080e20" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#100820"/>
      <stop offset="100%" stop-color="#06040f"/>
    </linearGradient>
    <filter id="glowWarp">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#9060e0" flood-opacity="0.9" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGold">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#4caf7d" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowRed">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#e05555" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Deep space background -->
  <rect width="960" height="540" fill="url(#spaceGrad)"/>

  <!-- Stars (dense, dramatic) -->
  <g opacity="0.7">
    <circle cx="45" cy="43" r="0.8" fill="#fff"/><circle cx="134" cy="104" r="0.5" fill="#e0e0ff"/>
    <circle cx="234" cy="34" r="1" fill="#fff"/><circle cx="312" cy="189" r="0.6" fill="#a0e0ff"/>
    <circle cx="445" cy="61" r="0.8" fill="#fff"/><circle cx="567" cy="155" r="0.5" fill="#c0c0ff"/>
    <circle cx="698" cy="38" r="1" fill="#fff"/><circle cx="812" cy="172" r="0.7" fill="#fff"/>
    <circle cx="920" cy="80" r="0.9" fill="#c0a0ff"/><circle cx="78" cy="215" r="0.6" fill="#fff"/>
    <circle cx="189" cy="278" r="0.8" fill="#a0c0ff"/><circle cx="856" cy="323" r="0.5" fill="#fff"/>
    <circle cx="34" cy="380" r="0.9" fill="#fff"/><circle cx="745" cy="417" r="0.6" fill="#c0c0ff"/>
    <circle cx="867" cy="463" r="0.5" fill="#a0e0ff"/><circle cx="123" cy="489" r="0.7" fill="#fff"/>
    <circle cx="540" cy="430" r="0.8" fill="#fff"/><circle cx="290" cy="370" r="0.5" fill="#e0e0ff"/>
    <circle cx="680" cy="480" r="0.6" fill="#fff"/><circle cx="900" cy="510" r="0.5" fill="#fff"/>
    <circle cx="60" cy="510" r="0.7" fill="#e0e0ff"/><circle cx="400" cy="490" r="0.6" fill="#fff"/>
  </g>

  <!-- Warp gate silhouette (background, glowing) -->
  <!-- Gate outer ring -->
  <circle cx="480" cy="270" r="155" fill="none" stroke="#9060e0" stroke-width="6" opacity="0.3" filter="url(#glowWarp)"/>
  <circle cx="480" cy="270" r="130" fill="none" stroke="#c090ff" stroke-width="2" opacity="0.2"/>
  <!-- Warp portal opening (active!) -->
  <circle cx="480" cy="270" r="120" fill="url(#warpPortal)" opacity="0.9"/>
  <!-- Warp energy streams radiating inward -->
  <line x1="480" y1="150" x2="480" y2="195" stroke="#c090ff" stroke-width="2" opacity="0.4"/>
  <line x1="480" y1="345" x2="480" y2="390" stroke="#c090ff" stroke-width="2" opacity="0.4"/>
  <line x1="360" y1="270" x2="405" y2="270" stroke="#c090ff" stroke-width="2" opacity="0.4"/>
  <line x1="555" y1="270" x2="600" y2="270" stroke="#c090ff" stroke-width="2" opacity="0.4"/>
  <!-- Diagonal streams -->
  <line x1="395" y1="185" x2="422" y2="212" stroke="#c090ff" stroke-width="1.5" opacity="0.3"/>
  <line x1="565" y1="185" x2="538" y2="212" stroke="#c090ff" stroke-width="1.5" opacity="0.3"/>
  <line x1="395" y1="355" x2="422" y2="328" stroke="#c090ff" stroke-width="1.5" opacity="0.3"/>
  <line x1="565" y1="355" x2="538" y2="328" stroke="#c090ff" stroke-width="1.5" opacity="0.3"/>
  <!-- Inner bright core -->
  <circle cx="480" cy="270" r="45" fill="#2010a0" opacity="0.6"/>
  <circle cx="480" cy="270" r="28" fill="#4020c0" opacity="0.5"/>
  <circle cx="480" cy="270" r="14" fill="#c090ff" opacity="0.7" filter="url(#glowWarp)"/>

  <!-- Gate frame pylons at bottom -->
  <rect x="414" y="405" width="20" height="50" rx="2" fill="#2a1a50" stroke="#7040c0" stroke-width="1" opacity="0.7"/>
  <rect x="526" y="405" width="20" height="50" rx="2" fill="#2a1a50" stroke="#7040c0" stroke-width="1" opacity="0.7"/>

  <!-- Gold glow behind panel -->
  <circle cx="480" cy="270" r="200" fill="url(#goldGlow)" opacity="0.3"/>

  <!-- Dark overlay for panel readability -->
  <rect width="960" height="540" fill="#000010" opacity="0.55"/>

  <!-- ═══ PRESTIGE CONFIRMATION PANEL ═══ -->
  <rect x="140" y="48" width="680" height="440" rx="5" fill="url(#panelGrad)" stroke="#ffd700" stroke-width="2.5" filter="url(#glowGold)" opacity="0.98"/>
  <!-- Header -->
  <rect x="140" y="48" width="680" height="58" rx="5" fill="#140c00"/>
  <rect x="140" y="93" width="680" height="13" fill="#140c00"/>
  <line x1="140" y1="106" x2="820" y2="106" stroke="#ffd700" stroke-width="1.5" opacity="0.8"/>
  <text x="480" y="72" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffd700" letter-spacing="4" filter="url(#glowGold)">BEGIN NEW CYCLE?</text>
  <text x="480" y="95" font-size="10" text-anchor="middle" fill="#9060e0">Warp Gate activated — dimensional transit ready</text>

  <!-- ═ WHAT CARRIES OVER ═ -->
  <text x="160" y="126" font-size="10" fill="#4caf7d" letter-spacing="2" font-weight="bold">✓  CARRIES OVER</text>
  <line x1="148" y1="130" x2="812" y2="130" stroke="#0a2010" stroke-width="0.5"/>

  <g font-size="9">
    <!-- Row 1 -->
    <rect x="152" y="134" width="300" height="30" rx="2" fill="#081808" stroke="#4caf7d" stroke-width="0.8"/>
    <text x="168" y="148" fill="#4caf7d">✓</text>
    <text x="182" y="148" fill="#e8d0a0">Survey Waypoints</text>
    <text x="444" y="148" text-anchor="end" fill="#4caf7d">All 12 marked deposits</text>
    <text x="168" y="160" fill="#3a5a40" font-size="7">Ore locations remembered across cycles</text>

    <rect x="460" y="134" width="348" height="30" rx="2" fill="#081808" stroke="#4caf7d" stroke-width="0.8"/>
    <text x="476" y="148" fill="#4caf7d">✓</text>
    <text x="490" y="148" fill="#e8d0a0">Research Points (10%)</text>
    <text x="800" y="148" text-anchor="end" fill="#4caf7d">⬡ 842 retained</text>
    <text x="476" y="160" fill="#3a5a40" font-size="7">Of your ⬡ 8,420 total  ·  compounds each cycle</text>

    <!-- Row 2 -->
    <rect x="152" y="168" width="300" height="30" rx="2" fill="#081808" stroke="#4caf7d" stroke-width="0.8"/>
    <text x="168" y="182" fill="#4caf7d">✓</text>
    <text x="182" y="182" fill="#e8d0a0">Custodian Bonuses</text>
    <text x="444" y="182" text-anchor="end" fill="#4caf7d">+1 Custodian slot</text>
    <text x="168" y="194" fill="#3a5a40" font-size="7">Permanent passive upgrades from prestige</text>

    <rect x="460" y="168" width="348" height="30" rx="2" fill="#081808" stroke="#4caf7d" stroke-width="0.8"/>
    <text x="476" y="182" fill="#4caf7d">✓</text>
    <text x="490" y="182" fill="#e8d0a0">Cycle Achievements</text>
    <text x="800" y="182" text-anchor="end" fill="#ffd700">+3 new unlocked</text>
    <text x="476" y="194" fill="#3a5a40" font-size="7">Permanent record — shown in career stats</text>

    <!-- Row 3 -->
    <rect x="152" y="202" width="656" height="30" rx="2" fill="#081808" stroke="#4caf7d" stroke-width="0.8"/>
    <text x="168" y="216" fill="#4caf7d">✓</text>
    <text x="182" y="216" fill="#e8d0a0">Schematic Library</text>
    <text x="800" y="216" text-anchor="end" fill="#4caf7d">24 recipes remembered</text>
    <text x="168" y="228" fill="#3a5a40" font-size="7">All crafting recipes unlock instantly in new cycle</text>
  </g>

  <!-- ═ WHAT RESETS ═ -->
  <text x="160" y="252" font-size="10" fill="#e05555" letter-spacing="2" font-weight="bold">✗  RESETS</text>
  <line x1="148" y1="256" x2="812" y2="256" stroke="#1a0808" stroke-width="0.5"/>

  <g font-size="9">
    <rect x="152" y="260" width="300" height="28" rx="2" fill="#100808" stroke="#e05555" stroke-width="0.8" opacity="0.8"/>
    <text x="168" y="278" fill="#e05555">✗</text>
    <text x="182" y="278" fill="#8a6060">Credits  (◈ 74,800 lost)</text>

    <rect x="460" y="260" width="348" height="28" rx="2" fill="#100808" stroke="#e05555" stroke-width="0.8" opacity="0.8"/>
    <text x="476" y="278" fill="#e05555">✗</text>
    <text x="490" y="278" fill="#8a6060">All buildings &amp; structures</text>

    <rect x="152" y="292" width="300" height="28" rx="2" fill="#100808" stroke="#e05555" stroke-width="0.8" opacity="0.8"/>
    <text x="168" y="310" fill="#e05555">✗</text>
    <text x="182" y="310" fill="#8a6060">Inventory &amp; stockpiles</text>

    <rect x="460" y="292" width="348" height="28" rx="2" fill="#100808" stroke="#e05555" stroke-width="0.8" opacity="0.8"/>
    <text x="476" y="310" fill="#e05555">✗</text>
    <text x="490" y="310" fill="#8a6060">Drones, fleet, colony (all units)</text>
  </g>

  <!-- Custodian bonus preview -->
  <rect x="152" y="330" width="656" height="52" rx="3" fill="#0d0820" stroke="#9060e0" stroke-width="1.5"/>
  <text x="480" y="347" font-size="10" text-anchor="middle" fill="#c090ff" font-weight="bold">NEW CUSTODIAN BONUS (Cycle 2)</text>
  <text x="480" y="362" font-size="9" text-anchor="middle" fill="#e8d0a0">Choose one permanent upgrade for all future cycles:</text>
  <g font-size="8">
    <rect x="166" y="368" width="155" height="10" rx="1" fill="#1a1030" stroke="#9060e0" stroke-width="0.8"/>
    <text x="243" y="377" text-anchor="middle" fill="#c090ff">+15% Harvester speed</text>
    <rect x="332" y="368" width="155" height="10" rx="1" fill="#1a1030" stroke="#9060e0" stroke-width="0.8"/>
    <text x="409" y="377" text-anchor="middle" fill="#c090ff">Start with 500 RP</text>
    <rect x="498" y="368" width="155" height="10" rx="1" fill="#1a1030" stroke="#9060e0" stroke-width="0.8"/>
    <text x="575" y="377" text-anchor="middle" fill="#c090ff">Cargo drones +2 carry</text>
  </g>

  <!-- Cycle stats summary -->
  <rect x="152" y="392" width="656" height="36" rx="2" fill="#080810" stroke="#2a3a50" stroke-width="0.5"/>
  <g font-size="8" fill="#6a7a90">
    <text x="165" y="406">Cycle 1 Summary:</text>
    <text x="260" y="406" fill="#e8d0a0">8h 14m played</text>
    <text x="360" y="406" fill="#ffd700">◈ 284,000 total earned</text>
    <text x="510" y="406" fill="#a0a8f8">⬡ 8,420 RP generated</text>
    <text x="700" y="406" fill="#4caf7d">12 deposits found</text>
    <text x="165" y="420" fill="#c090ff">1 Warp Gate built  ·  Cycle complete!</text>
  </g>

  <!-- Action buttons -->
  <line x1="148" y1="435" x2="812" y2="435" stroke="#1a1a30" stroke-width="0.5"/>
  <!-- Confirm button -->
  <rect x="200" y="442" width="240" height="38" rx="3" fill="#1a0830" stroke="#9060e0" stroke-width="2" filter="url(#glowWarp)"/>
  <text x="320" y="458" font-size="11" font-weight="bold" text-anchor="middle" fill="#c090ff">BEGIN CYCLE 2</text>
  <text x="320" y="473" font-size="8" text-anchor="middle" fill="#6040a0">Activate Warp Gate</text>

  <!-- Cancel button -->
  <rect x="520" y="442" width="240" height="38" rx="3" fill="#0d1020" stroke="#3a4a60" stroke-width="1"/>
  <text x="640" y="458" font-size="11" text-anchor="middle" fill="#6a7a90">STAY IN CYCLE 1</text>
  <text x="640" y="473" font-size="8" text-anchor="middle" fill="#3a4a60">Continue building</text>

  <!-- ESC hint -->
  <text x="480" y="497" font-size="8" text-anchor="middle" fill="#3a4a60">[ ESC ] Cancel  ·  This action cannot be undone</text>

  <!-- HUD top bar -->
  <rect x="0" y="0" width="960" height="32" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="32" x2="960" y2="32" stroke="#9060e0" stroke-width="1" opacity="0.7"/>
  <text x="14" y="11" font-size="9" fill="#f5a623" opacity="0.7">CREDITS</text>
  <text x="14" y="26" font-size="14" font-weight="bold" fill="#ffd700">◈ 74,800</text>
  <line x1="100" y1="5" x2="100" y2="28" stroke="#2a3a50" stroke-width="0.5"/>
  <text x="113" y="11" font-size="9" fill="#9090f0" opacity="0.7">RESEARCH</text>
  <text x="113" y="26" font-size="14" font-weight="bold" fill="#a0a8f8">⬡ 8,420</text>
  <text x="480" y="20" font-size="12" text-anchor="middle" fill="#c090ff" filter="url(#glowWarp)">◈  WARP GATE ACTIVE — CYCLE 1 COMPLETE</text>
  <text x="946" y="20" font-size="14" text-anchor="end" fill="#e8d0a0">08:14:07</text>

  <!-- Bottom bar -->
  <rect x="0" y="506" width="960" height="34" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="506" x2="960" y2="506" stroke="#9060e0" stroke-width="1" opacity="0.6"/>
  <text x="480" y="527" font-size="10" text-anchor="middle" fill="#c090ff">BEGIN CYCLE 2  ·  RETAIN: waypoints + 10% RP + schematics  ·  [ ESC ] STAY IN CYCLE 1</text>
</svg>

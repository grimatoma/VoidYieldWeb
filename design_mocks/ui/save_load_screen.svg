<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1428"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="slotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e1a2e"/>
      <stop offset="100%" stop-color="#080e1c"/>
    </linearGradient>
    <linearGradient id="slotActive" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141e38"/>
      <stop offset="100%" stop-color="#0a1228"/>
    </linearGradient>
    <filter id="glowAmber">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#f5a623" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="slotShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#f5a623" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bgGrad)"/>
  <g opacity="0.3">
    <circle cx="45" cy="23" r="0.8" fill="#fff"/>
    <circle cx="234" cy="14" r="1.0" fill="#fff"/>
    <circle cx="698" cy="18" r="1.0" fill="#e0ffff"/>
    <circle cx="812" cy="72" r="0.7" fill="#fff"/>
    <circle cx="920" cy="40" r="0.9" fill="#fff"/>
  </g>

  <!-- Header -->
  <rect x="0" y="0" width="960" height="60" fill="#08121e" opacity="0.9"/>
  <line x1="0" y1="60" x2="960" y2="60" stroke="#f5a623" stroke-width="1.5" opacity="0.7"/>
  <text x="480" y="40" font-size="20" font-weight="bold" text-anchor="middle" fill="#ffd700" letter-spacing="4" filter="url(#glowAmber)">💾  SAVE / LOAD</text>
  <text x="480" y="55" font-size="10" text-anchor="middle" fill="#6a7a90" letter-spacing="2">SELECT A SLOT</text>

  <!-- Tab bar -->
  <rect x="200" y="70" width="100" height="28" rx="2" fill="#1a2848" stroke="#f5a623" stroke-width="1"/>
  <text x="250" y="88" font-size="11" text-anchor="middle" fill="#ffd700">SAVE GAME</text>
  <rect x="308" y="70" width="100" height="28" rx="2" fill="#0d1428" stroke="#2a3a50" stroke-width="1"/>
  <text x="358" y="88" font-size="11" text-anchor="middle" fill="#8a9ab0">LOAD GAME</text>
  <rect x="416" y="70" width="140" height="28" rx="2" fill="#0d1428" stroke="#2a3a50" stroke-width="1"/>
  <text x="486" y="88" font-size="11" text-anchor="middle" fill="#8a9ab0">AUTO-SAVES (3)</text>

  <!-- ═══ SAVE SLOT 1 — Selected/Active ═══ -->
  <rect x="50" y="112" width="860" height="126" rx="4" fill="url(#slotActive)" stroke="#f5a623" stroke-width="2" filter="url(#slotShadow)"/>
  <rect x="50" y="112" width="860" height="126" rx="4" fill="none" stroke="#ffd700" stroke-width="0.4" opacity="0.3"/>

  <!-- Thumbnail area -->
  <rect x="64" y="124" width="160" height="102" rx="2" fill="#0a1020" stroke="#2a3a50" stroke-width="1"/>
  <!-- Thumbnail mini world -->
  <rect x="64" y="124" width="160" height="102" rx="2" fill="#0a1428"/>
  <rect x="64" y="175" width="160" height="51" rx="2" fill="#141a0e"/>
  <g stroke="#1a2010" stroke-width="0.5" opacity="0.5">
    <line x1="64" y1="191" x2="224" y2="191"/>
    <line x1="64" y1="207" x2="224" y2="207"/>
    <line x1="112" y1="175" x2="112" y2="226"/>
    <line x1="160" y1="175" x2="160" y2="226"/>
  </g>
  <circle cx="144" cy="193" r="10" fill="#1a3a60" stroke="#3a6a90" stroke-width="1" opacity="0.6"/>
  <rect x="95" y="186" width="16" height="12" rx="1" fill="#1e2e3a"/>
  <rect x="170" y="190" width="22" height="16" rx="1" fill="#1e2e1a"/>
  <circle cx="108" cy="206" r="4" fill="#3a2810" opacity="0.7"/>
  <circle cx="185" cy="202" r="3" fill="#1a4060" opacity="0.7"/>
  <!-- Planet icon in sky -->
  <circle cx="198" cy="140" r="12" fill="#1a2845" stroke="#2a3855" stroke-width="0.5" opacity="0.8"/>
  <ellipse cx="198" cy="140" rx="18" ry="4" fill="none" stroke="#4a6090" stroke-width="0.5" opacity="0.4" transform="rotate(-15,198,140)"/>
  <text x="198" y="143" font-size="6" text-anchor="middle" fill="#4a7090" opacity="0.7">A1</text>

  <!-- Slot 1 info -->
  <text x="240" y="140" font-size="16" font-weight="bold" fill="#ffd700">Slot 1 — Voidstone Prime</text>
  <rect x="240" y="146" width="54" height="16" rx="2" fill="#0d2a10"/>
  <text x="267" y="158" font-size="10" text-anchor="middle" fill="#4caf7d">A1 ZONE</text>

  <g font-size="10" fill="#8a9ab0">
    <text x="240" y="176">Playtime:</text>
    <text x="340" y="176" fill="#e8d0a0">02:14:37</text>
    <text x="440" y="176">Credits:</text>
    <text x="520" y="176" fill="#ffd700">◈ 48,320</text>
    <text x="620" y="176">Research:</text>
    <text x="706" y="176" fill="#a0a8f8">⬡ 2,840 RP</text>

    <text x="240" y="196">Location:</text>
    <text x="340" y="196" fill="#e8d0a0">A1 — Voidstone Prime</text>
    <text x="240" y="214">Factories:</text>
    <text x="340" y="214" fill="#e8d0a0">6 running</text>
    <text x="440" y="214">Drones:</text>
    <text x="520" y="214" fill="#e8d0a0">14 active</text>
    <text x="620" y="214">Pioneer Pop:</text>
    <text x="706" y="214" fill="#e8d0a0">5 / 8</text>

    <text x="240" y="232">Last saved:</text>
    <text x="340" y="232" fill="#6caf8c">Just now  (auto-save)</text>
  </g>

  <!-- Actions -->
  <rect x="734" y="140" width="80" height="30" rx="2" fill="#1a2848" stroke="#f5a623" stroke-width="1.5"/>
  <text x="774" y="160" font-size="11" text-anchor="middle" fill="#ffd700">OVERWRITE</text>
  <rect x="820" y="140" width="76" height="30" rx="2" fill="#0d1428" stroke="#3a4a60" stroke-width="1"/>
  <text x="858" y="160" font-size="11" text-anchor="middle" fill="#8a9ab0">LOAD</text>
  <rect x="820" y="178" width="76" height="24" rx="2" fill="#1a0808" stroke="#5a3535" stroke-width="1"/>
  <text x="858" y="194" font-size="10" text-anchor="middle" fill="#c07070">DELETE</text>

  <!-- Slot 1 selected indicator -->
  <rect x="50" y="112" width="8" height="126" rx="2" fill="#f5a623" opacity="0.8"/>

  <!-- ═══ SAVE SLOT 2 ═══ -->
  <rect x="50" y="252" width="860" height="116" rx="4" fill="url(#slotGrad)" stroke="#3a4a60" stroke-width="1"/>
  <rect x="64" y="262" width="140" height="92" rx="2" fill="#0a1020" stroke="#2a3a50" stroke-width="1"/>
  <!-- Thumbnail: Planet B  scene -->
  <rect x="64" y="262" width="140" height="92" rx="2" fill="#080e1e"/>
  <rect x="64" y="298" width="140" height="56" rx="2" fill="#0e1620"/>
  <!-- Crystal terrain patches -->
  <ellipse cx="100" cy="316" rx="18" ry="8" fill="#0a1e2a" stroke="#2a4a60" stroke-width="0.5" opacity="0.7"/>
  <ellipse cx="150" cy="328" rx="14" ry="6" fill="#0a1e2a" stroke="#2a4a60" stroke-width="0.5" opacity="0.7"/>
  <circle cx="185" cy="280" r="8" fill="#1a2845" stroke="#2a3855" stroke-width="0.5" opacity="0.6"/>

  <text x="220" y="280" font-size="15" font-weight="bold" fill="#e8d0a0">Slot 2 — Planet B Expedition</text>
  <rect x="220" y="286" width="56" height="16" rx="2" fill="#0a1e2a"/>
  <text x="248" y="298" font-size="10" text-anchor="middle" fill="#4a9fd4">PLANET B</text>
  <g font-size="10" fill="#8a9ab0">
    <text x="220" y="316">Playtime:</text>
    <text x="310" y="316" fill="#e8d0a0">00:45:12</text>
    <text x="410" y="316">Credits:</text>
    <text x="470" y="316" fill="#ffd700">◈ 12,080</text>
    <text x="550" y="316">Location:</text>
    <text x="626" y="316" fill="#4a9fd4">Planet B Surface</text>
    <text x="220" y="336">Last saved:</text>
    <text x="310" y="336" fill="#e8d0a0">3 hours ago</text>
    <text x="220" y="356">Warning:</text>
    <text x="310" y="356" fill="#e05555">Return fuel: 0% — stranded!</text>
  </g>
  <rect x="734" y="276" width="80" height="30" rx="2" fill="#0d1428" stroke="#3a4a60" stroke-width="1"/>
  <text x="774" y="296" font-size="11" text-anchor="middle" fill="#8a9ab0">OVERWRITE</text>
  <rect x="820" y="276" width="76" height="30" rx="2" fill="#1a2848" stroke="#4a9fd4" stroke-width="1"/>
  <text x="858" y="296" font-size="11" text-anchor="middle" fill="#4a9fd4">LOAD</text>
  <rect x="820" y="314" width="76" height="24" rx="2" fill="#1a0808" stroke="#5a3535" stroke-width="1"/>
  <text x="858" y="330" font-size="10" text-anchor="middle" fill="#c07070">DELETE</text>

  <!-- ═══ SAVE SLOT 3 — Empty ═══ -->
  <rect x="50" y="382" width="860" height="90" rx="4" fill="#080e18" stroke="#1a2030" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="480" y="425" font-size="14" text-anchor="middle" fill="#2a3a50">— EMPTY SAVE SLOT —</text>
  <text x="480" y="444" font-size="11" text-anchor="middle" fill="#2a3a50">Click to save current game here</text>
  <rect x="400" y="452" width="160" height="12" rx="3" fill="#080e18"/>

  <!-- Bottom buttons -->
  <rect x="300" y="486" width="160" height="36" rx="3" fill="#0d1428" stroke="#3a4a60" stroke-width="1"/>
  <text x="380" y="508" font-size="13" text-anchor="middle" fill="#8a9ab0">CANCEL</text>
  <rect x="500" y="486" width="160" height="36" rx="3" fill="#1a2848" stroke="#f5a623" stroke-width="1.5"/>
  <text x="580" y="508" font-size="13" text-anchor="middle" fill="#ffd700">SAVE TO SLOT 1</text>

  <g stroke="#f5a623" stroke-width="1" fill="none" opacity="0.2">
    <path d="M 20 20 L 20 42 L 42 42"/>
    <path d="M 940 20 L 940 42 L 918 42"/>
    <path d="M 20 520 L 20 498 L 42 498"/>
    <path d="M 940 520 L 940 498 L 918 498"/>
  </g>
</svg>

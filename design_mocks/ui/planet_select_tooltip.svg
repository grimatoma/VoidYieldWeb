<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="spaceGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#050a1a"/>
      <stop offset="100%" stop-color="#010205"/>
    </radialGradient>
    <filter id="glowBlue">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#4a9fd4" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tooltipShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="8" flood-color="#4a9fd4" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="barGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a6040"/>
      <stop offset="100%" stop-color="#4caf7d"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a5080"/>
      <stop offset="100%" stop-color="#4a9fd4"/>
    </linearGradient>
  </defs>

  <!-- Galaxy map background -->
  <rect width="960" height="540" fill="url(#spaceGrad)"/>
  <g opacity="0.5">
    <circle cx="45" cy="23" r="0.8" fill="#fff"/><circle cx="120" cy="67" r="0.5" fill="#fff"/>
    <circle cx="234" cy="14" r="1.0" fill="#fff"/><circle cx="312" cy="89" r="0.6" fill="#ffe0a0"/>
    <circle cx="698" cy="18" r="1.0" fill="#e0ffff"/><circle cx="812" cy="72" r="0.7" fill="#fff"/>
    <circle cx="920" cy="40" r="0.9" fill="#fff"/><circle cx="567" cy="55" r="0.5" fill="#fff"/>
    <circle cx="156" cy="312" r="0.8" fill="#fff"/><circle cx="889" cy="312" r="0.8" fill="#fff"/>
    <circle cx="478" cy="134" r="0.7" fill="#fff"/><circle cx="745" cy="167" r="0.6" fill="#fff"/>
    <circle cx="200" cy="490" r="0.7" fill="#fff"/><circle cx="756" cy="245" r="0.5" fill="#fff"/>
  </g>

  <!-- Faint warp lines -->
  <line x1="250" y1="310" x2="490" y2="200" stroke="#4a9fd4" stroke-width="1" stroke-dasharray="8,5" opacity="0.3"/>
  <line x1="490" y1="200" x2="640" y2="290" stroke="#4a9fd4" stroke-width="1" stroke-dasharray="8,5" opacity="0.3"/>

  <!-- Planet B on map (hovered/highlighted) -->
  <circle cx="640" cy="290" r="26" fill="#1a2a3a" stroke="#4a9fd4" stroke-width="2" filter="url(#glowBlue)"/>
  <circle cx="640" cy="290" r="26" fill="#2a4455" opacity="0.4"/>
  <ellipse cx="630" cy="280" rx="12" ry="7" fill="#2a5070" opacity="0.5"/>
  <ellipse cx="648" cy="298" rx="9" ry="5" fill="#204060" opacity="0.5"/>
  <!-- Hover ring -->
  <circle cx="640" cy="290" r="38" fill="none" stroke="#4a9fd4" stroke-width="1.5" stroke-dasharray="4,6" opacity="0.5"/>

  <!-- Label below planet -->
  <text x="640" y="335" font-size="9" text-anchor="middle" fill="#4a9fd4">Planet B — Crystalis</text>

  <!-- A1 on map (for reference) -->
  <circle cx="250" cy="310" r="10" fill="#ffe0a0" opacity="0.8"/>
  <text x="250" y="333" font-size="8" text-anchor="middle" fill="#f5a623">A1</text>
  <rect x="220" y="335" width="60" height="14" rx="2" fill="#08121e" stroke="#f5a623" stroke-width="1" opacity="0.8"/>
  <text x="250" y="346" font-size="7" text-anchor="middle" fill="#f5a623">◉ YOU</text>

  <!-- ═══ HOVER TOOLTIP ═══ -->
  <rect x="665" y="65" width="280" height="400" rx="4" fill="#07101e" stroke="#4a9fd4" stroke-width="2" filter="url(#tooltipShadow)"/>
  <rect x="665" y="65" width="280" height="50" rx="4" fill="#0d1e38"/>
  <rect x="665" y="102" width="280" height="13" fill="#0d1e38"/>
  <line x1="665" y1="115" x2="945" y2="115" stroke="#4a9fd4" stroke-width="1.5" opacity="0.7"/>

  <!-- Planet header -->
  <text x="805" y="94" font-size="16" font-weight="bold" text-anchor="middle" fill="#4a9fd4" filter="url(#glowBlue)">Planet B</text>
  <text x="805" y="108" font-size="11" text-anchor="middle" fill="#8a9ab0" letter-spacing="2">CRYSTALIS</text>

  <!-- Planet preview icon -->
  <circle cx="695" cy="89" r="18" fill="#1a2a3a" stroke="#4a9fd4" stroke-width="1"/>
  <ellipse cx="688" cy="82" rx="8" ry="5" fill="#2a5070" opacity="0.6"/>
  <ellipse cx="700" cy="94" rx="6" ry="4" fill="#204060" opacity="0.6"/>

  <g font-size="10">
    <!-- Difficulty -->
    <text x="678" y="134" fill="#8a9ab0">Difficulty:</text>
    <text x="938" y="134" text-anchor="end" fill="#f5a623">★ ★ ★ ☆ ☆  Moderate</text>

    <!-- Status -->
    <text x="678" y="152" fill="#8a9ab0">Status:</text>
    <text x="938" y="152" text-anchor="end" fill="#4caf7d">✓ Accessible</text>

    <!-- Resources section -->
    <text x="678" y="172" fill="#4a9fd4" letter-spacing="1" font-size="9">RESOURCES FOUND</text>
    <line x1="674" y1="176" x2="936" y2="176" stroke="#1a2a40" stroke-width="0.5"/>

    <!-- Xenite ore -->
    <circle cx="688" cy="192" r="5" fill="#3a2060" stroke="#7a40a0" stroke-width="1"/>
    <text x="700" y="196" fill="#9060c0">Xenite Ore</text>
    <text x="938" y="196" text-anchor="end" fill="#9060c0">Abundant ★★★★</text>
    <rect x="678" y="199" width="200" height="5" rx="2" fill="#0a1028"/>
    <rect x="678" y="199" width="176" height="5" rx="2" fill="#9060c0" opacity="0.7"/>

    <!-- Crystal Shard -->
    <circle cx="688" cy="224" r="5" fill="#1a3060" stroke="#4a7aaa" stroke-width="1"/>
    <text x="700" y="228" fill="#4a9fd4">Crystal Shard</text>
    <text x="938" y="228" text-anchor="end" fill="#4a9fd4">Common ★★★☆</text>
    <rect x="678" y="231" width="200" height="5" rx="2" fill="#0a1028"/>
    <rect x="678" y="231" width="130" height="5" rx="2" fill="#4a9fd4" opacity="0.7"/>

    <!-- Voidfrost -->
    <circle cx="688" cy="256" r="5" fill="#102a38" stroke="#3a8aaa" stroke-width="1"/>
    <text x="700" y="260" fill="#3a8aaa">Voidfrost Gas</text>
    <text x="938" y="260" text-anchor="end" fill="#3a8aaa">Rare ★★☆☆</text>
    <rect x="678" y="263" width="200" height="5" rx="2" fill="#0a1028"/>
    <rect x="678" y="263" width="80" height="5" rx="2" fill="#3a8aaa" opacity="0.7"/>

    <line x1="674" y1="278" x2="936" y2="278" stroke="#1a2a40" stroke-width="0.5"/>

    <!-- Environment hazards -->
    <text x="678" y="296" fill="#4a9fd4" letter-spacing="1" font-size="9">ENVIRONMENT</text>
    <text x="678" y="314" fill="#8a9ab0">Atmosphere:</text>
    <text x="938" y="314" text-anchor="end" fill="#e05555">Hostile — suit required</text>
    <text x="678" y="330" fill="#8a9ab0">Temperature:</text>
    <text x="938" y="330" text-anchor="end" fill="#4a9fd4">−140°C (surface)</text>
    <text x="678" y="346" fill="#8a9ab0">Day cycle:</text>
    <text x="938" y="346" text-anchor="end" fill="#e8d0a0">18 real-minutes</text>

    <line x1="674" y1="358" x2="936" y2="358" stroke="#1a2a40" stroke-width="0.5"/>

    <!-- Unlock requirement -->
    <text x="678" y="376" fill="#4a9fd4" letter-spacing="1" font-size="9">UNLOCK REQUIREMENT</text>
    <text x="678" y="394" fill="#4caf7d">✓ Launchpad built</text>
    <text x="678" y="410" fill="#4caf7d">✓ Rocket assembled</text>
    <text x="678" y="426" fill="#4caf7d">✓ 200 Fuel Cells in cargo</text>
  </g>

  <!-- Action buttons -->
  <rect x="678" y="434" width="120" height="26" rx="2" fill="#0d1428" stroke="#3a4a60" stroke-width="1"/>
  <text x="738" y="451" font-size="10" text-anchor="middle" fill="#8a9ab0">VIEW DETAILS</text>
  <rect x="804" y="434" width="126" height="26" rx="2" fill="#1a2848" stroke="#4a9fd4" stroke-width="1.5"/>
  <text x="867" y="451" font-size="10" text-anchor="middle" fill="#4a9fd4">SET AS DESTINATION</text>

  <!-- Tooltip arrow (pointing to planet) -->
  <polygon points="665,290 645,282 645,298" fill="#4a9fd4" opacity="0.6"/>

  <!-- HUD top bar -->
  <rect x="0" y="0" width="960" height="32" fill="#050d20" opacity="0.92"/>
  <line x1="0" y1="32" x2="960" y2="32" stroke="#f5a623" stroke-width="0.8" opacity="0.6"/>
  <text x="14" y="21" font-size="14" font-weight="bold" fill="#ffd700" letter-spacing="3">★  GALAXY MAP</text>
  <text x="946" y="21" font-size="11" text-anchor="end" fill="#8a9ab0">[ M ] CLOSE</text>

  <!-- Bottom bar -->
  <rect x="0" y="506" width="960" height="34" fill="#050d20" opacity="0.92"/>
  <line x1="0" y1="506" x2="960" y2="506" stroke="#f5a623" stroke-width="0.8" opacity="0.6"/>
  <text x="480" y="527" font-size="11" text-anchor="middle" fill="#8a9ab0">HOVER A PLANET TO INSPECT  ·  CLICK TO SET DESTINATION  ·  [M] CLOSE MAP</text>
</svg>

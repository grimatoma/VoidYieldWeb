<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1428"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e1a2e"/>
      <stop offset="100%" stop-color="#080e1c"/>
    </linearGradient>
    <linearGradient id="slotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#121e30"/>
      <stop offset="100%" stop-color="#0a1420"/>
    </linearGradient>
    <filter id="glowAmber">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#f5a623" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tooltipShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="5" flood-color="#f5a623" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bgGrad)"/>
  <g opacity="0.3">
    <circle cx="45" cy="23" r="0.8" fill="#ffffff"/>
    <circle cx="234" cy="14" r="1.0" fill="#ffffff"/>
    <circle cx="812" cy="72" r="0.7" fill="#ffffff"/>
    <circle cx="920" cy="40" r="0.9" fill="#ffffff"/>
  </g>


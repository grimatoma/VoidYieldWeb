  <rect x="216" y="100" width="80" height="24" rx="2" fill="#0d1428" stroke="#2a3a50" stroke-width="1"/>
  <text x="256" y="116" font-size="10" text-anchor="middle" fill="#8a9ab0">REFINED</text>

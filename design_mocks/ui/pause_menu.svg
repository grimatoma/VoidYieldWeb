<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0d1e2e"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#101828"/>
      <stop offset="100%" stop-color="#080e1c"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2840"/>
      <stop offset="100%" stop-color="#0d1830"/>
    </linearGradient>
    <filter id="panelShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#000020" flood-opacity="0.8"/>
    </filter>
    <filter id="glowAmber">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#f5a623" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: blurred game world -->
  <rect width="960" height="540" fill="url(#bgGrad)"/>

  <!-- Pseudo world elements (blurred game state) -->
  <g opacity="0.15">
    <!-- Terrain chunks -->
    <rect x="0" y="200" width="960" height="340" fill="#1a1e14"/>
    <rect x="50" y="220" width="120" height="80" rx="3" fill="#2a3020"/>
    <rect x="220" y="240" width="80" height="60" rx="3" fill="#2a3020"/>
    <rect x="600" y="210" width="140" height="90" rx="3" fill="#2a3020"/>
    <!-- Grid lines suggesting world -->
    <g stroke="#304020" stroke-width="0.5">
      <line x1="0" y1="200" x2="960" y2="200"/>
      <line x1="0" y1="240" x2="960" y2="240"/>
      <line x1="0" y1="280" x2="960" y2="280"/>
      <line x1="80" y1="200" x2="80" y2="540"/>
      <line x1="160" y1="200" x2="160" y2="540"/>
      <line x1="240" y1="200" x2="240" y2="540"/>
      <line x1="320" y1="200" x2="320" y2="540"/>
    </g>
    <!-- HUD elements ghost -->
    <rect x="0" y="0" width="960" height="30" fill="#0d1428"/>
    <rect x="0" y="510" width="960" height="30" fill="#0d1428"/>
  </g>

  <!-- Stars -->
  <g opacity="0.4">
    <circle cx="45" cy="23" r="0.8" fill="#ffffff"/>
    <circle cx="120" cy="67" r="0.5" fill="#e0e0ff"/>
    <circle cx="812" cy="72" r="0.7" fill="#ffffff"/>
    <circle cx="920" cy="40" r="0.9" fill="#ffffff"/>
    <circle cx="156" cy="312" r="0.8" fill="#ffffff"/>
    <circle cx="889" cy="312" r="0.8" fill="#ffffff"/>
  </g>

  <!-- Dark overlay -->
  <rect width="960" height="540" fill="#000820" opacity="0.75"/>

  <!-- Scan line effect -->
  <g opacity="0.04">
    <rect x="0" y="0" width="960" height="1" fill="#ffffff"/>
    <rect x="0" y="3" width="960" height="1" fill="#ffffff"/>
    <rect x="0" y="6" width="960" height="1" fill="#ffffff"/>
    <rect x="0" y="9" width="960" height="1" fill="#ffffff"/>
    <rect x="0" y="12" width="960" height="1" fill="#ffffff"/>
    <rect x="0" y="15" width="960" height="1" fill="#ffffff"/>
    <rect x="0" y="18" width="960" height="1" fill="#ffffff"/>
    <rect x="0" y="21" width="960" height="1" fill="#ffffff"/>
    <rect x="0" y="24" width="960" height="1" fill="#ffffff"/>
    <rect x="0" y="27" width="960" height="1" fill="#ffffff"/>
  </g>

  <!-- PAUSED text in background (large watermark) -->
  <text x="480" y="310" font-size="120" font-weight="bold" text-anchor="middle" fill="#f5a623" opacity="0.04" letter-spacing="20">PAUSED</text>

  <!-- Pause menu panel -->
  <rect x="355" y="80" width="250" height="390" rx="4" fill="url(#panelGrad)" stroke="#f5a623" stroke-width="1.5" filter="url(#panelShadow)"/>
  <rect x="355" y="80" width="250" height="390" rx="4" fill="none" stroke="#ffd700" stroke-width="0.4" opacity="0.25"/>

  <!-- Panel header -->
  <rect x="355" y="80" width="250" height="52" rx="4" fill="#0d1e38"/>
  <rect x="355" y="119" width="250" height="13" fill="#0d1e38"/>
  <line x1="355" y1="132" x2="605" y2="132" stroke="#f5a623" stroke-width="1.5" opacity="0.8"/>

  <!-- II (pause symbol) -->
  <text x="420" y="114" font-size="22" text-anchor="middle" fill="#f5a623" opacity="0.8">⏸</text>
  <text x="480" y="114" font-size="20" font-weight="bold" text-anchor="middle" fill="#ffd700" letter-spacing="5" filter="url(#glowAmber)">PAUSED</text>

  <!-- Location info -->
  <text x="480" y="152" font-size="10" text-anchor="middle" fill="#8a9ab0" letter-spacing="1">A1 — VOIDSTONE PRIME</text>
  <text x="480" y="168" font-size="10" text-anchor="middle" fill="#6a7a90">Session: 02:14:37</text>

  <!-- Divider -->
  <line x1="375" y1="180" x2="585" y2="180" stroke="#2a3a50" stroke-width="0.5"/>

  <!-- RESUME button (highlighted) -->
  <g filter="url(#glowAmber)">
    <rect x="375" y="192" width="210" height="44" rx="3" fill="#1a3048" stroke="#f5a623" stroke-width="1.5"/>
    <line x1="379" y1="196" x2="581" y2="196" stroke="#ffd700" stroke-width="0.5" opacity="0.4"/>
    <text x="480" y="219" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffd700" letter-spacing="2">▶  RESUME</text>
  </g>

  <!-- SAVE GAME -->
  <rect x="375" y="246" width="210" height="40" rx="3" fill="url(#btnGrad)" stroke="#4a5a70" stroke-width="1"/>
  <text x="480" y="271" font-size="13" text-anchor="middle" fill="#e8d0a0" letter-spacing="2">  SAVE GAME</text>

  <!-- LOAD GAME -->
  <rect x="375" y="296" width="210" height="40" rx="3" fill="url(#btnGrad)" stroke="#4a5a70" stroke-width="1"/>
  <text x="480" y="321" font-size="13" text-anchor="middle" fill="#e8d0a0" letter-spacing="2">  LOAD GAME</text>

  <!-- SETTINGS -->
  <rect x="375" y="346" width="210" height="40" rx="3" fill="url(#btnGrad)" stroke="#4a5a70" stroke-width="1"/>
  <text x="480" y="371" font-size="13" text-anchor="middle" fill="#e8d0a0" letter-spacing="2">⚙  SETTINGS</text>

  <!-- Divider -->
  <line x1="375" y1="398" x2="585" y2="398" stroke="#2a3a50" stroke-width="0.5"/>

  <!-- QUIT TO MENU -->
  <rect x="375" y="408" width="210" height="40" rx="3" fill="#1a0d0d" stroke="#5a3535" stroke-width="1"/>
  <text x="480" y="433" font-size="13" text-anchor="middle" fill="#c07070" letter-spacing="1">QUIT TO MENU</text>

  <!-- Save indicator -->
  <g font-size="10" fill="#6a7a90">
    <text x="480" y="460" text-anchor="middle">Last saved: 3 minutes ago</text>
    <circle cx="370" cy="456" r="3" fill="#4caf7d"/>
    <text x="380" y="460">Auto-save ON</text>
  </g>

  <!-- Corner decorations -->
  <g stroke="#f5a623" stroke-width="1" fill="none" opacity="0.25">
    <path d="M 20 20 L 20 45 L 45 45"/>
    <path d="M 940 20 L 940 45 L 915 45"/>
    <path d="M 20 520 L 20 495 L 45 495"/>
    <path d="M 940 520 L 940 495 L 915 495"/>
  </g>

  <!-- ESC hint -->
  <text x="480" y="498" font-size="10" text-anchor="middle" fill="#4a5a70" letter-spacing="2">[ESC] RESUME</text>
</svg>

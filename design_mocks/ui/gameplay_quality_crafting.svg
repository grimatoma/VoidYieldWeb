<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141a0e"/>
      <stop offset="100%" stop-color="#0c1008"/>
    </linearGradient>
    <linearGradient id="hudBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1e38" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#080e20" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e1a2e"/>
      <stop offset="100%" stop-color="#080e1c"/>
    </linearGradient>
    <filter id="glowGold">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowAmber">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#f5a623" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#4caf7d" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- World (blurred behind UI) -->
  <rect width="960" height="270" fill="url(#skyGrad)"/>
  <g opacity="0.3">
    <circle cx="45" cy="23" r="0.8" fill="#fff"/><circle cx="234" cy="14" r="1.0" fill="#fff"/>
    <circle cx="698" cy="18" r="1.0" fill="#e0ffff"/><circle cx="812" cy="72" r="0.7" fill="#fff"/>
  </g>
  <rect x="0" y="270" width="960" height="270" fill="url(#groundGrad)"/>
  <line x1="0" y1="270" x2="960" y2="270" stroke="#2a3820" stroke-width="1"/>
  <!-- Dark overlay -->
  <rect width="960" height="540" fill="#000008" opacity="0.45"/>

  <!-- Assembly Complex visible behind popup -->
  <rect x="120" y="330" width="120" height="100" rx="3" fill="#1a2020" stroke="#4caf7d" stroke-width="1.5" opacity="0.6"/>
  <text x="180" y="360" font-size="7" text-anchor="middle" fill="#4caf7d" opacity="0.7">ASSEMBLY</text>
  <text x="180" y="370" font-size="7" text-anchor="middle" fill="#4caf7d" opacity="0.7">COMPLEX</text>
  <circle cx="180" cy="345" r="4" fill="#4caf7d" opacity="0.7"/>

  <!-- Crafting spark effects -->
  <circle cx="300" cy="340" r="3" fill="#ffd700" opacity="0.7"/>
  <circle cx="312" cy="328" r="2" fill="#f5a623" opacity="0.6"/>
  <circle cx="292" cy="325" r="2" fill="#ffd700" opacity="0.5"/>
  <line x1="296" y1="335" x2="288" y2="322" stroke="#ffd700" stroke-width="1" opacity="0.4"/>
  <line x1="308" y1="332" x2="318" y2="320" stroke="#ffd700" stroke-width="1" opacity="0.4"/>

  <!-- ═══ CRAFTING RESULT POPUP ═══ -->
  <rect x="200" y="45" width="560" height="430" rx="4" fill="url(#panelGrad)" stroke="#ffd700" stroke-width="2.5" filter="url(#glowGold)" opacity="0.98"/>
  <rect x="200" y="45" width="560" height="55" rx="4" fill="#140c00"/>
  <rect x="200" y="87" width="560" height="13" fill="#140c00"/>
  <line x1="200" y1="100" x2="760" y2="100" stroke="#ffd700" stroke-width="1.5" opacity="0.8"/>
  <text x="480" y="72" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffd700" letter-spacing="3" filter="url(#glowGold)">◈  ITEM CRAFTED!</text>
  <text x="480" y="91" font-size="9" text-anchor="middle" fill="#8a6020">Assembly Complex — Batch complete</text>

  <!-- Item display -->
  <!-- Item icon (large) -->
  <rect x="228" y="115" width="80" height="80" rx="4" fill="#0d1828" stroke="#ffd700" stroke-width="2"/>
  <!-- Crystal Drill icon -->
  <polygon points="268,130 280,140 278,158 268,165 258,158 256,140" fill="#1a3a60" stroke="#4a9fd4" stroke-width="1.5"/>
  <line x1="268" y1="140" x2="268" y2="163" stroke="#ffd700" stroke-width="2.5"/>
  <circle cx="268" cy="167" r="4" fill="#ffd700" opacity="0.9"/>
  <circle cx="268" cy="137" r="3" fill="#a0c0ff" opacity="0.8"/>

  <!-- Item name and grade -->
  <text x="322" y="133" font-size="18" font-weight="bold" fill="#ffd700">Crystal Drill</text>
  <rect x="322" y="140" width="60" height="20" rx="2" fill="#1a1000" stroke="#ffd700" stroke-width="1.5"/>
  <text x="352" y="154" font-size="10" text-anchor="middle" fill="#ffd700" font-weight="bold">GRADE A+</text>
  <text x="322" y="175" font-size="9" fill="#8a9ab0">Precision mining tool — Tier 3</text>
  <text x="322" y="190" font-size="8" fill="#4a6080">Equip to increase personal ore yield</text>

  <!-- Quality score (big) -->
  <rect x="580" y="112" width="172" height="88" rx="3" fill="#0d1428" stroke="#ffd700" stroke-width="1.5"/>
  <text x="666" y="135" font-size="10" text-anchor="middle" fill="#8a9ab0">QUALITY SCORE</text>
  <text x="666" y="168" font-size="36" font-weight="bold" text-anchor="middle" fill="#ffd700" filter="url(#glowGold)">847</text>
  <text x="666" y="188" font-size="8" text-anchor="middle" fill="#4caf7d">Exceptional · Top 8%</text>

  <!-- Divider -->
  <line x1="208" y1="208" x2="752" y2="208" stroke="#1a2a40" stroke-width="0.8"/>

  <!-- Quality derivation explanation -->
  <text x="216" y="225" font-size="10" fill="#8a9ab0" letter-spacing="1">HOW QUALITY WAS CALCULATED</text>

  <!-- Input ore quality -->
  <rect x="216" y="232" width="250" height="80" rx="3" fill="#0a1020" stroke="#2a3a50" stroke-width="0.8"/>
  <text x="341" y="248" font-size="9" text-anchor="middle" fill="#6a7a90">INGREDIENTS (ER avg)</text>
  <line x1="224" y1="251" x2="458" y2="251" stroke="#1a2a40" stroke-width="0.5"/>
  <g font-size="8">
    <text x="228" y="264" fill="#4a9fd4">Krysite Ingot ×2</text>
    <text x="458" y="264" text-anchor="end" fill="#4a9fd4">ER: 847</text>
    <text x="228" y="278" fill="#9060e0">Crystal Shard ×3</text>
    <text x="458" y="278" text-anchor="end" fill="#9060e0">ER: 820</text>
    <text x="228" y="292" fill="#6a7a90">Copper Wire ×1</text>
    <text x="458" y="292" text-anchor="end" fill="#8a9ab0">ER: 640</text>
    <line x1="224" y1="296" x2="458" y2="296" stroke="#1a2a40" stroke-width="0.5"/>
    <text x="228" y="307" fill="#8a9ab0">Weighted avg ER:</text>
    <text x="458" y="307" text-anchor="end" fill="#ffd700" font-weight="bold">847</text>
  </g>

  <!-- Arrow + formula -->
  <text x="478" y="278" font-size="20" text-anchor="middle" fill="#f5a623">→</text>

  <!-- Output quality breakdown -->
  <rect x="498" y="232" width="250" height="80" rx="3" fill="#0a1020" stroke="#ffd700" stroke-width="0.8"/>
  <text x="623" y="248" font-size="9" text-anchor="middle" fill="#6a7a90">QUALITY FACTORS</text>
  <line x1="506" y1="251" x2="740" y2="251" stroke="#1a2a40" stroke-width="0.5"/>
  <g font-size="8">
    <text x="510" y="264" fill="#8a9ab0">Base (from ER avg):</text>
    <text x="740" y="264" text-anchor="end" fill="#ffd700">847</text>
    <text x="510" y="278" fill="#4caf7d">Assembly bonus (+5%):</text>
    <text x="740" y="278" text-anchor="end" fill="#4caf7d">+42</text>
    <text x="510" y="292" fill="#f5a623">Schematic bonus (+1%):</text>
    <text x="740" y="292" text-anchor="end" fill="#f5a623">+8</text>
    <line x1="506" y1="296" x2="740" y2="296" stroke="#1a2a40" stroke-width="0.5"/>
    <text x="510" y="307" fill="#ffd700" font-weight="bold">Final quality:</text>
    <text x="740" y="307" text-anchor="end" fill="#ffd700" font-weight="bold">897 → capped 847</text>
  </g>

  <!-- Divider -->
  <line x1="208" y1="322" x2="752" y2="322" stroke="#1a2a40" stroke-width="0.8"/>

  <!-- Item stat preview -->
  <text x="216" y="338" font-size="9" fill="#8a9ab0" letter-spacing="1">ITEM STATS (quality-scaled)</text>
  <g font-size="8">
    <text x="216" y="354" fill="#6a7a90">Mining Speed:</text>
    <rect x="320" y="347" width="160" height="7" rx="2" fill="#0a1020"/>
    <rect x="320" y="347" width="135" height="7" rx="2" fill="#4a9fd4" opacity="0.8"/>
    <text x="490" y="354" fill="#4a9fd4"> +84%</text>
    <text x="216" y="370" fill="#6a7a90">Yield Bonus:</text>
    <rect x="320" y="363" width="160" height="7" rx="2" fill="#0a1020"/>
    <rect x="320" y="363" width="115" height="7" rx="2" fill="#4caf7d" opacity="0.8"/>
    <text x="490" y="370" fill="#4caf7d"> +72%</text>
    <text x="216" y="386" fill="#6a7a90">Durability:</text>
    <rect x="320" y="379" width="160" height="7" rx="2" fill="#0a1020"/>
    <rect x="320" y="379" width="140" height="7" rx="2" fill="#f5a623" opacity="0.8"/>
    <text x="490" y="386" fill="#f5a623"> 2,400 uses</text>
    <text x="530" y="386" fill="#4a5a70" font-size="7">(at 847 quality)</text>
  </g>

  <!-- Tip -->
  <rect x="216" y="396" width="532" height="24" rx="2" fill="#080810" stroke="#2a3a50" stroke-width="0.5"/>
  <text x="480" y="412" font-size="8" text-anchor="middle" fill="#4a6080">💡 Higher ore ER → better crafted items. Mine Grade A deposits for best results.</text>

  <!-- Action buttons -->
  <rect x="216" y="428" width="160" height="34" rx="2" fill="#1a2848" stroke="#4a9fd4" stroke-width="1"/>
  <text x="296" y="449" font-size="10" text-anchor="middle" fill="#4a9fd4">Add to Inventory</text>
  <rect x="392" y="428" width="160" height="34" rx="2" fill="#1a3808" stroke="#4caf7d" stroke-width="1.5" filter="url(#glowGreen)"/>
  <text x="472" y="449" font-size="10" text-anchor="middle" fill="#4caf7d">Equip Now</text>
  <rect x="568" y="428" width="160" height="34" rx="2" fill="#0d1428" stroke="#3a4a60" stroke-width="1"/>
  <text x="648" y="449" font-size="10" text-anchor="middle" fill="#6a7a90">[ E ] Close</text>

  <!-- HUD top bar -->
  <rect x="0" y="0" width="960" height="32" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="32" x2="960" y2="32" stroke="#ffd700" stroke-width="0.8" opacity="0.6"/>
  <text x="14" y="11" font-size="9" fill="#f5a623" opacity="0.7">CREDITS</text>
  <text x="14" y="26" font-size="14" font-weight="bold" fill="#ffd700">◈ 18,240</text>
  <text x="480" y="20" font-size="12" text-anchor="middle" fill="#ffd700" filter="url(#glowGold)">◈  CRAFT COMPLETE — Crystal Drill  847 quality</text>
  <text x="946" y="20" font-size="14" text-anchor="end" fill="#e8d0a0">01:48:33</text>

  <!-- Bottom bar -->
  <rect x="0" y="506" width="960" height="34" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="506" x2="960" y2="506" stroke="#ffd700" stroke-width="0.8" opacity="0.6"/>
  <text x="480" y="527" font-size="10" text-anchor="middle" fill="#ffd700">EQUIP NOW  ·  [ I ] INVENTORY  ·  CRYSTAL DRILL — GRADE A+  ·  QUALITY: 847</text>
</svg>

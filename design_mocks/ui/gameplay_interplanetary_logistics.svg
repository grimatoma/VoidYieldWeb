<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="spaceGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="hudBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1e38" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#080e20" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e1a2e"/>
      <stop offset="100%" stop-color="#080e1c"/>
    </linearGradient>
    <filter id="glowGold">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBlue">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#4a9fd4" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#4caf7d" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowAmber">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#f5a623" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe0a0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffe0a0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Space background -->
  <rect width="960" height="540" fill="url(#spaceGrad)"/>
  <!-- Stars -->
  <g opacity="0.6">
    <circle cx="45" cy="43" r="0.8" fill="#fff"/><circle cx="134" cy="104" r="0.5" fill="#e0e0ff"/>
    <circle cx="234" cy="34" r="1" fill="#fff"/><circle cx="312" cy="189" r="0.6" fill="#a0e0ff"/>
    <circle cx="445" cy="61" r="0.8" fill="#fff"/><circle cx="567" cy="155" r="0.5" fill="#c0c0ff"/>
    <circle cx="698" cy="38" r="1" fill="#fff"/><circle cx="812" cy="172" r="0.7" fill="#fff"/>
    <circle cx="920" cy="80" r="0.9" fill="#c0a0ff"/><circle cx="78" cy="215" r="0.6" fill="#fff"/>
    <circle cx="189" cy="278" r="0.8" fill="#a0c0ff"/><circle cx="856" cy="323" r="0.5" fill="#fff"/>
    <circle cx="34" cy="380" r="0.9" fill="#fff"/><circle cx="745" cy="417" r="0.6" fill="#c0c0ff"/>
    <circle cx="867" cy="463" r="0.5" fill="#a0e0ff"/><circle cx="123" cy="489" r="0.7" fill="#fff"/>
    <circle cx="540" cy="430" r="0.8" fill="#fff"/><circle cx="290" cy="370" r="0.5" fill="#e0e0ff"/>
    <circle cx="680" cy="480" r="0.6" fill="#fff"/>
  </g>

  <!-- Home star (A) -->
  <circle cx="280" cy="290" r="28" fill="#ffe0a0" opacity="0.9" filter="url(#glowGold)"/>
  <circle cx="280" cy="290" r="55" fill="url(#starGlow)"/>
  <text x="280" y="336" font-size="9" text-anchor="middle" fill="#c0a060">STAR A</text>

  <!-- Planet A1 (home world, left) -->
  <circle cx="180" cy="390" r="32" fill="#1a2845" stroke="#2a3855" stroke-width="1.5"/>
  <ellipse cx="180" cy="390" rx="48" ry="12" fill="none" stroke="#4a6090" stroke-width="1" opacity="0.5" transform="rotate(-15,180,390)"/>
  <circle cx="172" cy="382" r="8" fill="#2a4060" opacity="0.6"/>
  <circle cx="188" cy="397" r="6" fill="#2a3850" opacity="0.5"/>
  <text x="180" y="432" font-size="9" text-anchor="middle" fill="#e8d0a0">A1</text>
  <text x="180" y="443" font-size="7" text-anchor="middle" fill="#6a8ab0">Voidstone Prime</text>
  <!-- Launchpad indicator on A1 -->
  <rect x="158" y="374" width="12" height="6" rx="1" fill="#f5a623" opacity="0.8"/>
  <text x="164" y="380" font-size="5" text-anchor="middle" fill="#fff">LP</text>

  <!-- Asteroid Belt A2 (center-ish) -->
  <ellipse cx="480" cy="260" rx="80" ry="20" fill="none" stroke="#4a4a30" stroke-width="1" stroke-dasharray="3,4" opacity="0.5"/>
  <!-- Asteroids -->
  <circle cx="420" cy="255" r="8" fill="#2a2818" stroke="#4a4820" stroke-width="1"/>
  <circle cx="460" cy="270" r="5" fill="#2a2818" stroke="#3a3820" stroke-width="1"/>
  <circle cx="510" cy="252" r="7" fill="#2a2818" stroke="#4a4820" stroke-width="1"/>
  <circle cx="545" cy="265" r="4" fill="#2a2818" stroke="#3a3820" stroke-width="1"/>
  <text x="480" y="292" font-size="8" text-anchor="middle" fill="#6a6040">A2 — Asteroid Belt</text>

  <!-- Planet B (Crystalis, right) -->
  <circle cx="750" cy="200" r="38" fill="#1a2838" stroke="#3a5060" stroke-width="1.5"/>
  <ellipse cx="750" cy="200" rx="55" ry="14" fill="none" stroke="#4a7090" stroke-width="0.8" opacity="0.4" transform="rotate(-10,750,200)"/>
  <!-- Crystal surface detail -->
  <polygon points="735,185 742,170 749,185" fill="#1a3a5a" stroke="#3a7aaa" stroke-width="0.8" opacity="0.7"/>
  <polygon points="755,188 762,172 769,188" fill="#1a3a5a" stroke="#3a7aaa" stroke-width="0.8" opacity="0.7"/>
  <circle cx="745" cy="205" r="6" fill="#1a2848" opacity="0.5"/>
  <text x="750" y="249" font-size="9" text-anchor="middle" fill="#4a9fd4">Planet B</text>
  <text x="750" y="260" font-size="7" text-anchor="middle" fill="#3a7090">Crystalis</text>
  <!-- Landing pad indicator -->
  <rect x="738" y="192" width="10" height="5" rx="1" fill="#4a9fd4" opacity="0.8"/>
  <text x="743" y="197" font-size="4" text-anchor="middle" fill="#fff">B</text>

  <!-- ══ ACTIVE CARGO ROUTES ══ -->
  <!-- Route 1: A1 → A2 (ore freighter) -->
  <path d="M 208 375 Q 310 300 420 258" fill="none" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.6"/>
  <!-- Ship on this route (midpoint ~315,330) -->
  <g filter="url(#glowGold)">
    <polygon points="318,326 328,322 328,330 318,334" fill="#2a2010" stroke="#ffd700" stroke-width="1.5"/>
    <line x1="318" y1="328" x2="308" y2="328" stroke="#f5a623" stroke-width="1.5" opacity="0.8"/>
  </g>
  <rect x="280" y="310" width="78" height="22" rx="2" fill="#05080f" stroke="#ffd700" stroke-width="1" opacity="0.9"/>
  <text x="319" y="320" font-size="7" text-anchor="middle" fill="#ffd700">FREIGHTER-1</text>
  <text x="319" y="330" font-size="6" text-anchor="middle" fill="#8a6020">A1→A2  ETA: 4m</text>

  <!-- Route 2: A1 → Planet B (xenite return) -->
  <path d="M 208 378 Q 460 340 718 210" fill="none" stroke="#4a9fd4" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.55"/>
  <!-- Ship on this route (~470,348) -->
  <g filter="url(#glowBlue)">
    <polygon points="475,345 485,341 485,349 475,353" fill="#0a1828" stroke="#4a9fd4" stroke-width="1.5"/>
    <line x1="475" y1="347" x2="465" y2="347" stroke="#4a9fd4" stroke-width="1.5" opacity="0.8"/>
  </g>
  <rect x="435" y="330" width="82" height="22" rx="2" fill="#05080f" stroke="#4a9fd4" stroke-width="1" opacity="0.9"/>
  <text x="476" y="340" font-size="7" text-anchor="middle" fill="#4a9fd4">TRANSPORT-2</text>
  <text x="476" y="350" font-size="6" text-anchor="middle" fill="#3a7090">A1→B  ETA: 12m</text>

  <!-- Route 3: B → A1 (xenite cargo returning) -->
  <path d="M 716 215 Q 500 400 212 388" fill="none" stroke="#9060e0" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.45"/>
  <!-- Ship (~590,340) -->
  <g>
    <polygon points="598,342 608,338 608,346 598,350" fill="#180820" stroke="#9060e0" stroke-width="1.5"/>
    <line x1="598" y1="344" x2="588" y2="344" stroke="#9060e0" stroke-width="1.5" opacity="0.7"/>
  </g>
  <rect x="555" y="326" width="82" height="22" rx="2" fill="#05080f" stroke="#9060e0" stroke-width="1" opacity="0.9"/>
  <text x="596" y="336" font-size="7" text-anchor="middle" fill="#9060e0">COURIER-3</text>
  <text x="596" y="346" font-size="6" text-anchor="middle" fill="#6040a0">B→A1  ETA: 8m</text>

  <!-- Orbital direction arrows -->
  <polygon points="204,363 198,372 210,370" fill="#4a9fd4" opacity="0.4"/>
  <polygon points="722,222 728,213 716,212" fill="#9060e0" opacity="0.4"/>

  <!-- ═══ LOGISTICS PANEL ═══ (right) -->
  <rect x="755" y="285" width="197" height="230" rx="3" fill="url(#panelGrad)" stroke="#f5a623" stroke-width="1.5" opacity="0.97"/>
  <rect x="755" y="285" width="197" height="30" rx="3" fill="#1a1000"/>
  <line x1="755" y1="315" x2="952" y2="315" stroke="#f5a623" stroke-width="0.8" opacity="0.6"/>
  <text x="853" y="304" font-size="10" text-anchor="middle" fill="#f5a623">FLEET STATUS</text>

  <g font-size="8">
    <text x="765" y="330" fill="#ffd700" font-weight="bold">FREIGHTER-1</text>
    <text x="945" y="330" text-anchor="end" fill="#4caf7d">EN ROUTE</text>
    <text x="765" y="342" fill="#6a7a90">Route: A1 → A2</text>
    <text x="765" y="354" fill="#6a7a90">Cargo: Krysite Ingot ×120</text>
    <text x="945" y="354" text-anchor="end" fill="#f5a623">4m</text>

    <line x1="763" y1="358" x2="945" y2="358" stroke="#1a2a30" stroke-width="0.5"/>

    <text x="765" y="372" fill="#4a9fd4" font-weight="bold">TRANSPORT-2</text>
    <text x="945" y="372" text-anchor="end" fill="#4caf7d">EN ROUTE</text>
    <text x="765" y="384" fill="#6a7a90">Route: A1 → B</text>
    <text x="765" y="396" fill="#6a7a90">Cargo: Supplies ×40</text>
    <text x="945" y="396" text-anchor="end" fill="#f5a623">12m</text>

    <line x1="763" y1="400" x2="945" y2="400" stroke="#1a2a30" stroke-width="0.5"/>

    <text x="765" y="414" fill="#9060e0" font-weight="bold">COURIER-3</text>
    <text x="945" y="414" text-anchor="end" fill="#4caf7d">RETURNING</text>
    <text x="765" y="426" fill="#6a7a90">Route: B → A1</text>
    <text x="765" y="438" fill="#6a7a90">Cargo: Xenite ×86</text>
    <text x="945" y="438" text-anchor="end" fill="#f5a623">8m</text>

    <line x1="763" y1="442" x2="945" y2="442" stroke="#1a2a30" stroke-width="0.5"/>

    <text x="765" y="456" fill="#6a7a90">Active ships:</text>
    <text x="945" y="456" text-anchor="end" fill="#e8d0a0">3 / 4</text>
    <text x="765" y="470" fill="#6a7a90">Total in transit:</text>
    <text x="945" y="470" text-anchor="end" fill="#e8d0a0">246 units</text>
    <text x="765" y="484" fill="#6a7a90">[ T ] Fleet Manager</text>
    <text x="765" y="498" fill="#6a7a90">[ M ] Galaxy Map</text>
  </g>

  <!-- Resource flow labels on routes -->
  <text x="350" y="278" font-size="7" text-anchor="middle" fill="#ffd700" opacity="0.8">Krysite Ingot ×120</text>
  <text x="380" y="410" font-size="7" text-anchor="middle" fill="#9060e0" opacity="0.8">Xenite ×86</text>

  <!-- Legend -->
  <rect x="8" y="480" width="280" height="48" rx="2" fill="#05080f" stroke="#2a3a50" stroke-width="1" opacity="0.9"/>
  <text x="18" y="494" font-size="8" fill="#8a9ab0">ROUTE LEGEND</text>
  <line x1="18" y1="502" x2="50" y2="502" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="55" y="506" font-size="7" fill="#ffd700">A1→A2 (ore export)</text>
  <line x1="18" y1="516" x2="50" y2="516" stroke="#4a9fd4" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="55" y="520" font-size="7" fill="#4a9fd4">A1→B (supplies)</text>
  <line x1="155" y1="516" x2="187" y2="516" stroke="#9060e0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="192" y="520" font-size="7" fill="#9060e0">B→A1 (xenite)</text>

  <!-- HUD top bar -->
  <rect x="0" y="0" width="960" height="32" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="32" x2="960" y2="32" stroke="#f5a623" stroke-width="0.8" opacity="0.6"/>
  <text x="14" y="20" font-size="14" font-weight="bold" fill="#ffd700">◈ 42,600</text>
  <line x1="100" y1="5" x2="100" y2="28" stroke="#2a3a50" stroke-width="0.5"/>
  <text x="113" y="11" font-size="9" fill="#9090f0" opacity="0.7">RESEARCH</text>
  <text x="113" y="26" font-size="14" font-weight="bold" fill="#a0a8f8">⬡ 3,140</text>
  <text x="480" y="20" font-size="12" text-anchor="middle" fill="#e8d0a0">GALAXY VIEW — Interplanetary Logistics</text>
  <text x="946" y="20" font-size="14" text-anchor="end" fill="#e8d0a0">04:12:08</text>

  <!-- Bottom bar -->
  <rect x="0" y="506" width="960" height="34" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="506" x2="960" y2="506" stroke="#f5a623" stroke-width="0.8" opacity="0.6"/>
  <text x="480" y="527" font-size="10" text-anchor="middle" fill="#8a9ab0">[M] GALAXY MAP  ·  [T] FLEET  ·  3 SHIPS ACTIVE  ·  246 units in transit</text>
</svg>

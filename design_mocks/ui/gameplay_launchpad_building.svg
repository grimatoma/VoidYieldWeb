<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141a0e"/>
      <stop offset="100%" stop-color="#0c1008"/>
    </linearGradient>
    <linearGradient id="hudBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1e38" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#080e20" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glowAmber">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#f5a623" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowRed">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#e05555" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#4caf7d" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="960" height="270" fill="url(#skyGrad)"/>
  <g opacity="0.5">
    <circle cx="45" cy="23" r="0.8" fill="#fff"/><circle cx="234" cy="14" r="1" fill="#fff"/>
    <circle cx="698" cy="18" r="1" fill="#e0ffff"/><circle cx="812" cy="72" r="0.7" fill="#fff"/>
    <circle cx="445" cy="31" r="0.8" fill="#fff"/><circle cx="120" cy="67" r="0.5" fill="#e0e0ff"/>
  </g>
  <rect x="0" y="270" width="960" height="270" fill="url(#groundGrad)"/>
  <g stroke="#1a2010" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="310" x2="960" y2="310"/><line x1="0" y1="350" x2="960" y2="350"/>
    <line x1="0" y1="390" x2="960" y2="390"/><line x1="0" y1="430" x2="960" y2="430"/>
    <line x1="80" y1="270" x2="80" y2="540"/><line x1="240" y1="270" x2="240" y2="540"/>
    <line x1="400" y1="270" x2="400" y2="540"/><line x1="560" y1="270" x2="560" y2="540"/>
    <line x1="720" y1="270" x2="720" y2="540"/>
  </g>
  <line x1="0" y1="270" x2="960" y2="270" stroke="#2a3820" stroke-width="1"/>

  <!-- Launchpad base -->
  <rect x="280" y="400" width="200" height="20" rx="2" fill="#1a2030" stroke="#4a6080" stroke-width="1.5"/>
  <rect x="300" y="395" width="160" height="8" rx="1" fill="#253040"/>
  <!-- Pad rails -->
  <line x1="340" y1="400" x2="340" y2="290" stroke="#3a5070" stroke-width="2"/>
  <line x1="420" y1="400" x2="420" y2="290" stroke="#3a5070" stroke-width="2"/>
  <!-- Cross braces -->
  <line x1="340" y1="360" x2="420" y2="360" stroke="#2a4060" stroke-width="1.5"/>
  <line x1="340" y1="325" x2="420" y2="325" stroke="#2a4060" stroke-width="1.5"/>

  <!-- Rocket frame on pad -->
  <!-- Nosecone -->
  <polygon points="380,220 360,280 400,280" fill="#2a3848" stroke="#4a9fd4" stroke-width="1.5"/>
  <!-- Cargo bay slot (empty — BLOCKING) -->
  <rect x="360" y="280" width="40" height="35" rx="1" fill="#1a0808" stroke="#e05555" stroke-width="2" filter="url(#glowRed)"/>
  <text x="380" y="298" font-size="7" text-anchor="middle" fill="#e05555">CARGO</text>
  <text x="380" y="308" font-size="7" text-anchor="middle" fill="#e05555">BAY ✗</text>
  <!-- Fuel tank (partial — 2/3) -->
  <rect x="360" y="315" width="40" height="45" rx="1" fill="#1a2838" stroke="#f5a623" stroke-width="1.5"/>
  <rect x="360" y="330" width="40" height="30" rx="1" fill="#f5a623" opacity="0.4"/>
  <text x="380" y="334" font-size="7" text-anchor="middle" fill="#f5a623">FUEL</text>
  <text x="380" y="346" font-size="7" text-anchor="middle" fill="#f5a623">2/3</text>
  <!-- Engine nozzle -->
  <polygon points="360,360 400,360 408,378 352,378" fill="#252e3a" stroke="#4a6080" stroke-width="1.5"/>
  <ellipse cx="380" cy="378" rx="28" ry="6" fill="#1a2030" stroke="#3a5070" stroke-width="1"/>

  <!-- Scaffolding (left side) -->
  <g stroke="#2a3a50" stroke-width="1.5" opacity="0.7">
    <line x1="338" y1="270" x2="338" y2="410"/>
    <line x1="338" y1="290" x2="360" y2="290"/>
    <line x1="338" y1="310" x2="360" y2="310"/>
    <line x1="338" y1="330" x2="360" y2="330"/>
    <line x1="338" y1="350" x2="360" y2="350"/>
    <line x1="338" y1="370" x2="360" y2="370"/>
    <!-- Scaffolding arm -->
    <line x1="320" y1="270" x2="338" y2="270"/>
    <line x1="320" y1="270" x2="320" y2="410"/>
  </g>

  <!-- Assembly Complexes feeding the rocket -->
  <!-- AC 1 (left) -->
  <rect x="100" y="345" width="110" height="80" rx="3" fill="#1a2020" stroke="#4caf7d" stroke-width="1.5"/>
  <rect x="105" y="340" width="100" height="10" rx="1" fill="#152018"/>
  <circle cx="155" cy="358" r="4" fill="#4caf7d" opacity="0.85"/>
  <text x="155" y="378" font-size="7" text-anchor="middle" fill="#4caf7d">ASSEMBLY</text>
  <text x="155" y="388" font-size="7" text-anchor="middle" fill="#4caf7d">COMPLEX 1</text>
  <text x="155" y="400" font-size="6" text-anchor="middle" fill="#8a9ab0">→ Engine parts</text>
  <!-- Conveyor to rocket -->
  <line x1="210" y1="385" x2="340" y2="385" stroke="#4caf7d" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <circle cx="240" cy="385" r="3" fill="#4caf7d" opacity="0.6"/>
  <circle cx="270" cy="385" r="3" fill="#4caf7d" opacity="0.5"/>
  <circle cx="300" cy="385" r="3" fill="#4caf7d" opacity="0.4"/>

  <!-- AC 2 (further left, fuel plant) -->
  <rect x="80" y="430" width="100" height="65" rx="2" fill="#1a1818" stroke="#f5a623" stroke-width="1.5"/>
  <rect x="85" y="425" width="90" height="8" rx="1" fill="#1a1000"/>
  <circle cx="130" cy="443" r="4" fill="#f5a623" opacity="0.85"/>
  <text x="130" y="462" font-size="7" text-anchor="middle" fill="#f5a623">FUEL PLANT</text>
  <text x="130" y="472" font-size="6" text-anchor="middle" fill="#8a9ab0">→ Rocket Fuel</text>
  <line x1="180" y1="460" x2="340" y2="395" stroke="#f5a623" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Player -->
  <circle cx="500" cy="385" r="6" fill="#e8d0a0"/>
  <rect x="495" y="387" width="10" height="14" rx="1" fill="#2a4070"/>

  <!-- ═══ ROCKET READINESS PANEL ═══ -->
  <rect x="580" y="40" width="372" height="430" rx="3" fill="#05080f" stroke="#f5a623" stroke-width="1.5" opacity="0.97"/>
  <rect x="580" y="40" width="372" height="36" rx="3" fill="#1a1000"/>
  <line x1="580" y1="76" x2="952" y2="76" stroke="#f5a623" stroke-width="1" opacity="0.7"/>
  <text x="766" y="62" font-size="12" font-weight="bold" text-anchor="middle" fill="#f5a623">ROCKET ASSEMBLY</text>

  <!-- Readiness bar -->
  <text x="592" y="93" font-size="9" fill="#8a9ab0">Launch Readiness:</text>
  <rect x="592" y="97" width="348" height="18" rx="3" fill="#0a1020"/>
  <rect x="592" y="97" width="236" height="18" rx="3" fill="#f5a623" opacity="0.7"/>
  <text x="766" y="110" font-size="10" font-weight="bold" text-anchor="middle" fill="#fff">68%</text>

  <!-- Component checklist -->
  <text x="592" y="130" font-size="9" fill="#8a9ab0" letter-spacing="1">COMPONENTS</text>
  <line x1="588" y1="133" x2="944" y2="133" stroke="#1a2a30" stroke-width="0.5"/>

  <g font-size="9">
    <!-- Engine ✓ -->
    <rect x="592" y="138" width="340" height="28" rx="2" fill="#0a2010" stroke="#4caf7d" stroke-width="0.8"/>
    <text x="608" y="156" fill="#4caf7d">✓</text>
    <text x="624" y="156" fill="#e8d0a0">Engine Assembly</text>
    <text x="924" y="156" text-anchor="end" fill="#4caf7d">INSTALLED</text>

    <!-- Fuel Tank ◑ partial -->
    <rect x="592" y="170" width="340" height="28" rx="2" fill="#0d1a00" stroke="#f5a623" stroke-width="0.8"/>
    <text x="608" y="188" fill="#f5a623">◑</text>
    <text x="624" y="188" fill="#e8d0a0">Fuel Tank</text>
    <text x="924" y="188" text-anchor="end" fill="#f5a623">2 / 3 cells  (+42m)</text>

    <!-- Cargo Bay ✗ BLOCKING -->
    <rect x="592" y="202" width="340" height="28" rx="2" fill="#1a0808" stroke="#e05555" stroke-width="1.5" filter="url(#glowRed)"/>
    <text x="608" y="220" fill="#e05555">✗</text>
    <text x="624" y="220" fill="#e8d0a0">Cargo Bay Module</text>
    <text x="924" y="220" text-anchor="end" fill="#e05555">MISSING — BLOCKING</text>

    <!-- Nav Core ✓ -->
    <rect x="592" y="234" width="340" height="28" rx="2" fill="#0a2010" stroke="#4caf7d" stroke-width="0.8"/>
    <text x="608" y="252" fill="#4caf7d">✓</text>
    <text x="624" y="252" fill="#e8d0a0">Navigation Core</text>
    <text x="924" y="252" text-anchor="end" fill="#4caf7d">INSTALLED</text>

    <!-- Life Support ◑ -->
    <rect x="592" y="266" width="340" height="28" rx="2" fill="#0d1a00" stroke="#f5a623" stroke-width="0.8"/>
    <text x="608" y="284" fill="#f5a623">◑</text>
    <text x="624" y="284" fill="#e8d0a0">Life Support</text>
    <text x="924" y="284" text-anchor="end" fill="#f5a623">1 / 2 modules  (+18m)</text>

    <!-- Payload (optional) -->
    <rect x="592" y="298" width="340" height="28" rx="2" fill="#080810" stroke="#2a3a50" stroke-width="0.8"/>
    <text x="608" y="316" fill="#3a4a60">○</text>
    <text x="624" y="316" fill="#4a5a70">Payload (optional)</text>
    <text x="924" y="316" text-anchor="end" fill="#3a4a60">EMPTY</text>
  </g>

  <line x1="588" y1="332" x2="944" y2="332" stroke="#1a2a30" stroke-width="0.5"/>

  <!-- Materials needed -->
  <text x="592" y="348" font-size="9" fill="#8a9ab0" letter-spacing="1">MATERIALS REQUIRED</text>
  <g font-size="8">
    <text x="592" y="364" fill="#6a7a90">Cargo Bay Module:</text>
    <text x="940" y="364" text-anchor="end" fill="#e05555">0 / 1  (need Adv. Parts ×6)</text>
    <text x="592" y="378" fill="#6a7a90">Rocket Fuel Cell:</text>
    <text x="940" y="378" text-anchor="end" fill="#f5a623">2 / 3  (+1 needed)</text>
    <text x="592" y="392" fill="#6a7a90">Life Support Module:</text>
    <text x="940" y="392" text-anchor="end" fill="#f5a623">1 / 2  (+1 needed)</text>
  </g>

  <line x1="588" y1="400" x2="944" y2="400" stroke="#1a2a30" stroke-width="0.5"/>

  <!-- Launch button (blocked) -->
  <rect x="592" y="408" width="340" height="50" rx="3" fill="#1a0808" stroke="#e05555" stroke-width="1.5" opacity="0.8"/>
  <text x="762" y="428" font-size="11" text-anchor="middle" fill="#e05555">LAUNCH — BLOCKED</text>
  <text x="762" y="446" font-size="8" text-anchor="middle" fill="#6a4040">Resolve missing components to enable</text>

  <!-- Est time -->
  <text x="592" y="472" font-size="8" fill="#6a7a90">Est. completion (at current rate):</text>
  <text x="940" y="472" text-anchor="end" fill="#f5a623" font-size="8">~1h 04m</text>

  <!-- HUD top bar -->
  <rect x="0" y="0" width="960" height="32" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="32" x2="960" y2="32" stroke="#f5a623" stroke-width="0.8" opacity="0.6"/>
  <text x="14" y="11" font-size="9" fill="#f5a623" opacity="0.7">CREDITS</text>
  <text x="14" y="26" font-size="14" font-weight="bold" fill="#ffd700">◈ 38,200</text>
  <line x1="100" y1="5" x2="100" y2="28" stroke="#2a3a50" stroke-width="0.5"/>
  <text x="113" y="11" font-size="9" fill="#9090f0" opacity="0.7">RESEARCH</text>
  <text x="113" y="26" font-size="14" font-weight="bold" fill="#a0a8f8">⬡ 3,140</text>
  <text x="480" y="20" font-size="12" text-anchor="middle" fill="#f5a623">A1 — Launchpad Zone  ·  Readiness: 68%</text>
  <text x="946" y="20" font-size="14" text-anchor="end" fill="#e8d0a0">03:22:18</text>

  <!-- Bottom bar -->
  <rect x="0" y="506" width="960" height="34" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="506" x2="960" y2="506" stroke="#f5a623" stroke-width="0.8" opacity="0.6"/>
  <text x="480" y="527" font-size="10" text-anchor="middle" fill="#f5a623">[E] INSPECT ROCKET  ·  READINESS: 68%  ·  CARGO BAY MISSING — BLOCKING LAUNCH</text>
</svg>

    <!-- Event 11 - Ship departure -->
    <rect x="30" y="410" width="900" height="26" fill="#0a1020" opacity="0.8"/>
    <text x="44" y="427" fill="#6a7a90">02:07:00</text>
    <rect x="104" y="415" width="70" height="16" rx="2" fill="#0d1a2a"/>
    <text x="139" y="426" text-anchor="middle" fill="#8ab0e0">FLEET</text>
    <text x="200" y="427" fill="#e8d0a0">Voidrunner-1 departed A1 en route to Planet B</text>
    <text x="750" y="427" fill="#8ab0e0">ETA 14m 22s</text>

    <!-- Event 12 - Food warning -->
    <rect x="30" y="436" width="900" height="26" fill="#1a0808" opacity="0.5"/>
    <text x="44" y="453" fill="#6a7a90">02:05:33</text>
    <rect x="104" y="441" width="70" height="16" rx="2" fill="#2a1800"/>
    <text x="139" y="452" text-anchor="middle" fill="#f5a623">⚠ ALERT</text>
    <text x="200" y="453" fill="#f5a623">Colony food supply low — 3 cycles remaining</text>
    <text x="750" y="453" fill="#f5a623">Food: 28 / 200</text>

    <!-- Event 13 - Credits milestone -->
    <rect x="30" y="462" width="900" height="26" fill="#0a1020" opacity="0.6"/>
    <text x="44" y="479" fill="#6a7a90">02:03:11</text>
    <rect x="104" y="467" width="70" height="16" rx="2" fill="#1a1800"/>
    <text x="139" y="478" text-anchor="middle" fill="#ffd700">ECONOMY</text>
    <text x="200" y="479" fill="#e8d0a0">Credits milestone reached: ◈ 40,000</text>
    <text x="750" y="479" fill="#ffd700">◈ 48,320 current</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0f20"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e1a2e"/>
      <stop offset="100%" stop-color="#080e1c"/>
    </linearGradient>
    <filter id="glowAmber">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#f5a623" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bgGrad)"/>
  <g opacity="0.2"><circle cx="200" cy="40" r="0.8" fill="#fff"/><circle cx="700" cy="80" r="0.6" fill="#fff"/><circle cx="880" cy="30" r="0.9" fill="#fff"/></g>

  <!-- Main panel -->
  <rect x="15" y="35" width="930" height="490" rx="4" fill="url(#panelGrad)" stroke="#f5a623" stroke-width="1.5"/>
  <rect x="15" y="35" width="930" height="50" rx="4" fill="#0d1e38"/>
  <rect x="15" y="72" width="930" height="13" fill="#0d1e38"/>
  <line x1="15" y1="85" x2="945" y2="85" stroke="#f5a623" stroke-width="1.5" opacity="0.8"/>
  <text x="480" y="68" font-size="18" font-weight="bold" text-anchor="middle" fill="#ffd700" letter-spacing="4" filter="url(#glowAmber)">≡  EVENT LOG</text>
  <text x="926" y="68" font-size="11" text-anchor="end" fill="#8a9ab0">[ L ] CLOSE</text>

  <!-- Filter bar -->
  <rect x="30" y="92" width="900" height="32" rx="2" fill="#0a1428" stroke="#2a3a50" stroke-width="0.5"/>
  <g font-size="10" text-anchor="middle">
    <rect x="36" y="98" width="70" height="20" rx="2" fill="#1a2848" stroke="#f5a623" stroke-width="1"/>
    <text x="71" y="112" fill="#ffd700">ALL</text>
    <rect x="112" y="98" width="70" height="20" rx="2" fill="#0d1428" stroke="#2a3a50" stroke-width="1"/>
    <text x="147" y="112" fill="#4caf7d">HARVEST</text>
    <rect x="188" y="98" width="70" height="20" rx="2" fill="#0d1428" stroke="#2a3a50" stroke-width="1"/>
    <text x="223" y="112" fill="#4a9fd4">DRONES</text>
    <rect x="264" y="98" width="70" height="20" rx="2" fill="#0d1428" stroke="#2a3a50" stroke-width="1"/>
    <text x="299" y="112" fill="#a0a8f8">RESEARCH</text>
    <rect x="340" y="98" width="70" height="20" rx="2" fill="#0d1428" stroke="#2a3a50" stroke-width="1"/>
    <text x="375" y="112" fill="#f5a623">ALERTS</text>
    <rect x="416" y="98" width="70" height="20" rx="2" fill="#0d1428" stroke="#2a3a50" stroke-width="1"/>
    <text x="451" y="112" fill="#c070e0">COLONY</text>
    <rect x="492" y="98" width="70" height="20" rx="2" fill="#0d1428" stroke="#2a3a50" stroke-width="1"/>
    <text x="527" y="112" fill="#ffd700">ECONOMY</text>
    <text x="800" y="112" fill="#8a9ab0" text-anchor="start">Search: [                    ]</text>
  </g>

  <!-- Column headers -->
  <rect x="30" y="130" width="900" height="20" fill="#0a1428"/>
  <line x1="30" y1="150" x2="930" y2="150" stroke="#2a3a50" stroke-width="0.5"/>
  <g font-size="9" fill="#6a7a90" letter-spacing="1">
    <text x="44" y="144">TIME</text>
    <text x="104" y="144">TYPE</text>
    <text x="200" y="144">EVENT</text>
    <text x="750" y="144">DETAIL</text>
  </g>

  <!-- Event rows (15 rows shown) -->
  <g font-size="10">
    <!-- Event 1 - Harvester full (green) -->
    <rect x="30" y="150" width="900" height="26" fill="#0a1820"/>
    <text x="44" y="167" fill="#6a7a90">02:14:28</text>
    <rect x="104" y="155" width="70" height="16" rx="2" fill="#0d2a10"/>
    <text x="139" y="166" text-anchor="middle" fill="#4caf7d">HARVEST</text>
    <text x="200" y="167" fill="#e8d0a0">Harvester A hopper full — auto-haul initiated</text>
    <text x="750" y="167" fill="#4caf7d">+240 Krysite Ore</text>

    <!-- Event 2 - Drone returned (blue) -->
    <rect x="30" y="176" width="900" height="26" fill="#0a1020"/>
    <text x="44" y="193" fill="#6a7a90">02:14:15</text>
    <rect x="104" y="181" width="70" height="16" rx="2" fill="#0a1830"/>
    <text x="139" y="192" text-anchor="middle" fill="#4a9fd4">DRONE</text>
    <text x="200" y="193" fill="#e8d0a0">CARGO-01 returned to Storage A with full load</text>
    <text x="750" y="193" fill="#4a9fd4">48 units delivered</text>

    <!-- Event 3 - Tech unlocked (purple) -->
    <rect x="30" y="202" width="900" height="26" fill="#0a1020" opacity="0.8"/>
    <text x="44" y="219" fill="#6a7a90">02:13:44</text>
    <rect x="104" y="207" width="70" height="16" rx="2" fill="#180828"/>
    <text x="139" y="218" text-anchor="middle" fill="#a080f0">RESEARCH</text>
    <text x="200" y="219" fill="#e8d0a0">Technology unlocked: Deep Scan Array (Tier 3)</text>
    <text x="750" y="219" fill="#a080f0">Spent 400 RP</text>

    <!-- Event 4 - Pioneer arrived (gold) -->
    <rect x="30" y="228" width="900" height="26" fill="#0a1020"/>
    <text x="44" y="245" fill="#6a7a90">02:13:01</text>
    <rect x="104" y="233" width="70" height="16" rx="2" fill="#1a1200"/>
    <text x="139" y="244" text-anchor="middle" fill="#ffd700">COLONY</text>
    <text x="200" y="245" fill="#e8d0a0">Pioneer #5 arrived — Assigned to Processing Plant A</text>
    <text x="750" y="245" fill="#ffd700">Pop: 5 / 8 cap</text>

    <!-- Event 5 - Warning (amber) -->
    <rect x="30" y="254" width="900" height="26" fill="#1a1000" opacity="0.6"/>
    <text x="44" y="271" fill="#6a7a90">02:12:30</text>
    <rect x="104" y="259" width="70" height="16" rx="2" fill="#2a1800"/>
    <text x="139" y="270" text-anchor="middle" fill="#f5a623">⚠ ALERT</text>
    <text x="200" y="271" fill="#f5a623">Fabricator input starved — Crystal supply depleted</text>
    <text x="750" y="271" fill="#f5a623">0 Crystal remaining</text>

    <!-- Event 6 - Sell transaction -->
    <rect x="30" y="280" width="900" height="26" fill="#0a1020"/>
    <text x="44" y="297" fill="#6a7a90">02:11:55</text>
    <rect x="104" y="285" width="70" height="16" rx="2" fill="#1a1800"/>
    <text x="139" y="296" text-anchor="middle" fill="#ffd700">ECONOMY</text>
    <text x="200" y="297" fill="#e8d0a0">Sold 480 Krysite Ingot at Sell Terminal</text>
    <text x="750" y="297" fill="#ffd700">+◈ 2,016 credits</text>

    <!-- Event 7 - Harvester B partial -->
    <rect x="30" y="306" width="900" height="26" fill="#0a1020" opacity="0.8"/>
    <text x="44" y="323" fill="#6a7a90">02:11:20</text>
    <rect x="104" y="311" width="70" height="16" rx="2" fill="#0d2a10"/>
    <text x="139" y="322" text-anchor="middle" fill="#4caf7d">HARVEST</text>
    <text x="200" y="323" fill="#e8d0a0">Harvester B efficiency dropped — deposit at 31%</text>
    <text x="750" y="323" fill="#f5a623">Rate: 6.2/s (was 10.2)</text>

    <!-- Event 8 - Drone scout found deposit -->
    <rect x="30" y="332" width="900" height="26" fill="#0a1020"/>
    <text x="44" y="349" fill="#6a7a90">02:10:47</text>
    <rect x="104" y="337" width="70" height="16" rx="2" fill="#0a1830"/>
    <text x="139" y="348" text-anchor="middle" fill="#4a9fd4">DRONE</text>
    <text x="200" y="349" fill="#e8d0a0">SCOUT-01 discovered new Xenite deposit in Sector NE-7</text>
    <text x="750" y="349" fill="#4a9fd4">Grade B · Medium</text>

    <!-- Event 9 - RP milestone -->
    <rect x="30" y="358" width="900" height="26" fill="#0a1020" opacity="0.8"/>
    <text x="44" y="375" fill="#6a7a90">02:09:30</text>
    <rect x="104" y="363" width="70" height="16" rx="2" fill="#180828"/>
    <text x="139" y="374" text-anchor="middle" fill="#a080f0">RESEARCH</text>
    <text x="200" y="375" fill="#e8d0a0">Research milestone: 2,500 RP accumulated</text>
    <text x="750" y="375" fill="#a080f0">⬡ 2,840 total</text>

    <!-- Event 10 - Repair complete -->
    <rect x="30" y="384" width="900" height="26" fill="#0a1020"/>
    <text x="44" y="401" fill="#6a7a90">02:08:12</text>
    <rect x="104" y="389" width="70" height="16" rx="2" fill="#0a1830"/>
    <text x="139" y="400" text-anchor="middle" fill="#4a9fd4">DRONE</text>
    <text x="200" y="401" fill="#e8d0a0">REPAIR-01 completed repair on Harvester B (100% hull)</text>

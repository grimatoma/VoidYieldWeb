  <!-- Scroll indicator -->
  <rect x="926" y="150" width="6" height="344" rx="3" fill="#1a2030"/>
  <rect x="926" y="150" width="6" height="120" rx="3" fill="#f5a623" opacity="0.5"/>

  <!-- Bottom bar -->
  <rect x="30" y="492" width="900" height="26" rx="2" fill="#0a1020" stroke="#2a3a50" stroke-width="0.5"/>
  <text x="50" y="509" font-size="10" fill="#8a9ab0">Showing 13 / 247 events  ·  Session: 02:14:37  ·  Auto-scroll: ON</text>
  <rect x="780" y="497" width="80" height="16" rx="2" fill="#0d1428" stroke="#3a4a60" stroke-width="1"/>
  <text x="820" y="509" font-size="9" text-anchor="middle" fill="#8a9ab0">EXPORT LOG</text>
  <rect x="866" y="497" width="60" height="16" rx="2" fill="#0d1428" stroke="#3a4a60" stroke-width="1"/>
  <text x="896" y="509" font-size="9" text-anchor="middle" fill="#8a9ab0">CLEAR</text>

  <g stroke="#f5a623" stroke-width="1" fill="none" opacity="0.2">
    <path d="M 20 20 L 20 42 L 42 42"/>
    <path d="M 940 20 L 940 42 L 918 42"/>
  </g>
</svg>

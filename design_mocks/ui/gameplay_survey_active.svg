<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141a0e"/>
      <stop offset="100%" stop-color="#0c1008"/>
    </linearGradient>
    <linearGradient id="hudBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1e38" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#080e20" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="scanGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#4a9fd4" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGold">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#4caf7d" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="scanRing1" cx="50%" cy="50%" r="50%">
      <stop offset="85%" stop-color="#4a9fd4" stop-opacity="0"/>
      <stop offset="100%" stop-color="#4a9fd4" stop-opacity="0.18"/>
    </radialGradient>
    <radialGradient id="scanRing2" cx="50%" cy="50%" r="50%">
      <stop offset="85%" stop-color="#4a9fd4" stop-opacity="0"/>
      <stop offset="100%" stop-color="#4a9fd4" stop-opacity="0.10"/>
    </radialGradient>
  </defs>

  <!-- World -->
  <rect width="960" height="270" fill="url(#skyGrad)"/>
  <g opacity="0.6">
    <circle cx="45" cy="23" r="0.8" fill="#fff"/><circle cx="234" cy="14" r="1.0" fill="#fff"/>
    <circle cx="698" cy="18" r="1.0" fill="#e0ffff"/><circle cx="812" cy="72" r="0.7" fill="#fff"/>
    <circle cx="445" cy="31" r="0.8" fill="#fff"/><circle cx="120" cy="67" r="0.5" fill="#e0e0ff"/>
  </g>
  <rect x="0" y="270" width="960" height="270" fill="url(#groundGrad)"/>
  <g stroke="#1a2010" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="310" x2="960" y2="310"/><line x1="0" y1="350" x2="960" y2="350"/>
    <line x1="0" y1="390" x2="960" y2="390"/><line x1="0" y1="430" x2="960" y2="430"/>
    <line x1="80" y1="270" x2="80" y2="540"/><line x1="160" y1="270" x2="160" y2="540"/>
    <line x1="240" y1="270" x2="240" y2="540"/><line x1="320" y1="270" x2="320" y2="540"/>
    <line x1="400" y1="270" x2="400" y2="540"/><line x1="480" y1="270" x2="480" y2="540"/>
    <line x1="560" y1="270" x2="560" y2="540"/><line x1="640" y1="270" x2="640" y2="540"/>
    <line x1="720" y1="270" x2="720" y2="540"/>
  </g>
  <line x1="0" y1="270" x2="960" y2="270" stroke="#2a3820" stroke-width="1"/>

  <!-- Scan rings radiating from player (center ~420,400) -->
  <!-- Outer ring -->
  <circle cx="420" cy="395" r="180" fill="none" stroke="#4a9fd4" stroke-width="1" stroke-dasharray="6,4" opacity="0.25"/>
  <circle cx="420" cy="395" r="180" fill="url(#scanRing2)" opacity="0.5"/>
  <!-- Mid ring (active pulse) -->
  <circle cx="420" cy="395" r="110" fill="none" stroke="#4a9fd4" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.55" filter="url(#scanGlow)"/>
  <circle cx="420" cy="395" r="110" fill="url(#scanRing1)" opacity="0.6"/>
  <!-- Inner ring -->
  <circle cx="420" cy="395" r="50" fill="none" stroke="#4a9fd4" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Crosshair on player -->
  <line x1="420" y1="365" x2="420" y2="380" stroke="#4a9fd4" stroke-width="1.5" opacity="0.8"/>
  <line x1="420" y1="410" x2="420" y2="425" stroke="#4a9fd4" stroke-width="1.5" opacity="0.8"/>
  <line x1="390" y1="395" x2="405" y2="395" stroke="#4a9fd4" stroke-width="1.5" opacity="0.8"/>
  <line x1="435" y1="395" x2="450" y2="395" stroke="#4a9fd4" stroke-width="1.5" opacity="0.8"/>
  <circle cx="420" cy="395" r="5" fill="none" stroke="#4a9fd4" stroke-width="1.5"/>

  <!-- Player (holding survey tool) -->
  <circle cx="420" cy="385" r="6" fill="#e8d0a0"/>
  <rect x="415" y="387" width="10" height="14" rx="1" fill="#2a4070"/>
  <!-- Survey tool in hand (extended forward) -->
  <rect x="425" y="383" width="18" height="6" rx="1" fill="#3a6080" stroke="#4a9fd4" stroke-width="0.8"/>
  <circle cx="444" cy="386" r="3" fill="#4a9fd4" opacity="0.9" filter="url(#scanGlow)"/>

  <!-- Deposit 1 — Grade A Krysite (lit up, scanned) -->
  <ellipse cx="310" cy="370" rx="26" ry="12" fill="#2a1a08" stroke="#ffd700" stroke-width="2" opacity="0.9" filter="url(#glowGold)"/>
  <circle cx="300" cy="365" r="7" fill="#4a2a10" opacity="0.9"/>
  <circle cx="318" cy="360" r="6" fill="#6a4020" opacity="0.9"/>
  <!-- Grade badge floating above -->
  <rect x="284" y="340" width="52" height="20" rx="2" fill="#0d1800" stroke="#ffd700" stroke-width="1.5"/>
  <text x="310" y="350" font-size="8" text-anchor="middle" fill="#ffd700" font-weight="bold">GRADE A</text>
  <text x="310" y="358" font-size="7" text-anchor="middle" fill="#ffd700">Krysite Ore</text>
  <!-- Scan line to player -->
  <line x1="310" y1="365" x2="420" y2="390" stroke="#ffd700" stroke-width="0.5" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Deposit 2 — Grade B Voidstone (being scanned, partial) -->
  <ellipse cx="560" cy="400" rx="24" ry="11" fill="#1a1a28" stroke="#f5a623" stroke-width="1.5" opacity="0.85"/>
  <circle cx="550" cy="395" r="7" fill="#2a2040" opacity="0.9"/>
  <circle cx="565" cy="390" r="6" fill="#3a2850" opacity="0.9"/>
  <!-- Scanning animation (partial reveal) -->
  <rect x="534" y="376" width="52" height="20" rx="2" fill="#0d0a00" stroke="#f5a623" stroke-width="1.5"/>
  <text x="560" y="385" font-size="8" text-anchor="middle" fill="#f5a623" font-weight="bold">GRADE B</text>
  <text x="560" y="393" font-size="7" text-anchor="middle" fill="#f5a623">Scanning...</text>
  <line x1="560" y1="395" x2="420" y2="392" stroke="#f5a623" stroke-width="0.5" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Deposit 3 — undetected / barely visible -->
  <ellipse cx="230" cy="440" rx="18" ry="8" fill="#1a1010" stroke="#3a2a20" stroke-width="1" opacity="0.5"/>
  <rect x="210" y="425" width="40" height="14" rx="2" fill="#0a0800" stroke="#3a2a20" stroke-width="0.8" opacity="0.6"/>
  <text x="230" y="435" font-size="7" text-anchor="middle" fill="#4a3a30">? Unknown</text>

  <!-- HUD top bar -->
  <rect x="0" y="0" width="960" height="32" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="32" x2="960" y2="32" stroke="#4a9fd4" stroke-width="1" opacity="0.7"/>
  <text x="14" y="11" font-size="9" fill="#4a9fd4" opacity="0.7">CREDITS</text>
  <text x="14" y="26" font-size="14" font-weight="bold" fill="#ffd700">◈ 3,820</text>
  <line x1="100" y1="5" x2="100" y2="28" stroke="#2a3a50" stroke-width="0.5"/>
  <text x="113" y="11" font-size="9" fill="#9090f0" opacity="0.7">RESEARCH</text>
  <text x="113" y="26" font-size="14" font-weight="bold" fill="#a0a8f8">⬡ 210</text>
  <text x="480" y="20" font-size="12" text-anchor="middle" fill="#4a9fd4">A1 — SURVEY MODE ACTIVE</text>
  <text x="946" y="20" font-size="14" text-anchor="end" fill="#e8d0a0">00:31:07</text>

  <!-- Survey tool panel — right side -->
  <rect x="680" y="40" width="272" height="280" rx="3" fill="#05080f" stroke="#4a9fd4" stroke-width="1.5" opacity="0.96"/>
  <rect x="680" y="40" width="272" height="36" rx="3" fill="#050e20"/>
  <line x1="680" y1="76" x2="952" y2="76" stroke="#4a9fd4" stroke-width="1" opacity="0.7"/>
  <text x="816" y="62" font-size="13" font-weight="bold" text-anchor="middle" fill="#4a9fd4">◈  SURVEY TOOL</text>

  <!-- Scan stage progress -->
  <text x="696" y="95" font-size="9" fill="#8a9ab0" letter-spacing="1">SCAN STAGE</text>
  <g font-size="9">
    <!-- Stage 1: complete -->
    <rect x="696" y="100" width="118" height="20" rx="2" fill="#0a2010" stroke="#4caf7d" stroke-width="1"/>
    <text x="755" y="114" font-size="8" text-anchor="middle" fill="#4caf7d">✓  Ping  (0.5s)</text>
    <!-- Stage 2: complete -->
    <rect x="820" y="100" width="118" height="20" rx="2" fill="#0a2010" stroke="#4caf7d" stroke-width="1"/>
    <text x="879" y="114" font-size="8" text-anchor="middle" fill="#4caf7d">✓  Density (1.2s)</text>
    <!-- Stage 3: active -->
    <rect x="696" y="125" width="118" height="22" rx="2" fill="#0d1e38" stroke="#4a9fd4" stroke-width="1.5"/>
    <text x="755" y="137" font-size="8" text-anchor="middle" fill="#4a9fd4">▶  Resonance</text>
    <!-- Progress bar -->
    <rect x="700" y="139" width="110" height="5" rx="2" fill="#0a1020"/>
    <rect x="700" y="139" width="72" height="5" rx="2" fill="#4a9fd4" opacity="0.8"/>
    <text x="755" y="148" font-size="7" text-anchor="middle" fill="#4a9fd4">65%  (2.1s left)</text>
    <!-- Stage 4: locked -->
    <rect x="820" y="125" width="118" height="22" rx="2" fill="#08080f" stroke="#2a3a50" stroke-width="1" opacity="0.6"/>
    <text x="879" y="140" font-size="8" text-anchor="middle" fill="#3a4a60">⬡  Full Scan (6s)</text>
  </g>

  <!-- Divider -->
  <line x1="688" y1="158" x2="944" y2="158" stroke="#1a2a40" stroke-width="0.5"/>

  <!-- Deposit list -->
  <text x="696" y="173" font-size="9" fill="#8a9ab0" letter-spacing="1">DEPOSITS IN RANGE</text>

  <!-- Deposit 1 -->
  <rect x="696" y="178" width="240" height="38" rx="2" fill="#0d1800" stroke="#ffd700" stroke-width="1"/>
  <rect x="696" y="178" width="4" height="38" rx="1" fill="#ffd700"/>
  <text x="708" y="191" font-size="10" fill="#ffd700" font-weight="bold">Krysite Ore — Grade A</text>
  <text x="708" y="205" font-size="8" fill="#8a9ab0">Rich · ~320 units · ER: 847</text>
  <text x="928" y="196" font-size="8" text-anchor="end" fill="#4caf7d">Scanned ✓</text>

  <!-- Deposit 2 -->
  <rect x="696" y="220" width="240" height="38" rx="2" fill="#0d0a00" stroke="#f5a623" stroke-width="1"/>
  <rect x="696" y="220" width="4" height="38" rx="1" fill="#f5a623"/>
  <text x="708" y="233" font-size="10" fill="#f5a623" font-weight="bold">Voidstone Ore — Grade B</text>
  <text x="708" y="247" font-size="8" fill="#8a9ab0">Moderate · ~185 units · ER: 610</text>
  <text x="928" y="238" font-size="8" text-anchor="end" fill="#4a9fd4">Scanning...</text>

  <!-- Deposit 3 -->
  <rect x="696" y="262" width="240" height="38" rx="2" fill="#080808" stroke="#2a3a50" stroke-width="1" opacity="0.7"/>
  <rect x="696" y="262" width="4" height="38" rx="1" fill="#2a3a50"/>
  <text x="708" y="275" font-size="10" fill="#4a5a70">Unknown Deposit</text>
  <text x="708" y="289" font-size="8" fill="#3a4a60">Out of range — move closer</text>

  <!-- Divider -->
  <line x1="688" y1="304" x2="944" y2="304" stroke="#1a2a40" stroke-width="0.5"/>

  <!-- Attributes preview (partial) -->
  <text x="696" y="319" font-size="9" fill="#8a9ab0" letter-spacing="1">ATTRIBUTE PREVIEW — Krysite A</text>
  <g font-size="8">
    <text x="696" y="334" fill="#6a7a90">ER (Extraction Rate)</text>
    <rect x="800" y="326" width="136" height="7" rx="2" fill="#0a1020"/>
    <rect x="800" y="326" width="115" height="7" rx="2" fill="#4a9fd4" opacity="0.8"/>
    <text x="936" y="334" text-anchor="end" fill="#4a9fd4">847</text>
    <text x="696" y="349" fill="#6a7a90">CR (Crystal Rarity)</text>
    <rect x="800" y="341" width="136" height="7" rx="2" fill="#0a1020"/>
    <rect x="800" y="341" width="79" height="7" rx="2" fill="#4a9fd4" opacity="0.6"/>
    <text x="936" y="349" text-anchor="end" fill="#4a9fd4">582</text>
    <text x="696" y="364" fill="#3a4a60">CD (Crystalline Density)</text>
    <rect x="800" y="356" width="136" height="7" rx="2" fill="#0a1020"/>
    <rect x="800" y="356" width="30" height="7" rx="2" fill="#2a3a50" opacity="0.5"/>
    <text x="936" y="364" text-anchor="end" fill="#2a3a60">🔒 Locked</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="506" width="960" height="34" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="506" x2="960" y2="506" stroke="#4a9fd4" stroke-width="0.8" opacity="0.6"/>
  <text x="480" y="527" font-size="10" text-anchor="middle" fill="#4a9fd4">[Q] EXIT SURVEY  ·  [HOLD Q] FULL SCAN  ·  SCANNING: Voidstone B  (65%)  ·  2 DEPOSITS FOUND</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141a0e"/>
      <stop offset="100%" stop-color="#0c1008"/>
    </linearGradient>
    <linearGradient id="hudBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1e38" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#080e20" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#4caf7d" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowAmber">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#f5a623" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowRed">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#e05555" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- World background -->
  <rect width="960" height="270" fill="url(#skyGrad)"/>
  <g opacity="0.5">
    <circle cx="45" cy="23" r="0.8" fill="#ffffff"/>
    <circle cx="234" cy="14" r="1.0" fill="#ffffff"/>
    <circle cx="698" cy="18" r="1.0" fill="#e0ffff"/>
    <circle cx="812" cy="72" r="0.7" fill="#ffffff"/>
    <circle cx="920" cy="40" r="0.9" fill="#ffffff"/>
  </g>
  <rect x="0" y="270" width="960" height="270" fill="url(#groundGrad)"/>
  <!-- Ground grid -->
  <g stroke="#1a2010" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="310" x2="960" y2="310"/>
    <line x1="0" y1="350" x2="960" y2="350"/>
    <line x1="0" y1="390" x2="960" y2="390"/>
    <line x1="0" y1="430" x2="960" y2="430"/>
    <line x1="80" y1="270" x2="80" y2="510"/>
    <line x1="160" y1="270" x2="160" y2="510"/>
    <line x1="240" y1="270" x2="240" y2="510"/>
    <line x1="320" y1="270" x2="320" y2="510"/>
    <line x1="400" y1="270" x2="400" y2="510"/>
    <line x1="480" y1="270" x2="480" y2="510"/>
    <line x1="560" y1="270" x2="560" y2="510"/>
    <line x1="640" y1="270" x2="640" y2="510"/>
    <line x1="720" y1="270" x2="720" y2="510"/>
    <line x1="800" y1="270" x2="800" y2="510"/>
    <line x1="880" y1="270" x2="880" y2="510"/>
  </g>

  <!-- Buildings on the map -->
  <!-- Harvester A -->
  <rect x="108" y="300" width="44" height="32" rx="2" fill="#2a3848" stroke="#4a6880" stroke-width="1"/>
  <rect x="113" y="295" width="34" height="9" rx="1" fill="#3a4858"/>
  <circle cx="130" cy="316" r="4" fill="#f5a623" opacity="0.6"/>

  <!-- Harvester B -->
  <rect x="260" y="330" width="44" height="32" rx="2" fill="#2a3848" stroke="#4a6880" stroke-width="1"/>
  <rect x="265" y="325" width="34" height="9" rx="1" fill="#3a4858"/>
  <circle cx="282" cy="346" r="4" fill="#f5a623" opacity="0.4"/>

  <!-- Processing Plant -->
  <rect x="420" y="290" width="70" height="55" rx="2" fill="#1e2e3a" stroke="#3a5060" stroke-width="1.5"/>
  <rect x="425" y="285" width="60" height="10" fill="#253040"/>
  <rect x="440" y="340" width="10" height="8" fill="#1a2030"/>
  <rect x="462" y="340" width="10" height="8" fill="#1a2030"/>
  <circle cx="455" cy="312" r="8" fill="#1a3048" stroke="#2a4060" stroke-width="1"/>
  <circle cx="455" cy="312" r="4" fill="#f5a623" opacity="0.3"/>

  <!-- Fabricator -->
  <rect x="580" y="310" width="55" height="45" rx="2" fill="#1e2e3a" stroke="#3a5060" stroke-width="1.5"/>
  <rect x="585" y="305" width="45" height="9" fill="#253040"/>

  <!-- Storage A -->
  <rect x="200" y="390" width="60" height="45" rx="2" fill="#1e2e1a" stroke="#3a5030" stroke-width="1.5"/>
  <rect x="205" y="385" width="50" height="8" fill="#253520"/>

  <!-- Storage B -->
  <rect x="500" y="400" width="60" height="45" rx="2" fill="#1e2e1a" stroke="#3a5030" stroke-width="1.5"/>
  <rect x="505" y="395" width="50" height="8" fill="#253520"/>

  <!-- Repair Station -->
  <rect x="700" y="350" width="48" height="38" rx="2" fill="#2a1e2e" stroke="#5a3a60" stroke-width="1.5"/>

  <!-- ═══ PRODUCTION OVERLAY tint ═══ -->
  <rect width="960" height="540" fill="#000820" opacity="0.4"/>

  <!-- Overlay label top -->
  <rect x="0" y="0" width="960" height="32" fill="#050d20" opacity="0.9"/>
  <line x1="0" y1="32" x2="960" y2="32" stroke="#f5a623" stroke-width="1" opacity="0.6"/>
  <text x="14" y="21" font-size="14" font-weight="bold" fill="#ffd700" letter-spacing="3" filter="url(#glowAmber)">⚙  PRODUCTION RATES</text>
  <text x="480" y="21" font-size="11" text-anchor="middle" fill="#8a9ab0" letter-spacing="2">[O] TOGGLE OVERLAY</text>
  <text x="946" y="21" font-size="11" text-anchor="end" fill="#f5a623">LIVE</text>
  <circle cx="956" cy="16" r="4" fill="#4caf7d" opacity="0.8"/>

  <!-- ═══ FLOATING PRODUCTION RATE CARDS ═══ -->

  <!-- Harvester A — ACTIVE green -->
  <g filter="url(#glowGreen)">
    <rect x="75" y="248" width="130" height="46" rx="3" fill="#0a1a10" stroke="#4caf7d" stroke-width="1.5" opacity="0.95"/>
    <text x="140" y="264" font-size="9" text-anchor="middle" fill="#4caf7d" letter-spacing="1">HARVESTER A</text>
    <text x="140" y="282" font-size="15" font-weight="bold" text-anchor="middle" fill="#4caf7d">+12.4 Fe/s</text>
    <text x="140" y="292" font-size="8" text-anchor="middle" fill="#6ac090">Running • 94% eff.</text>
  </g>
  <!-- Connector line -->
  <line x1="140" y1="294" x2="130" y2="305" stroke="#4caf7d" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,2"/>

  <!-- Harvester B — PARTIAL amber (low ore) -->
  <g filter="url(#glowAmber)">
    <rect x="215" y="272" width="130" height="46" rx="3" fill="#1a1200" stroke="#f5a623" stroke-width="1.5" opacity="0.95"/>
    <text x="280" y="288" font-size="9" text-anchor="middle" fill="#f5a623" letter-spacing="1">HARVESTER B</text>
    <text x="280" y="306" font-size="15" font-weight="bold" text-anchor="middle" fill="#f5a623">+6.2 Fe/s</text>
    <text x="280" y="316" font-size="8" text-anchor="middle" fill="#c08020">Partial • deposit 31%</text>
  </g>
  <line x1="280" y1="318" x2="282" y2="332" stroke="#f5a623" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,2"/>

  <!-- Processing Plant — ACTIVE -->
  <g filter="url(#glowGreen)">
    <rect x="376" y="238" width="150" height="46" rx="3" fill="#0a1a10" stroke="#4caf7d" stroke-width="1.5" opacity="0.95"/>
    <text x="451" y="254" font-size="9" text-anchor="middle" fill="#4caf7d" letter-spacing="1">PROCESSING PLANT</text>
    <text x="451" y="272" font-size="13" font-weight="bold" text-anchor="middle" fill="#4caf7d">+8.0 Refined/s</text>
    <text x="451" y="282" font-size="8" text-anchor="middle" fill="#6ac090">In: 11.2 Fe/s • 89% eff.</text>
  </g>
  <line x1="451" y1="284" x2="455" y2="292" stroke="#4caf7d" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,2"/>

  <!-- Fabricator — STARVED red -->
  <g filter="url(#glowRed)">
    <rect x="545" y="256" width="136" height="46" rx="3" fill="#1a0808" stroke="#e05555" stroke-width="1.5" opacity="0.95"/>
    <text x="613" y="272" font-size="9" text-anchor="middle" fill="#e05555" letter-spacing="1">FABRICATOR</text>
    <text x="613" y="290" font-size="13" font-weight="bold" text-anchor="middle" fill="#e05555">STARVED</text>
    <text x="613" y="300" font-size="8" text-anchor="middle" fill="#c04040">Waiting: Crystal input</text>
  </g>
  <line x1="613" y1="302" x2="608" y2="312" stroke="#e05555" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,2"/>

  <!-- Storage A — capacity -->
  <g>
    <rect x="160" y="340" width="112" height="42" rx="3" fill="#0a1008" stroke="#3a5030" stroke-width="1" opacity="0.95"/>
    <text x="216" y="356" font-size="9" text-anchor="middle" fill="#8ab090" letter-spacing="1">STORAGE A</text>
    <rect x="168" y="362" width="96" height="7" rx="2" fill="#1a2010"/>
    <rect x="168" y="362" width="61" height="7" rx="2" fill="#4caf7d" opacity="0.7"/>
    <text x="216" y="374" font-size="8" text-anchor="middle" fill="#4caf7d">64% • 1,280 Fe</text>
  </g>
  <line x1="216" y1="382" x2="230" y2="392" stroke="#3a5030" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,2"/>

  <!-- Storage B -->
  <g>
    <rect x="460" y="352" width="112" height="42" rx="3" fill="#0a1008" stroke="#3a5030" stroke-width="1" opacity="0.95"/>
    <text x="516" y="368" font-size="9" text-anchor="middle" fill="#8ab090" letter-spacing="1">STORAGE B</text>
    <rect x="468" y="374" width="96" height="7" rx="2" fill="#1a2010"/>
    <rect x="468" y="374" width="38" height="7" rx="2" fill="#4caf7d" opacity="0.7"/>
    <text x="516" y="386" font-size="8" text-anchor="middle" fill="#4caf7d">40% • 380 Cx</text>
  </g>

  <!-- Repair Station — IDLE amber -->
  <g filter="url(#glowAmber)">
    <rect x="658" y="300" width="120" height="42" rx="3" fill="#1a1200" stroke="#f5a623" stroke-width="1" opacity="0.95"/>
    <text x="718" y="316" font-size="9" text-anchor="middle" fill="#f5a623" letter-spacing="1">REPAIR STATION</text>
    <text x="718" y="330" font-size="13" font-weight="bold" text-anchor="middle" fill="#f5a623">IDLE</text>
    <text x="718" y="340" font-size="8" text-anchor="middle" fill="#a07020">No targets nearby</text>
  </g>

  <!-- ═══ HUD TOP BAR ═══ -->
  <rect x="0" y="0" width="960" height="32" fill="#050d20" opacity="0.0"/>

  <!-- ═══ LEGEND ═══ -->
  <rect x="8" y="455" width="210" height="78" rx="2" fill="#05080f" stroke="#2a3a50" stroke-width="1" opacity="0.92"/>
  <text x="20" y="470" font-size="9" fill="#f5a623" letter-spacing="2">LEGEND</text>
  <line x1="16" y1="474" x2="210" y2="474" stroke="#2a3a50" stroke-width="0.5"/>
  <rect x="16" y="480" width="10" height="8" rx="1" fill="#4caf7d" opacity="0.7"/>
  <text x="32" y="488" font-size="10" fill="#e8d0a0">Active / Running</text>
  <rect x="16" y="496" width="10" height="8" rx="1" fill="#f5a623" opacity="0.7"/>
  <text x="32" y="504" font-size="10" fill="#e8d0a0">Partial / Throttled</text>
  <rect x="16" y="512" width="10" height="8" rx="1" fill="#e05555" opacity="0.7"/>
  <text x="32" y="520" font-size="10" fill="#e8d0a0">Starved / Blocked</text>

  <!-- Bottom bar -->
  <rect x="0" y="506" width="960" height="34" fill="#050d20" opacity="0.9"/>
  <line x1="0" y1="506" x2="960" y2="506" stroke="#f5a623" stroke-width="0.8" opacity="0.6"/>
  <text x="480" y="527" font-size="11" text-anchor="middle" fill="#f5a623" letter-spacing="3">[ O ] TOGGLE  ·  NET OUTPUT: +8.0 refined/s  ·  EFFICIENCY: 72%</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141a0e"/>
      <stop offset="100%" stop-color="#0c1008"/>
    </linearGradient>
    <linearGradient id="hudBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1e38" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#080e20" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glowAmber">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#f5a623" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- World — sparse, early game -->
  <rect width="960" height="270" fill="url(#skyGrad)"/>
  <g opacity="0.6">
    <circle cx="45" cy="23" r="0.8" fill="#fff"/><circle cx="234" cy="14" r="1.0" fill="#fff"/>
    <circle cx="698" cy="18" r="1.0" fill="#e0ffff"/><circle cx="812" cy="72" r="0.7" fill="#fff"/>
    <circle cx="445" cy="31" r="0.8" fill="#fff"/><circle cx="120" cy="67" r="0.5" fill="#e0e0ff"/>
    <circle cx="567" cy="55" r="0.5" fill="#fff"/><circle cx="920" cy="40" r="0.9" fill="#fff"/>
  </g>
  <!-- Planet visible -->
  <circle cx="820" cy="80" r="28" fill="#1a2845" stroke="#2a3855" stroke-width="0.5" opacity="0.7"/>
  <ellipse cx="820" cy="80" rx="42" ry="10" fill="none" stroke="#4a6090" stroke-width="0.8" opacity="0.4" transform="rotate(-15,820,80)"/>

  <rect x="0" y="270" width="960" height="270" fill="url(#groundGrad)"/>
  <!-- Sparse ground grid -->
  <g stroke="#1a2010" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="310" x2="960" y2="310"/>
    <line x1="0" y1="350" x2="960" y2="350"/>
    <line x1="0" y1="390" x2="960" y2="390"/>
    <line x1="0" y1="430" x2="960" y2="430"/>
    <line x1="80" y1="270" x2="80" y2="540"/>
    <line x1="160" y1="270" x2="160" y2="540"/>
    <line x1="240" y1="270" x2="240" y2="540"/>
    <line x1="320" y1="270" x2="320" y2="540"/>
    <line x1="400" y1="270" x2="400" y2="540"/>
    <line x1="480" y1="270" x2="480" y2="540"/>
    <line x1="560" y1="270" x2="560" y2="540"/>
    <line x1="640" y1="270" x2="640" y2="540"/>
    <line x1="720" y1="270" x2="720" y2="540"/>
  </g>
  <line x1="0" y1="270" x2="960" y2="270" stroke="#2a3820" stroke-width="1"/>

  <!-- 2 ore nodes visible — nearby, undiscovered markers -->
  <!-- Ore Node 1 — Krysite -->
  <ellipse cx="310" cy="370" rx="22" ry="10" fill="#2a1a08" stroke="#5a3820" stroke-width="1" opacity="0.8"/>
  <circle cx="300" cy="366" r="6" fill="#3a2010" opacity="0.9"/>
  <circle cx="315" cy="362" r="5" fill="#4a2a10" opacity="0.9"/>
  <!-- Unscanned indicator (?) -->
  <rect x="287" y="346" width="46" height="16" rx="2" fill="#0a0800" stroke="#6a5020" stroke-width="1" opacity="0.8"/>
  <text x="310" y="357" font-size="8" text-anchor="middle" fill="#8a6030">? Ore Node</text>

  <!-- Ore Node 2 — slightly farther -->
  <ellipse cx="580" cy="400" rx="18" ry="8" fill="#1a1a28" stroke="#4a3a70" stroke-width="1" opacity="0.7"/>
  <circle cx="572" cy="397" r="5" fill="#2a2040" opacity="0.9"/>
  <circle cx="584" cy="393" r="4" fill="#3a2850" opacity="0.9"/>
  <rect x="558" y="382" width="44" height="14" rx="2" fill="#080810" stroke="#5a4a80" stroke-width="1" opacity="0.7"/>
  <text x="580" y="392" font-size="7" text-anchor="middle" fill="#6a5a90">? Unknown</text>

  <!-- Crafting Station (small, just placed) -->
  <rect x="420" y="370" width="55" height="42" rx="2" fill="#1a2030" stroke="#3a5070" stroke-width="1.5"/>
  <rect x="425" y="365" width="45" height="8" fill="#202838"/>
  <rect x="430" y="380" width="35" height="20" rx="1" fill="#0d1428"/>
  <text x="447" y="388" font-size="6" text-anchor="middle" fill="#4a6080">CRAFT</text>
  <text x="447" y="396" font-size="6" text-anchor="middle" fill="#4a6080">STATION</text>
  <text x="447" y="406" font-size="6" text-anchor="middle" fill="#ffd700">[ E ]</text>
  <text x="447" y="360" font-size="7" text-anchor="middle" fill="#4a6080">Crafting Station</text>

  <!-- Player character — picking up ore by hand -->
  <circle cx="358" cy="380" r="6" fill="#e8d0a0"/>
  <rect x="353" y="382" width="10" height="14" rx="1" fill="#2a4070"/>
  <line x1="353" y1="385" x2="347" y2="393" stroke="#2a4070" stroke-width="2"/>
  <line x1="363" y1="385" x2="369" y2="393" stroke="#2a4070" stroke-width="2"/>
  <!-- Hand reaching toward ore node -->
  <line x1="347" y1="393" x2="335" y2="398" stroke="#e8d0a0" stroke-width="1.5"/>
  <!-- Ore piece being picked -->
  <circle cx="330" cy="400" r="4" fill="#5a3818" stroke="#8a5828" stroke-width="1"/>

  <!-- Small ore pickup indicator -->
  <text x="330" y="390" font-size="8" fill="#ffd700" filter="url(#glowAmber)">+1 Ore</text>

  <!-- Landing pod (spawn point) -->
  <ellipse cx="200" cy="380" rx="22" ry="10" fill="#1a2030" stroke="#3a5070" stroke-width="1" opacity="0.8"/>
  <rect x="183" y="363" width="34" height="20" rx="2" fill="#1a2838" stroke="#3a5070" stroke-width="1"/>
  <circle cx="200" cy="370" r="5" fill="#0a1828" stroke="#3a6080" stroke-width="0.5"/>
  <text x="200" y="352" font-size="7" text-anchor="middle" fill="#3a5070">SPAWN</text>

  <!-- Objective hint popup -->
  <rect x="600" y="290" width="340" height="100" rx="3" fill="#05080f" stroke="#f5a623" stroke-width="1.5" opacity="0.95"/>
  <text x="770" y="308" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffd700">OBJECTIVE</text>
  <line x1="608" y1="312" x2="932" y2="312" stroke="#f5a623" stroke-width="0.5" opacity="0.5"/>
  <g font-size="10">
    <text x="618" y="330" fill="#8a9ab0">1.</text>
    <text x="634" y="330" fill="#e8d0a0">Gather 20 Ore by hand</text>
    <text x="930" y="330" text-anchor="end" fill="#f5a623">3 / 20</text>
    <text x="618" y="348" fill="#8a9ab0">2.</text>
    <text x="634" y="348" fill="#4a5a70">Build a Basic Harvester</text>
    <text x="618" y="366" fill="#8a9ab0">3.</text>
    <text x="634" y="366" fill="#4a5a70">Sell ore at Sell Terminal</text>
  </g>

  <!-- HUD top bar — very sparse early game -->
  <rect x="0" y="0" width="960" height="32" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="32" x2="960" y2="32" stroke="#f5a623" stroke-width="0.8" opacity="0.6"/>
  <text x="14" y="11" font-size="9" fill="#f5a623" opacity="0.7">CREDITS</text>
  <text x="14" y="26" font-size="14" font-weight="bold" fill="#ffd700">◈ 150</text>
  <line x1="85" y1="5" x2="85" y2="28" stroke="#2a3a50" stroke-width="0.5"/>
  <text x="98" y="11" font-size="9" fill="#9090f0" opacity="0.7">RESEARCH</text>
  <text x="98" y="26" font-size="14" font-weight="bold" fill="#a0a8f8">⬡ 0</text>
  <line x1="175" y1="5" x2="175" y2="28" stroke="#2a3a50" stroke-width="0.5"/>
  <text x="188" y="20" font-size="10" fill="#8a9ab0">Ore: 3</text>
  <text x="480" y="20" font-size="12" text-anchor="middle" fill="#e8d0a0">A1 — Voidstone Prime  [EARLY GAME]</text>
  <text x="946" y="20" font-size="14" text-anchor="end" fill="#e8d0a0">00:03:12</text>

  <!-- New game flavor text -->
  <rect x="200" y="460" width="560" height="30" rx="2" fill="#0a1020" stroke="#2a3a50" stroke-width="0.5" opacity="0.9"/>
  <text x="480" y="479" font-size="10" text-anchor="middle" fill="#6a7a90">You've crash-landed. No drones. No factories. Just you, 2 ore nodes, and a dream. Start mining.</text>

  <!-- Bottom bar -->
  <rect x="0" y="506" width="960" height="34" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="506" x2="960" y2="506" stroke="#f5a623" stroke-width="0.8" opacity="0.6"/>
  <text x="480" y="527" font-size="10" text-anchor="middle" fill="#8a9ab0">[E] INTERACT  [Q] SURVEY  [I] INVENTORY  [B] BUILD  ·  WALK UP TO ORE AND PRESS [E]</text>
</svg>

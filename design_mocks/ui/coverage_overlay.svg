<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141a0e"/>
      <stop offset="100%" stop-color="#0c1008"/>
    </linearGradient>
    <radialGradient id="coverage1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a9fd4" stop-opacity="0.12"/>
      <stop offset="80%" stop-color="#4a9fd4" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#4a9fd4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coverage2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4caf7d" stop-opacity="0.12"/>
      <stop offset="80%" stop-color="#4caf7d" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#4caf7d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coverage3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.12"/>
      <stop offset="80%" stop-color="#f5a623" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coverage4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c070e0" stop-opacity="0.12"/>
      <stop offset="80%" stop-color="#c070e0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#c070e0" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowAmber">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#f5a623" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- World -->
  <rect width="960" height="270" fill="url(#skyGrad)"/>
  <g opacity="0.5">
    <circle cx="45" cy="23" r="0.8" fill="#ffffff"/>
    <circle cx="234" cy="14" r="1.0" fill="#ffffff"/>
    <circle cx="698" cy="18" r="1.0" fill="#e0ffff"/>
    <circle cx="812" cy="72" r="0.7" fill="#ffffff"/>
  </g>
  <rect x="0" y="270" width="960" height="270" fill="url(#groundGrad)"/>
  <g stroke="#1a2010" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="310" x2="960" y2="310"/>
    <line x1="0" y1="350" x2="960" y2="350"/>
    <line x1="0" y1="390" x2="960" y2="390"/>
    <line x1="0" y1="430" x2="960" y2="430"/>
    <line x1="80" y1="270" x2="80" y2="510"/>
    <line x1="160" y1="270" x2="160" y2="510"/>
    <line x1="240" y1="270" x2="240" y2="510"/>
    <line x1="320" y1="270" x2="320" y2="510"/>
    <line x1="400" y1="270" x2="400" y2="510"/>
    <line x1="480" y1="270" x2="480" y2="510"/>
    <line x1="560" y1="270" x2="560" y2="510"/>
    <line x1="640" y1="270" x2="640" y2="510"/>
    <line x1="720" y1="270" x2="720" y2="510"/>
    <line x1="800" y1="270" x2="800" y2="510"/>
  </g>

  <!-- Dark overlay -->
  <rect width="960" height="540" fill="#000820" opacity="0.45"/>

  <!-- ═══ COVERAGE ZONES (large radius circles) ═══ -->

  <!-- Zone 1: Cargo Drone Bay A — blue, center-left -->
  <circle cx="200" cy="380" r="160" fill="url(#coverage1)"/>
  <circle cx="200" cy="380" r="160" fill="none" stroke="#4a9fd4" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <circle cx="200" cy="380" r="2" fill="#4a9fd4"/>

  <!-- Zone 2: Cargo Drone Bay B — green, center -->
  <circle cx="480" cy="360" r="140" fill="url(#coverage2)"/>
  <circle cx="480" cy="360" r="140" fill="none" stroke="#4caf7d" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <circle cx="480" cy="360" r="2" fill="#4caf7d"/>

  <!-- Zone 3: Scout Drone Hub — amber, right -->
  <circle cx="700" cy="340" r="180" fill="url(#coverage3)"/>
  <circle cx="700" cy="340" r="180" fill="none" stroke="#f5a623" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <circle cx="700" cy="340" r="2" fill="#f5a623"/>

  <!-- Zone 4: Repair Drone Outpost — purple, upper -->
  <circle cx="550" cy="280" r="120" fill="url(#coverage4)"/>
  <circle cx="550" cy="280" r="120" fill="none" stroke="#c070e0" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <circle cx="550" cy="280" r="2" fill="#c070e0"/>

  <!-- Buildings -->
  <rect x="178" y="362" width="44" height="32" rx="2" fill="#1a2848" stroke="#4a9fd4" stroke-width="1.5"/>
  <text x="200" y="384" font-size="7" text-anchor="middle" fill="#4a9fd4">DRONE BAY A</text>

  <rect x="458" y="344" width="44" height="32" rx="2" fill="#1a3020" stroke="#4caf7d" stroke-width="1.5"/>
  <text x="480" y="366" font-size="7" text-anchor="middle" fill="#4caf7d">DRONE BAY B</text>

  <rect x="678" y="324" width="44" height="32" rx="2" fill="#1a1a08" stroke="#f5a623" stroke-width="1.5"/>
  <text x="700" y="346" font-size="7" text-anchor="middle" fill="#f5a623">SCOUT HUB</text>

  <rect x="528" y="262" width="44" height="32" rx="2" fill="#1a0a2a" stroke="#c070e0" stroke-width="1.5"/>
  <text x="550" y="284" font-size="7" text-anchor="middle" fill="#c070e0">REPAIR HUB</text>

  <!-- Coverage labels (floating) -->
  <text x="100" y="320" font-size="10" text-anchor="middle" fill="#4a9fd4" opacity="0.8">r = 160u</text>
  <text x="360" y="310" font-size="10" text-anchor="middle" fill="#4caf7d" opacity="0.8">r = 140u</text>
  <text x="870" y="280" font-size="10" text-anchor="middle" fill="#f5a623" opacity="0.8">r = 180u</text>
  <text x="430" y="210" font-size="10" text-anchor="middle" fill="#c070e0" opacity="0.8">r = 120u</text>

  <!-- Ore nodes in coverage -->
  <circle cx="150" cy="420" r="8" fill="#5a4020" stroke="#8a6030" stroke-width="1"/>
  <text x="150" y="436" font-size="7" text-anchor="middle" fill="#8a6030">Voidstone</text>
  <circle cx="280" cy="400" r="6" fill="#2a4060" stroke="#3a6090" stroke-width="1"/>
  <text x="280" y="416" font-size="7" text-anchor="middle" fill="#3a6090">Krysite</text>
  <circle cx="540" cy="400" r="7" fill="#3a2060" stroke="#6a40a0" stroke-width="1"/>
  <text x="540" y="416" font-size="7" text-anchor="middle" fill="#6a40a0">Xenite</text>
  <circle cx="780" cy="380" r="9" fill="#1a3a18" stroke="#2a6028" stroke-width="1"/>
  <text x="780" y="396" font-size="7" text-anchor="middle" fill="#2a6028">Copper</text>

  <!-- UNCOVERED zone indicator -->
  <rect x="100" y="460" width="160" height="28" rx="2" fill="#1a0808" stroke="#e05555" stroke-width="1" opacity="0.8"/>
  <circle cx="116" cy="474" r="4" fill="#e05555" opacity="0.8"/>
  <text x="190" y="478" font-size="10" text-anchor="middle" fill="#e05555">UNCOVERED DEPOSITS: 3</text>

  <!-- Overlap zones (lighter fill where circles overlap) -->
  <ellipse cx="340" cy="375" rx="20" ry="25" fill="#80c0a0" opacity="0.06"/>

  <!-- HUD top bar -->
  <rect x="0" y="0" width="960" height="32" fill="#050d20" opacity="0.92"/>
  <line x1="0" y1="32" x2="960" y2="32" stroke="#f5a623" stroke-width="0.8" opacity="0.6"/>
  <text x="14" y="21" font-size="14" font-weight="bold" fill="#ffd700" letter-spacing="3" filter="url(#glowAmber)">◉  DRONE COVERAGE</text>
  <text x="480" y="21" font-size="11" text-anchor="middle" fill="#8a9ab0" letter-spacing="2">[B] TOGGLE OVERLAY</text>
  <text x="946" y="21" font-size="11" text-anchor="end" fill="#4caf7d">COVERAGE: 74%</text>

  <!-- Legend panel -->
  <rect x="8" y="40" width="185" height="105" rx="2" fill="#05080f" stroke="#2a3a50" stroke-width="1" opacity="0.92"/>
  <text x="20" y="56" font-size="9" fill="#f5a623" letter-spacing="2">DRONE ZONES</text>
  <line x1="16" y1="60" x2="186" y2="60" stroke="#2a3a50" stroke-width="0.5"/>
  <g font-size="10">
    <circle cx="24" cy="74" r="5" fill="none" stroke="#4a9fd4" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="36" y="78" fill="#4a9fd4">Cargo Drone Bay A</text>
    <circle cx="24" cy="92" r="5" fill="none" stroke="#4caf7d" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="36" y="96" fill="#4caf7d">Cargo Drone Bay B</text>
    <circle cx="24" cy="110" r="5" fill="none" stroke="#f5a623" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="36" y="114" fill="#f5a623">Scout Drone Hub</text>
    <circle cx="24" cy="128" r="5" fill="none" stroke="#c070e0" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="36" y="132" fill="#c070e0">Repair Drone Hub</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="506" width="960" height="34" fill="#050d20" opacity="0.92"/>
  <line x1="0" y1="506" x2="960" y2="506" stroke="#f5a623" stroke-width="0.8" opacity="0.6"/>
  <text x="480" y="527" font-size="11" text-anchor="middle" fill="#f5a623" letter-spacing="2">[ B ] TOGGLE  ·  DRONES ACTIVE: 14  ·  RANGE UPGRADES: LVL 2</text>
</svg>

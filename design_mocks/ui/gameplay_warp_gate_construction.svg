<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141a0e"/>
      <stop offset="100%" stop-color="#0c1008"/>
    </linearGradient>
    <linearGradient id="hudBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1e38" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#080e20" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glowWarp">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#9060e0" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowAmber">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#f5a623" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#4caf7d" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="warpCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c090ff" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#6030c0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6030c0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="960" height="270" fill="url(#skyGrad)"/>
  <g opacity="0.5">
    <circle cx="45" cy="23" r="0.8" fill="#fff"/><circle cx="234" cy="14" r="1" fill="#fff"/>
    <circle cx="698" cy="18" r="1" fill="#e0ffff"/><circle cx="812" cy="72" r="0.7" fill="#fff"/>
    <circle cx="445" cy="31" r="0.8" fill="#fff"/><circle cx="120" cy="67" r="0.5" fill="#e0e0ff"/>
    <circle cx="567" cy="55" r="0.5" fill="#fff"/>
  </g>
  <rect x="0" y="270" width="960" height="270" fill="url(#groundGrad)"/>
  <g stroke="#1a2010" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="310" x2="960" y2="310"/><line x1="0" y1="350" x2="960" y2="350"/>
    <line x1="0" y1="390" x2="960" y2="390"/><line x1="0" y1="430" x2="960" y2="430"/>
    <line x1="80" y1="270" x2="80" y2="540"/><line x1="240" y1="270" x2="240" y2="540"/>
    <line x1="400" y1="270" x2="400" y2="540"/>
    <line x1="560" y1="270" x2="560" y2="540"/><line x1="720" y1="270" x2="720" y2="540"/>
  </g>
  <line x1="0" y1="270" x2="960" y2="270" stroke="#2a3820" stroke-width="1"/>

  <!-- ═══ WARP GATE STRUCTURE ═══ (massive, center-right) -->
  <!-- Warp aura -->
  <circle cx="500" cy="300" r="140" fill="url(#warpCore)" opacity="0.7"/>

  <!-- Gate outer ring (partial — under construction) -->
  <!-- Left arch segment (built) -->
  <path d="M 420 420 A 100 150 0 0 1 420 180" fill="none" stroke="#9060e0" stroke-width="8" opacity="0.9" filter="url(#glowWarp)"/>
  <!-- Right arch segment (partial, 60% done, fading) -->
  <path d="M 580 420 A 100 150 0 0 0 580 280" fill="none" stroke="#9060e0" stroke-width="8" opacity="0.9"/>
  <!-- Right top (incomplete — dashed) -->
  <path d="M 580 280 A 100 150 0 0 0 580 180" fill="none" stroke="#6040a0" stroke-width="6" stroke-dasharray="10,8" opacity="0.5"/>

  <!-- Gate inner emitter ring (partial glow) -->
  <path d="M 435 410 A 65 110 0 0 1 435 190" fill="none" stroke="#c090ff" stroke-width="3" opacity="0.4"/>
  <path d="M 565 410 A 65 110 0 0 0 565 270" fill="none" stroke="#c090ff" stroke-width="3" opacity="0.3"/>

  <!-- Gate base pylons -->
  <rect x="408" y="415" width="30" height="55" rx="2" fill="#2a1a50" stroke="#7040c0" stroke-width="1.5"/>
  <rect x="562" y="415" width="30" height="55" rx="2" fill="#2a1a50" stroke="#7040c0" stroke-width="1.5"/>
  <!-- Base footings -->
  <rect x="398" y="465" width="50" height="12" rx="2" fill="#1a1030"/>
  <rect x="552" y="465" width="50" height="12" rx="2" fill="#1a1030"/>

  <!-- Scaffolding (right side — incomplete) -->
  <g stroke="#3a3a50" stroke-width="1.5" opacity="0.6">
    <line x1="598" y1="180" x2="598" y2="420"/>
    <line x1="618" y1="180" x2="618" y2="420"/>
    <line x1="598" y1="210" x2="618" y2="210"/>
    <line x1="598" y1="240" x2="618" y2="240"/>
    <line x1="598" y1="270" x2="618" y2="270"/>
    <line x1="598" y1="300" x2="618" y2="300"/>
    <line x1="598" y1="330" x2="618" y2="330"/>
    <line x1="598" y1="360" x2="618" y2="360"/>
    <line x1="598" y1="390" x2="618" y2="390"/>
    <!-- crane arm -->
    <line x1="618" y1="200" x2="650" y2="200"/>
    <line x1="650" y1="200" x2="650" y2="240"/>
    <line x1="635" y1="200" x2="580" y2="260" stroke-dasharray="3,3"/>
  </g>

  <!-- Assembly Complexes feeding the gate (bottom left area) -->
  <rect x="60" y="345" width="110" height="80" rx="3" fill="#1a2020" stroke="#4caf7d" stroke-width="1.5"/>
  <circle cx="115" cy="360" r="4" fill="#4caf7d" opacity="0.85"/>
  <text x="115" y="380" font-size="7" text-anchor="middle" fill="#4caf7d">ASSEMBLY</text>
  <text x="115" y="390" font-size="7" text-anchor="middle" fill="#4caf7d">COMPLEX A</text>
  <text x="115" y="402" font-size="6" text-anchor="middle" fill="#8a9ab0">→ Gate Segments</text>

  <rect x="60" y="435" width="110" height="65" rx="2" fill="#1a1828" stroke="#9060e0" stroke-width="1.5"/>
  <circle cx="115" cy="450" r="4" fill="#9060e0" opacity="0.85"/>
  <text x="115" y="468" font-size="7" text-anchor="middle" fill="#9060e0">WARP CORE</text>
  <text x="115" y="478" font-size="7" text-anchor="middle" fill="#9060e0">PLANT</text>
  <text x="115" y="488" font-size="6" text-anchor="middle" fill="#8a9ab0">→ Core Matrices</text>

  <!-- Conveyors to gate -->
  <line x1="170" y1="385" x2="408" y2="440" stroke="#4caf7d" stroke-width="1" stroke-dasharray="5,4" opacity="0.4"/>
  <line x1="170" y1="465" x2="408" y2="455" stroke="#9060e0" stroke-width="1" stroke-dasharray="5,4" opacity="0.35"/>
  <!-- Moving parts -->
  <circle cx="240" cy="400" r="3" fill="#4caf7d" opacity="0.6"/>
  <circle cx="310" cy="418" r="3" fill="#4caf7d" opacity="0.5"/>
  <circle cx="240" cy="460" r="3" fill="#9060e0" opacity="0.6"/>
  <circle cx="310" cy="455" r="3" fill="#9060e0" opacity="0.5"/>

  <!-- Player (tiny, to show scale) -->
  <circle cx="395" cy="455" r="4" fill="#e8d0a0"/>
  <rect x="391" y="457" width="8" height="11" rx="1" fill="#2a4070"/>

  <!-- ═══ CONSTRUCTION PANEL ═══ (right side) -->
  <rect x="660" y="40" width="292" height="430" rx="3" fill="#05080f" stroke="#9060e0" stroke-width="1.5" filter="url(#glowWarp)" opacity="0.97"/>
  <rect x="660" y="40" width="292" height="36" rx="3" fill="#100820"/>
  <line x1="660" y1="76" x2="952" y2="76" stroke="#9060e0" stroke-width="1" opacity="0.7"/>
  <text x="806" y="62" font-size="12" font-weight="bold" text-anchor="middle" fill="#c090ff">WARP GATE</text>

  <!-- Progress bar -->
  <text x="672" y="92" font-size="9" fill="#8a9ab0">Construction Progress:</text>
  <rect x="672" y="96" width="268" height="20" rx="3" fill="#0a1020"/>
  <rect x="672" y="96" width="115" height="20" rx="3" fill="#9060e0" opacity="0.7"/>
  <text x="806" y="110" font-size="10" font-weight="bold" text-anchor="middle" fill="#fff">43%</text>
  <text x="940" y="124" font-size="8" text-anchor="end" fill="#f5a623">Est: 4h 22m</text>

  <line x1="668" y1="130" x2="944" y2="130" stroke="#2a1a40" stroke-width="0.5"/>

  <!-- Component checklist -->
  <text x="672" y="144" font-size="9" fill="#8a9ab0" letter-spacing="1">COMPONENTS</text>
  <g font-size="8">
    <!-- Gate Frame ✓ -->
    <rect x="672" y="149" width="268" height="24" rx="2" fill="#0a2010" stroke="#4caf7d" stroke-width="0.8"/>
    <text x="686" y="165" fill="#4caf7d">✓</text>
    <text x="700" y="165" fill="#e8d0a0">Gate Frame Segments</text>
    <text x="932" y="165" text-anchor="end" fill="#4caf7d">12 / 12</text>

    <!-- Warp Core ◑ -->
    <rect x="672" y="177" width="268" height="24" rx="2" fill="#0d1a30" stroke="#9060e0" stroke-width="0.8"/>
    <text x="686" y="193" fill="#9060e0">◑</text>
    <text x="700" y="193" fill="#e8d0a0">Warp Core Matrix</text>
    <text x="932" y="193" text-anchor="end" fill="#9060e0">3 / 7  (+2h 18m)</text>

    <!-- Emitter Array ◑ -->
    <rect x="672" y="205" width="268" height="24" rx="2" fill="#0d1020" stroke="#f5a623" stroke-width="0.8"/>
    <text x="686" y="221" fill="#f5a623">◑</text>
    <text x="700" y="221" fill="#e8d0a0">Emitter Array</text>
    <text x="932" y="221" text-anchor="end" fill="#f5a623">2 / 4  (+1h 44m)</text>

    <!-- Power Conduit ✗ -->
    <rect x="672" y="233" width="268" height="24" rx="2" fill="#100808" stroke="#e05555" stroke-width="1"/>
    <text x="686" y="249" fill="#e05555">✗</text>
    <text x="700" y="249" fill="#e8d0a0">Power Conduit</text>
    <text x="932" y="249" text-anchor="end" fill="#e05555">0 / 3  NEEDED</text>

    <!-- Stabilizer ◑ -->
    <rect x="672" y="261" width="268" height="24" rx="2" fill="#0d1020" stroke="#f5a623" stroke-width="0.8"/>
    <text x="686" y="277" fill="#f5a623">◑</text>
    <text x="700" y="277" fill="#e8d0a0">Phase Stabilizer</text>
    <text x="932" y="277" text-anchor="end" fill="#f5a623">1 / 2  (+40m)</text>
  </g>

  <line x1="668" y1="292" x2="944" y2="292" stroke="#2a1a40" stroke-width="0.5"/>

  <!-- Resource requirements -->
  <text x="672" y="306" font-size="9" fill="#8a9ab0" letter-spacing="1">MATERIALS IN QUEUE</text>
  <g font-size="8">
    <text x="672" y="322" fill="#6a7a90">Adv. Parts:</text>
    <text x="940" y="322" text-anchor="end" fill="#e8d0a0">84 / 120 delivered</text>
    <rect x="672" y="325" width="268" height="6" rx="2" fill="#0a1020"/>
    <rect x="672" y="325" width="187" height="6" rx="2" fill="#4caf7d" opacity="0.6"/>

    <text x="672" y="342" fill="#6a7a90">Warp Crystal:</text>
    <text x="940" y="342" text-anchor="end" fill="#e8d0a0">14 / 35 delivered</text>
    <rect x="672" y="345" width="268" height="6" rx="2" fill="#0a1020"/>
    <rect x="672" y="345" width="107" height="6" rx="2" fill="#9060e0" opacity="0.6"/>

    <text x="672" y="362" fill="#6a7a90">Power Cell:</text>
    <text x="940" y="362" text-anchor="end" fill="#e05555">0 / 18  (craft first)</text>
    <rect x="672" y="365" width="268" height="6" rx="2" fill="#0a1020"/>

    <text x="672" y="382" fill="#6a7a90">Credits spent:</text>
    <text x="940" y="382" text-anchor="end" fill="#ffd700">◈ 48,200 / ◈ 120,000</text>
  </g>

  <line x1="668" y1="390" x2="944" y2="390" stroke="#2a1a40" stroke-width="0.5"/>

  <!-- Lore / flavor -->
  <text x="672" y="404" font-size="8" fill="#6a5a90">"When complete, the Warp Gate will</text>
  <text x="672" y="416" font-size="8" fill="#6a5a90">connect A1 to the galactic network.</text>
  <text x="672" y="428" font-size="8" fill="#6a5a90">A new era for Voidstone Prime."</text>

  <rect x="672" y="436" width="268" height="24" rx="2" fill="#100820" stroke="#9060e0" stroke-width="1" opacity="0.8"/>
  <text x="806" y="452" font-size="9" text-anchor="middle" fill="#9060e0">Completion: ~4h 22m at current rate</text>

  <!-- HUD top bar -->
  <rect x="0" y="0" width="960" height="32" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="32" x2="960" y2="32" stroke="#9060e0" stroke-width="1" opacity="0.6"/>
  <text x="14" y="11" font-size="9" fill="#f5a623" opacity="0.7">CREDITS</text>
  <text x="14" y="26" font-size="14" font-weight="bold" fill="#ffd700">◈ 74,800</text>
  <line x1="100" y1="5" x2="100" y2="28" stroke="#2a3a50" stroke-width="0.5"/>
  <text x="113" y="11" font-size="9" fill="#9090f0" opacity="0.7">RESEARCH</text>
  <text x="113" y="26" font-size="14" font-weight="bold" fill="#a0a8f8">⬡ 8,420</text>
  <text x="480" y="20" font-size="12" text-anchor="middle" fill="#c090ff">A1 — Warp Gate Construction  ·  43%</text>
  <text x="946" y="20" font-size="14" text-anchor="end" fill="#e8d0a0">06:44:31</text>

  <!-- Bottom bar -->
  <rect x="0" y="506" width="960" height="34" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="506" x2="960" y2="506" stroke="#9060e0" stroke-width="0.8" opacity="0.6"/>
  <text x="480" y="527" font-size="10" text-anchor="middle" fill="#c090ff">[E] INSPECT GATE  ·  [P] PRODUCTION  ·  WARP GATE: 43%  ·  Est. 4h 22m</text>
</svg>

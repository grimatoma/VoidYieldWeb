    <circle cx="768" cy="103" r="8" fill="#3a2a18" stroke="#4caf7d" stroke-width="1"/>
    <text x="768" y="107" font-size="7" text-anchor="middle" fill="#e8d0a0">P1</text>
    <circle cx="790" cy="103" r="8" fill="#3a2a18" stroke="#4caf7d" stroke-width="1"/>
    <text x="790" y="107" font-size="7" text-anchor="middle" fill="#e8d0a0">P2</text>
    <circle cx="812" cy="103" r="8" fill="#3a2a18" stroke="#4caf7d" stroke-width="1"/>
    <text x="812" y="107" font-size="7" text-anchor="middle" fill="#e8d0a0">P3</text>
    <circle cx="834" cy="103" r="8" fill="#3a2a18" stroke="#4caf7d" stroke-width="1"/>
    <text x="834" y="107" font-size="7" text-anchor="middle" fill="#e8d0a0">P4</text>

    <!-- Morale -->

  <rect x="135" y="400" width="10" height="14" rx="1" fill="#2a4070"/>

  <!-- ═══ COLONY STATUS PANEL ═══ (right) -->
  <rect x="752" y="40" width="200" height="420" rx="3" fill="#05080f" stroke="#4caf7d" stroke-width="1.5" opacity="0.97"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141a0e"/>
      <stop offset="100%" stop-color="#0c1008"/>
    </linearGradient>
    <linearGradient id="hudBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1e38" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#080e20" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glowGold">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#4caf7d" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowAmber">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#f5a623" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- World -->
  <rect width="960" height="270" fill="url(#skyGrad)"/>
  <g opacity="0.5">
    <circle cx="45" cy="23" r="0.8" fill="#fff"/><circle cx="234" cy="14" r="1.0" fill="#fff"/>
    <circle cx="698" cy="18" r="1.0" fill="#e0ffff"/><circle cx="812" cy="72" r="0.7" fill="#fff"/>
    <circle cx="445" cy="31" r="0.8" fill="#fff"/><circle cx="120" cy="67" r="0.5" fill="#e0e0ff"/>
  </g>
  <rect x="0" y="270" width="960" height="270" fill="url(#groundGrad)"/>
  <g stroke="#1a2010" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="310" x2="960" y2="310"/><line x1="0" y1="350" x2="960" y2="350"/>
    <line x1="0" y1="390" x2="960" y2="390"/><line x1="0" y1="430" x2="960" y2="430"/>
    <line x1="80" y1="270" x2="80" y2="540"/><line x1="240" y1="270" x2="240" y2="540"/>
    <line x1="400" y1="270" x2="400" y2="540"/><line x1="560" y1="270" x2="560" y2="540"/>
    <line x1="720" y1="270" x2="720" y2="540"/>
  </g>
  <line x1="0" y1="270" x2="960" y2="270" stroke="#2a3820" stroke-width="1"/>

  <!-- ═══ COLONY BUILDINGS ═══ -->

  <!-- Habitation Module 1 -->
  <rect x="180" y="330" width="100" height="80" rx="3" fill="#1a2838" stroke="#4caf7d" stroke-width="2"/>
  <rect x="185" y="324" width="90" height="10" rx="1" fill="#253040"/>
  <!-- Windows (lit) -->
  <rect x="194" y="345" width="16" height="12" rx="1" fill="#ffd700" opacity="0.4"/>
  <rect x="218" y="345" width="16" height="12" rx="1" fill="#ffd700" opacity="0.5"/>
  <rect x="242" y="345" width="16" height="12" rx="1" fill="#ffd700" opacity="0.3"/>
  <rect x="194" y="366" width="16" height="12" rx="1" fill="#4a9fd4" opacity="0.4"/>
  <rect x="218" y="366" width="16" height="12" rx="1" fill="#4a9fd4" opacity="0.5"/>
  <!-- Door -->
  <rect x="215" y="390" width="20" height="20" rx="1" fill="#0d1428"/>
  <!-- Status light -->
  <circle cx="230" cy="334" r="4" fill="#4caf7d" opacity="0.9"/>
  <text x="230" y="417" font-size="7" text-anchor="middle" fill="#4caf7d">HAB MOD 1</text>
  <text x="230" y="427" font-size="6" text-anchor="middle" fill="#8a9ab0">Capacity: 2 pioneers</text>

  <!-- Habitation Module 2 -->
  <rect x="320" y="330" width="100" height="80" rx="3" fill="#1a2838" stroke="#4caf7d" stroke-width="2"/>
  <rect x="325" y="324" width="90" height="10" rx="1" fill="#253040"/>
  <rect x="334" y="345" width="16" height="12" rx="1" fill="#ffd700" opacity="0.5"/>
  <rect x="358" y="345" width="16" height="12" rx="1" fill="#ffd700" opacity="0.4"/>
  <rect x="382" y="345" width="16" height="12" rx="1" fill="#ffd700" opacity="0.3"/>
  <rect x="334" y="366" width="16" height="12" rx="1" fill="#4a9fd4" opacity="0.3"/>
  <rect x="358" y="366" width="16" height="12" rx="1" fill="#4a9fd4" opacity="0.4"/>
  <rect x="355" y="390" width="20" height="20" rx="1" fill="#0d1428"/>
  <circle cx="370" cy="334" r="4" fill="#4caf7d" opacity="0.9"/>
  <text x="370" y="417" font-size="7" text-anchor="middle" fill="#4caf7d">HAB MOD 2</text>
  <text x="370" y="427" font-size="6" text-anchor="middle" fill="#8a9ab0">Capacity: 2 pioneers</text>

  <!-- Water Pump -->
  <rect x="470" y="345" width="60" height="65" rx="2" fill="#1a2030" stroke="#4a9fd4" stroke-width="1.5"/>
  <rect x="476" y="340" width="48" height="8" rx="1" fill="#253040"/>
  <circle cx="500" cy="365" r="10" fill="#0d1828" stroke="#4a9fd4" stroke-width="1"/>
  <text x="500" y="369" font-size="8" text-anchor="middle" fill="#4a9fd4">〜</text>
  <text x="500" y="395" font-size="6" text-anchor="middle" fill="#4a9fd4">WATER</text>
  <text x="500" y="403" font-size="6" text-anchor="middle" fill="#4a9fd4">PUMP</text>

  <!-- Food Dome -->
  <ellipse cx="600" cy="385" rx="45" ry="30" fill="#0d1f0d" stroke="#4caf7d" stroke-width="1.5" opacity="0.9"/>
  <ellipse cx="600" cy="385" rx="38" ry="24" fill="#122012" opacity="0.8"/>
  <!-- Plants inside dome (suggestion) -->
  <line x1="585" y1="390" x2="585" y2="374" stroke="#2a6020" stroke-width="1.5"/>
  <circle cx="585" cy="373" r="5" fill="#2a6020" opacity="0.8"/>
  <line x1="600" y1="392" x2="600" y2="372" stroke="#3a7030" stroke-width="1.5"/>
  <circle cx="600" cy="371" r="6" fill="#3a7030" opacity="0.8"/>
  <line x1="615" y1="390" x2="615" y2="375" stroke="#2a6020" stroke-width="1.5"/>
  <circle cx="615" cy="374" r="4" fill="#2a6020" opacity="0.8"/>
  <text x="600" y="420" font-size="7" text-anchor="middle" fill="#4caf7d">FOOD DOME</text>

  <!-- Power Generator -->
  <rect x="680" y="355" width="55" height="50" rx="2" fill="#1a1a10" stroke="#f5a623" stroke-width="1.5"/>
  <circle cx="707" cy="375" r="10" fill="#1a1000" stroke="#f5a623" stroke-width="1"/>
  <text x="707" y="379" font-size="8" text-anchor="middle" fill="#f5a623">⚡</text>
  <text x="707" y="398" font-size="6" text-anchor="middle" fill="#f5a623">POWER</text>
  <text x="707" y="406" font-size="6" text-anchor="middle" fill="#f5a623">GEN</text>

  <!-- Pioneer figures (4 around the colony) -->

    <rect x="820" y="117" width="120" height="7" rx="2" fill="#0a1020"/>
    <rect x="820" y="117" width="96" height="7" rx="2" fill="#4caf7d" opacity="0.8"/>
    <text x="944" y="124" text-anchor="end" fill="#4caf7d">80%</text>

    <line x1="760" y1="130" x2="944" y2="130" stroke="#0a2010" stroke-width="0.5"/>

    <!-- Needs header -->
    <text x="764" y="144" fill="#8a9ab0" letter-spacing="1">NEEDS</text>

    <!-- Food -->
    <text x="764" y="160" fill="#6a7a90">Food:</text>
    <rect x="820" y="153" width="100" height="7" rx="2" fill="#0a1020"/>
    <rect x="820" y="153" width="80" height="7" rx="2" fill="#4caf7d" opacity="0.8"/>
    <text x="944" y="160" text-anchor="end" fill="#4caf7d">OK</text>
    <!-- Water -->
    <text x="764" y="175" fill="#6a7a90">Water:</text>
    <rect x="820" y="168" width="100" height="7" rx="2" fill="#0a1020"/>
    <rect x="820" y="168" width="72" height="7" rx="2" fill="#4caf7d" opacity="0.8"/>
    <text x="944" y="175" text-anchor="end" fill="#4caf7d">OK</text>
    <!-- Power -->
    <text x="764" y="190" fill="#6a7a90">Power:</text>
    <rect x="820" y="183" width="100" height="7" rx="2" fill="#0a1020"/>
    <rect x="820" y="183" width="85" height="7" rx="2" fill="#4caf7d" opacity="0.8"/>
    <text x="944" y="190" text-anchor="end" fill="#4caf7d">OK</text>
    <!-- Luxury (amber — partial) -->
    <text x="764" y="205" fill="#f5a623">Luxury:</text>
    <rect x="820" y="198" width="100" height="7" rx="2" fill="#0a1020"/>
    <rect x="820" y="198" width="32" height="7" rx="2" fill="#f5a623" opacity="0.7"/>
    <text x="944" y="205" text-anchor="end" fill="#f5a623">Low</text>

    <line x1="760" y1="212" x2="944" y2="212" stroke="#0a2010" stroke-width="0.5"/>

    <!-- Growth -->
    <text x="764" y="226" fill="#8a9ab0" letter-spacing="1">GROWTH</text>
    <text x="764" y="242" fill="#6a7a90">Capacity:</text>
    <text x="944" y="242" text-anchor="end" fill="#e8d0a0">4 / 4</text>
    <text x="764" y="258" fill="#6a7a90">Next Pioneer:</text>
    <text x="944" y="258" text-anchor="end" fill="#f5a623">Need luxury ↑</text>
    <rect x="764" y="262" width="176" height="20" rx="2" fill="#1a0c00" stroke="#f5a623" stroke-width="1" filter="url(#glowAmber)"/>
    <text x="852" y="276" font-size="8" text-anchor="middle" fill="#f5a623">Build Entertainment Module</text>

    <line x1="760" y1="288" x2="944" y2="288" stroke="#0a2010" stroke-width="0.5"/>

    <!-- Production roles -->
    <text x="764" y="302" fill="#8a9ab0" letter-spacing="1">PIONEER ROLES</text>
    <text x="764" y="318" fill="#6a7a90">P1 — Mining</text>
    <text x="944" y="318" text-anchor="end" fill="#4a9fd4">+8 ore/min</text>
    <text x="764" y="333" fill="#6a7a90">P2 — Crafting</text>
    <text x="944" y="333" text-anchor="end" fill="#f5a623">×1.2 speed</text>
    <text x="764" y="348" fill="#6a7a90">P3 — Farming</text>
    <text x="944" y="348" text-anchor="end" fill="#4caf7d">+12 food/min</text>
    <text x="764" y="363" fill="#6a7a90">P4 — Research</text>
    <text x="944" y="363" text-anchor="end" fill="#a0a8f8">+4 RP/min</text>

    <line x1="760" y1="370" x2="944" y2="370" stroke="#0a2010" stroke-width="0.5"/>

    <!-- Next growth timer -->
    <text x="764" y="385" fill="#4caf7d" font-weight="bold">HAB capacity:</text>
    <text x="944" y="385" text-anchor="end" fill="#4caf7d">4 slots</text>
    <text x="764" y="400" fill="#6a7a90">Max pop:</text>
    <text x="944" y="400" text-anchor="end" fill="#e8d0a0">4 (need HAB 3)</text>
    <rect x="764" y="406" width="176" height="26" rx="2" fill="#0d1828" stroke="#4a9fd4" stroke-width="1"/>
    <text x="852" y="416" font-size="7" text-anchor="middle" fill="#4a9fd4">[ B ] BUILD  Hab Module 3</text>
    <text x="852" y="428" font-size="7" text-anchor="middle" fill="#6a7a90">Cost: ◈ 800  ·  Adv. Parts ×4</text>
  </g>

  <!-- New pioneer arrival hint -->
  <rect x="0" y="460" width="740" height="36" rx="2" fill="#081808" stroke="#4caf7d" stroke-width="1" opacity="0.9"/>
  <text x="370" y="476" font-size="9" text-anchor="middle" fill="#4caf7d" font-weight="bold">COLONY GROWING!</text>
  <text x="370" y="490" font-size="8" text-anchor="middle" fill="#8a9ab0">Improve luxury supply to attract Pioneer 5 · Build Entertainment Module (◈ 1,200)</text>

  <!-- HUD top bar -->

  <line x1="752" y1="72" x2="952" y2="72" stroke="#4caf7d" stroke-width="0.8" opacity="0.6"/>
  <text x="852" y="60" font-size="10" text-anchor="middle" fill="#4caf7d" font-weight="bold">COLONY STATUS</text>

  <g font-size="9">
    <!-- Population -->
    <text x="764" y="88" fill="#6a7a90">Population:</text>
    <text x="944" y="88" text-anchor="end" fill="#e8d0a0" font-weight="bold">4 Pioneers</text>


  <text x="14" y="26" font-size="14" font-weight="bold" fill="#ffd700">◈ 22,800</text>
  <line x1="100" y1="5" x2="100" y2="28" stroke="#2a3a50" stroke-width="0.5"/>
  <text x="113" y="11" font-size="9" fill="#9090f0" opacity="0.7">RESEARCH</text>
  <text x="113" y="26" font-size="14" font-weight="bold" fill="#a0a8f8">⬡ 1,820</text>
  <line x1="200" y1="5" x2="200" y2="28" stroke="#2a3a50" stroke-width="0.5"/>
  <text x="213" y="20" font-size="10" fill="#4caf7d">Pioneers: 4</text>
  <text x="480" y="20" font-size="12" text-anchor="middle" fill="#e8d0a0">A1 — Colony Zone</text>
  <text x="946" y="20" font-size="14" text-anchor="end" fill="#e8d0a0">02:10:44</text>

  <!-- Bottom bar -->
  <rect x="0" y="506" width="960" height="34" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="506" x2="960" y2="506" stroke="#f5a623" stroke-width="0.8" opacity="0.6"/>
  <text x="480" y="527" font-size="10" text-anchor="middle" fill="#8a9ab0">[E] INTERACT  ·  [B] BUILD  ·  4 PIONEERS  ·  MORALE: 80%  ·  LUXURY: LOW</text>

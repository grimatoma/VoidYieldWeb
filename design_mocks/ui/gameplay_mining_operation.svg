<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141a0e"/>
      <stop offset="100%" stop-color="#0c1008"/>
    </linearGradient>
    <linearGradient id="hudBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1e38" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#080e20" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glowAmber">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#f5a623" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGold">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- World -->
  <rect width="960" height="260" fill="url(#skyGrad)"/>
  <g opacity="0.6">
    <circle cx="45" cy="23" r="0.8" fill="#fff"/><circle cx="234" cy="14" r="1.0" fill="#fff"/>
    <circle cx="445" cy="31" r="0.8" fill="#fff"/><circle cx="698" cy="18" r="1.0" fill="#e0ffff"/>
    <circle cx="812" cy="72" r="0.7" fill="#fff"/><circle cx="920" cy="40" r="0.9" fill="#fff"/>
    <circle cx="120" cy="67" r="0.5" fill="#e0e0ff"/><circle cx="567" cy="55" r="0.5" fill="#fff"/>
    <circle cx="356" cy="112" r="0.5" fill="#fff"/><circle cx="745" cy="167" r="0.6" fill="#fff"/>
  </g>
  <!-- Small planet -->
  <circle cx="820" cy="80" r="28" fill="#1a2845" stroke="#2a3855" stroke-width="0.5" opacity="0.7"/>
  <ellipse cx="820" cy="80" rx="42" ry="10" fill="none" stroke="#4a6090" stroke-width="0.8" opacity="0.4" transform="rotate(-15,820,80)"/>

  <rect x="0" y="260" width="960" height="280" fill="url(#groundGrad)"/>
  <!-- Ground grid -->
  <g stroke="#1a2010" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="300" x2="960" y2="300"/>
    <line x1="0" y1="340" x2="960" y2="340"/>
    <line x1="0" y1="380" x2="960" y2="380"/>
    <line x1="0" y1="420" x2="960" y2="420"/>
    <line x1="0" y1="460" x2="960" y2="460"/>
    <line x1="0" y1="500" x2="960" y2="500"/>
    <line x1="80" y1="260" x2="80" y2="540"/>
    <line x1="160" y1="260" x2="160" y2="540"/>
    <line x1="240" y1="260" x2="240" y2="540"/>
    <line x1="320" y1="260" x2="320" y2="540"/>
    <line x1="400" y1="260" x2="400" y2="540"/>
    <line x1="480" y1="260" x2="480" y2="540"/>
    <line x1="560" y1="260" x2="560" y2="540"/>
    <line x1="640" y1="260" x2="640" y2="540"/>
    <line x1="720" y1="260" x2="720" y2="540"/>
    <line x1="800" y1="260" x2="800" y2="540"/>
    <line x1="880" y1="260" x2="880" y2="540"/>
  </g>
  <line x1="0" y1="260" x2="960" y2="260" stroke="#2a3820" stroke-width="1"/>

  <!-- ═══ WORLD OBJECTS ═══ -->

  <!-- Ore Deposit 1 (Grade A — Krysite) with glowing indicator -->
  <ellipse cx="180" cy="360" rx="30" ry="14" fill="#2a1a08" stroke="#6a4020" stroke-width="1" opacity="0.8"/>
  <circle cx="168" cy="356" r="7" fill="#4a2a10" opacity="0.9"/>
  <circle cx="182" cy="350" r="6" fill="#6a4020" opacity="0.9"/>
  <circle cx="194" cy="358" r="5" fill="#4a2a10" opacity="0.9"/>
  <!-- Grade A badge floating -->
  <rect x="148" y="330" width="64" height="18" rx="2" fill="#0d1200" stroke="#ffd700" stroke-width="1.5" filter="url(#glowGold)"/>
  <text x="180" y="342" font-size="8" text-anchor="middle" fill="#ffd700">A ★ Krysite</text>

  <!-- Harvester 1 on deposit 1 -->
  <rect x="158" y="370" width="44" height="32" rx="2" fill="#2a3848" stroke="#4a6880" stroke-width="1.5"/>
  <rect x="163" y="365" width="34" height="9" rx="1" fill="#3a4858" stroke="#5a7890" stroke-width="0.5"/>
  <rect x="168" y="400" width="8" height="6" fill="#1a2030"/>
  <rect x="182" y="400" width="8" height="6" fill="#1a2030"/>
  <circle cx="180" cy="386" r="4" fill="#f5a623" opacity="0.8"/>
  <!-- Hopper fill bar above harvester -->
  <rect x="158" y="358" width="44" height="5" rx="1" fill="#0a1020"/>
  <rect x="158" y="358" width="37" height="5" rx="1" fill="#4caf7d" opacity="0.8"/>
  <text x="180" y="362" font-size="5" text-anchor="middle" fill="#4caf7d">84%</text>

  <!-- Ore Deposit 2 (Grade B — Voidstone) -->
  <ellipse cx="480" cy="400" rx="26" ry="12" fill="#1e140a" stroke="#5a4020" stroke-width="1" opacity="0.8"/>
  <circle cx="470" cy="397" r="6" fill="#3a2010" opacity="0.9"/>
  <circle cx="483" cy="392" r="5" fill="#4a3018" opacity="0.9"/>
  <rect x="454" y="376" width="52" height="18" rx="2" fill="#0a0a00" stroke="#f5a623" stroke-width="1"/>
  <text x="480" y="388" font-size="8" text-anchor="middle" fill="#f5a623">B Voidstone</text>

  <!-- Harvester 2 -->
  <rect x="460" y="408" width="40" height="30" rx="2" fill="#2a3848" stroke="#4a6880" stroke-width="1.5"/>
  <rect x="463" y="438" width="8" height="5" fill="#1a2030"/>
  <rect x="475" y="438" width="8" height="5" fill="#1a2030"/>
  <circle cx="480" cy="423" r="3.5" fill="#f5a623" opacity="0.7"/>
  <rect x="460" y="402" width="40" height="5" rx="1" fill="#0a1020"/>
  <rect x="460" y="402" width="24" height="5" rx="1" fill="#f5a623" opacity="0.7"/>
  <text x="480" y="406" font-size="5" text-anchor="middle" fill="#f5a623">60%</text>

  <!-- Ore Deposit 3 (Grade A+ — large motherlode) -->
  <ellipse cx="740" cy="350" rx="38" ry="18" fill="#2a1508" stroke="#8a5020" stroke-width="1.5" opacity="0.9"/>
  <circle cx="725" cy="343" r="9" fill="#5a3010" opacity="0.9"/>
  <circle cx="742" cy="337" r="8" fill="#7a4020" opacity="0.9"/>
  <circle cx="758" cy="347" r="7" fill="#5a3010" opacity="0.9"/>
  <circle cx="740" cy="358" r="6" fill="#4a2808" opacity="0.9"/>
  <rect x="708" y="316" width="64" height="20" rx="2" fill="#0d0800" stroke="#ffd700" stroke-width="2" filter="url(#glowGold)"/>
  <text x="740" y="326" font-size="8" text-anchor="middle" fill="#ffd700">A+ MOTHERLODE</text>
  <text x="740" y="335" font-size="7" text-anchor="middle" fill="#c0a030">Krysite · 24,800u</text>

  <!-- Harvester 3 on motherlode -->
  <rect x="720" y="360" width="44" height="34" rx="2" fill="#2a3848" stroke="#ffd700" stroke-width="1.5"/>
  <rect x="725" y="355" width="34" height="9" rx="1" fill="#3a4858"/>
  <rect x="730" y="392" width="8" height="6" fill="#1a2030"/>
  <rect x="744" y="392" width="8" height="6" fill="#1a2030"/>
  <circle cx="742" cy="377" r="4" fill="#ffd700" opacity="0.9"/>
  <rect x="720" y="349" width="44" height="5" rx="1" fill="#0a1020"/>
  <rect x="720" y="349" width="44" height="5" rx="1" fill="#ffd700" opacity="0.7"/>
  <text x="742" y="353" font-size="5" text-anchor="middle" fill="#ffd700">FULL</text>

  <!-- Storage silo (center) -->
  <rect x="360" y="380" width="70" height="55" rx="2" fill="#1e2e1a" stroke="#4caf7d" stroke-width="2"/>
  <rect x="365" y="374" width="60" height="10" fill="#253520"/>
  <rect x="372" y="432" width="12" height="6" fill="#1a2018"/>
  <rect x="390" y="432" width="12" height="6" fill="#1a2018"/>
  <text x="395" y="400" font-size="8" text-anchor="middle" fill="#4caf7d">STORAGE</text>
  <!-- Storage fill -->
  <rect x="368" y="408" width="58" height="8" rx="1" fill="#0d1808"/>
  <rect x="368" y="408" width="45" height="8" rx="1" fill="#4caf7d" opacity="0.7"/>
  <text x="397" y="416" font-size="6" text-anchor="middle" fill="#4caf7d">78%</text>

  <!-- Player character -->
  <circle cx="310" cy="420" r="6" fill="#e8d0a0"/>
  <rect x="305" y="422" width="10" height="14" rx="1" fill="#2a4070"/>
  <line x1="305" y1="425" x2="299" y2="433" stroke="#2a4070" stroke-width="2"/>
  <line x1="315" y1="425" x2="321" y2="433" stroke="#2a4070" stroke-width="2"/>
  <line x1="307" y1="436" x2="305" y2="448" stroke="#2a4070" stroke-width="2"/>
  <line x1="313" y1="436" x2="315" y2="448" stroke="#2a4070" stroke-width="2"/>

  <!-- ═══ 6 CARGO DRONES IN FLIGHT ═══ -->
  <!-- Drone 1: Harvester 1 → Storage -->
  <rect x="228" y="382" width="14" height="8" rx="1" fill="#3a5060" stroke="#5a7080" stroke-width="0.5"/>
  <rect x="230" y="376" width="10" height="5" rx="1" fill="#4a6070"/>
  <circle cx="232" cy="392" r="2" fill="#f5a623" opacity="0.6"/>
  <circle cx="239" cy="392" r="2" fill="#f5a623" opacity="0.6"/>
  <line x1="202" y1="386" x2="228" y2="386" stroke="#4a6070" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Drone 2: Harvester 1 → Storage (different y) -->
  <rect x="258" y="372" width="14" height="8" rx="1" fill="#3a5060" stroke="#5a7080" stroke-width="0.5"/>
  <rect x="260" y="366" width="10" height="5" rx="1" fill="#4a6070"/>

  <!-- Drone 3: Storage → Harvester 2 (returning empty) -->
  <rect x="418" y="398" width="14" height="8" rx="1" fill="#2a3848" stroke="#4a5060" stroke-width="0.5"/>
  <rect x="420" y="392" width="10" height="5" rx="1" fill="#3a4858"/>
  <line x1="432" y1="402" x2="458" y2="412" stroke="#4a5060" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Drone 4: Harvester 3 → Storage -->
  <rect x="650" y="368" width="14" height="8" rx="1" fill="#3a5060" stroke="#5a7080" stroke-width="0.5"/>
  <rect x="652" y="362" width="10" height="5" rx="1" fill="#4a6070"/>
  <circle cx="654" cy="378" r="2" fill="#f5a623" opacity="0.6"/>
  <circle cx="661" cy="378" r="2" fill="#f5a623" opacity="0.6"/>
  <line x1="654" y1="372" x2="630" y2="385" stroke="#4a6070" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Drone 5: in mid-air above center -->
  <rect x="490" y="338" width="14" height="8" rx="1" fill="#3a5060" stroke="#5a7080" stroke-width="0.5"/>
  <rect x="492" y="332" width="10" height="5" rx="1" fill="#4a6070"/>
  <circle cx="494" cy="348" r="2" fill="#f5a623" opacity="0.6"/>

  <!-- Drone 6: high flight path -->
  <rect x="580" y="310" width="14" height="8" rx="1" fill="#3a5060" stroke="#5a7080" stroke-width="0.5"/>
  <rect x="582" y="304" width="10" height="5" rx="1" fill="#4a6070"/>

  <!-- Deposit quality indicators -->
  <text x="180" y="320" font-size="8" text-anchor="middle" fill="#ffd700">+12.4/s</text>
  <text x="480" y="366" font-size="8" text-anchor="middle" fill="#f5a623">+6.2/s</text>
  <text x="742" y="308" font-size="8" text-anchor="middle" fill="#ffd700">+18.8/s</text>

  <!-- HUD top bar -->
  <rect x="0" y="0" width="960" height="32" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="32" x2="960" y2="32" stroke="#f5a623" stroke-width="0.8" opacity="0.6"/>
  <text x="14" y="11" font-size="9" fill="#f5a623" opacity="0.7" letter-spacing="1">CREDITS</text>
  <text x="14" y="26" font-size="14" font-weight="bold" fill="#ffd700">◈ 48,320</text>
  <line x1="105" y1="5" x2="105" y2="28" stroke="#2a3a50" stroke-width="0.5"/>
  <text x="118" y="11" font-size="9" fill="#9090f0" letter-spacing="1">RESEARCH</text>
  <text x="118" y="26" font-size="14" font-weight="bold" fill="#a0a8f8">⬡ 2,840</text>
  <line x1="210" y1="5" x2="210" y2="28" stroke="#2a3a50" stroke-width="0.5"/>
  <text x="480" y="20" font-size="12" text-anchor="middle" fill="#e8d0a0">A1 — Voidstone Prime</text>
  <text x="946" y="20" font-size="14" text-anchor="end" fill="#e8d0a0">02:14:37</text>

  <!-- Bottom hotbar -->
  <rect x="0" y="506" width="960" height="34" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="506" x2="960" y2="506" stroke="#f5a623" stroke-width="0.8" opacity="0.6"/>
  <text x="480" y="527" font-size="10" text-anchor="middle" fill="#8a9ab0" letter-spacing="2">[Q] SURVEY  [B] BUILD  [D] DRONES  [I] INVENTORY  [P] PRODUCTION  [M] MAP  [R] TECH  [L] LOG</text>

  <!-- Minimap -->
  <rect x="850" y="38" width="100" height="90" rx="2" fill="#05080f" stroke="#f5a623" stroke-width="1" opacity="0.9"/>
  <text x="900" y="50" font-size="7" text-anchor="middle" fill="#f5a623">MINIMAP</text>
  <rect x="855" y="54" width="90" height="70" fill="#0a0f08" rx="1"/>
  <circle cx="883" cy="82" r="2.5" fill="#ffd700"/>
  <circle cx="870" cy="72" r="1.5" fill="#4caf7d"/>
  <circle cx="900" cy="78" r="1.5" fill="#4caf7d"/>
  <circle cx="912" cy="68" r="1.5" fill="#ffd700"/>
  <circle cx="877" cy="90" r="1" fill="#4a9fd4"/>
  <circle cx="893" cy="85" r="1" fill="#4a9fd4"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141a0e"/>
      <stop offset="100%" stop-color="#0c1008"/>
    </linearGradient>
    <linearGradient id="hudBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1e38" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#080e20" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glowBlue">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#4a9fd4" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGold">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#4caf7d" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- World -->
  <rect width="960" height="270" fill="url(#skyGrad)"/>
  <g opacity="0.5">
    <circle cx="45" cy="23" r="0.8" fill="#fff"/><circle cx="234" cy="14" r="1.0" fill="#fff"/>
    <circle cx="698" cy="18" r="1.0" fill="#e0ffff"/><circle cx="812" cy="72" r="0.7" fill="#fff"/>
    <circle cx="445" cy="31" r="0.8" fill="#fff"/>
  </g>
  <rect x="0" y="270" width="960" height="270" fill="url(#groundGrad)"/>
  <g stroke="#1a2010" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="310" x2="960" y2="310"/><line x1="0" y1="350" x2="960" y2="350"/>
    <line x1="0" y1="390" x2="960" y2="390"/><line x1="0" y1="430" x2="960" y2="430"/>
    <line x1="80" y1="270" x2="80" y2="540"/><line x1="160" y1="270" x2="160" y2="540"/>
    <line x1="240" y1="270" x2="240" y2="540"/><line x1="320" y1="270" x2="320" y2="540"/>
    <line x1="400" y1="270" x2="400" y2="540"/><line x1="480" y1="270" x2="480" y2="540"/>
    <line x1="560" y1="270" x2="560" y2="540"/><line x1="640" y1="270" x2="640" y2="540"/>
    <line x1="720" y1="270" x2="720" y2="540"/>
  </g>
  <line x1="0" y1="270" x2="960" y2="270" stroke="#2a3820" stroke-width="1"/>

  <!-- Ore deposit (source) -->
  <ellipse cx="200" cy="400" rx="32" ry="14" fill="#2a1a08" stroke="#6a4020" stroke-width="1.5" opacity="0.9"/>
  <circle cx="188" cy="393" r="8" fill="#4a2a10" opacity="0.9"/>
  <circle cx="205" cy="387" r="7" fill="#6a4020" opacity="0.9"/>
  <circle cx="218" cy="395" r="6" fill="#4a2a10" opacity="0.9"/>
  <!-- Harvester on deposit -->
  <rect x="175" y="368" width="54" height="38" rx="3" fill="#2a3848" stroke="#4caf7d" stroke-width="1.5"/>
  <rect x="179" y="363" width="46" height="8" rx="1" fill="#3a4858"/>
  <line x1="202" y1="380" x2="202" y2="398" stroke="#6a8a90" stroke-width="2.5"/>
  <circle cx="202" cy="398" r="4" fill="#8aaa90" stroke="#4caf7d" stroke-width="1"/>
  <circle cx="202" cy="375" r="4" fill="#4caf7d" opacity="0.85"/>
  <text x="202" y="403" font-size="6" text-anchor="middle" fill="#4caf7d">HARVESTING</text>

  <!-- Storage silo (destination) -->
  <rect x="700" y="355" width="70" height="70" rx="3" fill="#1a2030" stroke="#3a5070" stroke-width="1.5"/>
  <rect x="706" y="350" width="58" height="10" rx="1" fill="#252e3a"/>
  <rect x="710" y="365" width="50" height="45" rx="1" fill="#101828"/>
  <!-- Silo fill indicator -->
  <rect x="714" y="368" width="42" height="36" rx="1" fill="#0a1018"/>
  <rect x="714" y="385" width="42" height="19" rx="1" fill="#4a9fd4" opacity="0.5"/>
  <text x="735" y="378" font-size="7" text-anchor="middle" fill="#4a9fd4">STORAGE A</text>
  <text x="735" y="414" font-size="7" text-anchor="middle" fill="#4a9fd4">52%</text>

  <!-- Drone flight path (dashed arc) -->
  <path d="M 230 385 Q 460 230 700 375" fill="none" stroke="#4a9fd4" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.55"/>
  <!-- Direction arrow on path -->
  <polygon points="530,268 520,275 525,280" fill="#4a9fd4" opacity="0.7"/>

  <!-- ═══ CARGO DRONE BODY ═══ (mid-flight, roughly center) -->
  <!-- Drone at ~490, 310 -->
  <g filter="url(#glowBlue)">
    <!-- Main body -->
    <rect x="476" y="302" width="28" height="16" rx="3" fill="#1a3050" stroke="#4a9fd4" stroke-width="1.5"/>
    <!-- Arms -->
    <line x1="476" y1="306" x2="462" y2="298" stroke="#2a4060" stroke-width="2"/>
    <line x1="504" y1="306" x2="518" y2="298" stroke="#2a4060" stroke-width="2"/>
    <line x1="476" y1="314" x2="462" y2="322" stroke="#2a4060" stroke-width="2"/>
    <line x1="504" y1="314" x2="518" y2="322" stroke="#2a4060" stroke-width="2"/>
    <!-- Rotors (circles at arm tips) -->
    <circle cx="460" cy="297" r="5" fill="none" stroke="#4a9fd4" stroke-width="1.5" opacity="0.8"/>
    <circle cx="520" cy="297" r="5" fill="none" stroke="#4a9fd4" stroke-width="1.5" opacity="0.8"/>
    <circle cx="460" cy="323" r="5" fill="none" stroke="#4a9fd4" stroke-width="1.5" opacity="0.8"/>
    <circle cx="520" cy="323" r="5" fill="none" stroke="#4a9fd4" stroke-width="1.5" opacity="0.8"/>
    <!-- Cargo pod below -->
    <rect x="482" y="318" width="16" height="10" rx="2" fill="#2a4a20" stroke="#4caf7d" stroke-width="1"/>
    <!-- Status light -->
    <circle cx="490" cy="306" r="3" fill="#4a9fd4" opacity="0.9"/>
  </g>

  <!-- Rotor spin trails -->
  <circle cx="460" cy="297" r="7" fill="none" stroke="#4a9fd4" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.4"/>
  <circle cx="520" cy="297" r="7" fill="none" stroke="#4a9fd4" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.4"/>
  <circle cx="460" cy="323" r="7" fill="none" stroke="#4a9fd4" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.4"/>
  <circle cx="520" cy="323" r="7" fill="none" stroke="#4a9fd4" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.4"/>

  <!-- Task label floating above drone -->
  <rect x="440" y="275" width="100" height="22" rx="2" fill="#05080f" stroke="#4a9fd4" stroke-width="1"/>
  <text x="490" y="285" font-size="8" text-anchor="middle" fill="#4a9fd4">CARGO-01</text>
  <text x="490" y="295" font-size="7" text-anchor="middle" fill="#8a9ab0">HAUL → Storage A</text>

  <!-- Carry indicator (ore icon below drone) -->
  <text x="490" y="345" font-size="9" text-anchor="middle" fill="#4caf7d" filter="url(#glowGreen)">+24 Krysite</text>

  <!-- Player standing near harvester, watching -->
  <circle cx="155" cy="390" r="6" fill="#e8d0a0"/>
  <rect x="150" y="392" width="10" height="14" rx="1" fill="#2a4070"/>

  <!-- Drone status panel (top-left) -->
  <rect x="8" y="40" width="240" height="120" rx="3" fill="#05080f" stroke="#4a9fd4" stroke-width="1.5" opacity="0.95"/>
  <rect x="8" y="40" width="240" height="28" rx="3" fill="#050e20"/>
  <line x1="8" y1="68" x2="248" y2="68" stroke="#4a9fd4" stroke-width="0.8" opacity="0.6"/>
  <text x="128" y="58" font-size="10" text-anchor="middle" fill="#4a9fd4">DRONE STATUS</text>
  <g font-size="9">
    <text x="20" y="84" fill="#4a9fd4" font-weight="bold">CARGO-01</text>
    <text x="244" y="84" text-anchor="end" fill="#4caf7d">HAULING</text>
    <text x="20" y="98" fill="#6a7a90">Task:</text>
    <text x="244" y="98" text-anchor="end" fill="#e8d0a0">Harvester 1 → Storage A</text>
    <text x="20" y="112" fill="#6a7a90">Carry:</text>
    <text x="244" y="112" text-anchor="end" fill="#e8d0a0">24 / 30 Krysite</text>
    <text x="20" y="126" fill="#6a7a90">Battery:</text>
    <rect x="70" y="119" width="100" height="7" rx="2" fill="#0a1020"/>
    <rect x="70" y="119" width="82" height="7" rx="2" fill="#4caf7d" opacity="0.8"/>
    <text x="244" y="126" text-anchor="end" fill="#4caf7d">82%</text>
    <text x="20" y="140" fill="#6a7a90">Trips today:</text>
    <text x="244" y="140" text-anchor="end" fill="#e8d0a0">14</text>
    <text x="20" y="154" fill="#6a7a90">ETA to storage:</text>
    <text x="244" y="154" text-anchor="end" fill="#f5a623">~8s</text>
  </g>

  <!-- Tutorial hint (first drone placed) -->
  <rect x="580" y="420" width="360" height="60" rx="2" fill="#0a1020" stroke="#f5a623" stroke-width="1" opacity="0.9"/>
  <text x="590" y="438" font-size="9" fill="#f5a623">CARGO DRONE ONLINE!</text>
  <text x="590" y="452" font-size="9" fill="#e8d0a0">It will auto-haul ore from Harvester 1</text>
  <text x="590" y="466" font-size="9" fill="#e8d0a0">to Storage A. No more manual carrying!</text>

  <!-- HUD top bar -->
  <rect x="0" y="0" width="960" height="32" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="32" x2="960" y2="32" stroke="#f5a623" stroke-width="0.8" opacity="0.6"/>
  <text x="14" y="11" font-size="9" fill="#f5a623" opacity="0.7">CREDITS</text>
  <text x="14" y="26" font-size="14" font-weight="bold" fill="#ffd700">◈ 3,820</text>
  <line x1="100" y1="5" x2="100" y2="28" stroke="#2a3a50" stroke-width="0.5"/>
  <text x="113" y="20" font-size="10" fill="#8a9ab0">Krysite: 86</text>
  <text x="480" y="20" font-size="12" text-anchor="middle" fill="#e8d0a0">A1 — Voidstone Prime</text>
  <text x="946" y="20" font-size="14" text-anchor="end" fill="#e8d0a0">00:34:22</text>

  <!-- Bottom bar -->
  <rect x="0" y="506" width="960" height="34" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="506" x2="960" y2="506" stroke="#f5a623" stroke-width="0.8" opacity="0.6"/>
  <text x="480" y="527" font-size="10" text-anchor="middle" fill="#8a9ab0">[D] DRONE BAY  ·  [E] INTERACT  ·  CARGO-01: HAULING  ·  1 DRONE ACTIVE</text>
</svg>

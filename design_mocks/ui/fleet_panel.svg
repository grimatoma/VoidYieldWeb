  <rect x="820" y="450" width="100" height="28" rx="2" fill="#1a2848" stroke="#f5a623" stroke-width="1.5"/>
  <text x="870" y="468" font-size="11" text-anchor="middle" fill="#ffd700">CONFIRM</text>
  <text x="50" y="498" font-size="9" fill="#6a7a90">Est. profit: ◈ 1,200 / trip  ·  Transit: 12m each way  ·  Net/hr: ◈ 3,000</text>

  <!-- Corner decorations -->

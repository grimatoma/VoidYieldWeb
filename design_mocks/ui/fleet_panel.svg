    <text x="144" y="106" fill="#8a9ab0">EN ROUTE</text>
    <text x="144" y="121" font-size="14" font-weight="bold" fill="#4a9fd4">2</text>
    <line x1="220" y1="97" x2="220" y2="125" stroke="#2a3a50" stroke-width="0.5"/>
    <text x="234" y="106" fill="#8a9ab0">DOCKED</text>
    <text x="234" y="121" font-size="14" font-weight="bold" fill="#4caf7d">1</text>
    <line x1="310" y1="97" x2="310" y2="125" stroke="#2a3a50" stroke-width="0.5"/>
    <text x="324" y="106" fill="#8a9ab0">LOADING</text>
    <text x="324" y="121" font-size="14" font-weight="bold" fill="#f5a623">1</text>
    <line x1="400" y1="97" x2="400" y2="125" stroke="#2a3a50" stroke-width="0.5"/>
    <text x="414" y="106" fill="#8a9ab0">CARGO HAULED TODAY</text>
    <text x="414" y="121" font-size="14" font-weight="bold" fill="#e8d0a0">4,840 units</text>
    <line x1="620" y1="97" x2="620" y2="125" stroke="#2a3a50" stroke-width="0.5"/>
    <text x="634" y="106" fill="#8a9ab0">CREDITS EARNED</text>
    <text x="634" y="121" font-size="14" font-weight="bold" fill="#ffd700">◈ 24,200</text>

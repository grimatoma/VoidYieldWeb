    <text x="222" y="462" fill="#f5a623">→</text>
    <text x="238" y="462" fill="#8a9ab0">TO:</text>
    <rect x="262" y="452" width="120" height="20" rx="2" fill="#0d1428" stroke="#3a4a60" stroke-width="1"/>
    <text x="322" y="465" text-anchor="middle" fill="#e8d0a0">Planet B  ▾</text>
    <text x="400" y="462" fill="#8a9ab0">CARGO:</text>
    <rect x="448" y="452" width="160" height="20" rx="2" fill="#0d1428" stroke="#3a4a60" stroke-width="1"/>

  <text x="926" y="68" font-size="11" text-anchor="end" fill="#8a9ab0">[ T ] CLOSE</text>

  <!-- Summary bar -->
  <rect x="30" y="92" width="900" height="38" rx="2" fill="#0a1428" stroke="#2a3a50" stroke-width="0.5"/>

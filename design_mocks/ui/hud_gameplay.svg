<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141a0e"/>
      <stop offset="100%" stop-color="#0c1008"/>
    </linearGradient>
    <linearGradient id="hudBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1e38" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#080e20" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#f5a623" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#4caf7d" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="960" height="270" fill="url(#skyGrad)"/>
  <!-- Stars -->
  <g opacity="0.7">
    <circle cx="45" cy="23" r="0.8" fill="#ffffff"/>
    <circle cx="120" cy="67" r="0.5" fill="#e0e0ff"/>
    <circle cx="234" cy="14" r="1.0" fill="#ffffff"/>
    <circle cx="312" cy="89" r="0.6" fill="#ffe0a0"/>
    <circle cx="445" cy="31" r="0.8" fill="#ffffff"/>
    <circle cx="567" cy="55" r="0.5" fill="#ffffff"/>
    <circle cx="698" cy="18" r="1.0" fill="#e0ffff"/>
    <circle cx="812" cy="72" r="0.7" fill="#ffffff"/>
    <circle cx="920" cy="40" r="0.9" fill="#ffffff"/>
    <circle cx="78" cy="145" r="0.6" fill="#ffffff"/>
    <circle cx="189" cy="178" r="0.8" fill="#ffe0a0"/>
    <circle cx="356" cy="112" r="0.5" fill="#ffffff"/>
    <circle cx="634" cy="98" r="0.9" fill="#e0e0ff"/>
    <circle cx="745" cy="167" r="0.6" fill="#ffffff"/>
    <circle cx="867" cy="123" r="0.5" fill="#ffffff"/>
  </g>

  <!-- Ground plane -->

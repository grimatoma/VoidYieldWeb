<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="alienSky" cx="50%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#0a1428"/>
      <stop offset="60%" stop-color="#050818"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="crystalGround" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e1a28"/>
      <stop offset="100%" stop-color="#080e18"/>
    </linearGradient>
    <linearGradient id="hudBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1e38" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#080e20" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="crystalGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#3a7aaa" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowRed">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#e05555" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPurple">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#9060e0" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="atmosphereHaze" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#1a3a5a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1a3a5a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="xeniteGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9060e0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#9060e0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Alien sky -->
  <rect width="960" height="285" fill="url(#alienSky)"/>
  <ellipse cx="480" cy="100" rx="600" ry="200" fill="url(#atmosphereHaze)"/>
  <!-- Alien stars (blue-purple tinted) -->
  <g opacity="0.7">
    <circle cx="45" cy="23" r="0.8" fill="#a0c0ff"/><circle cx="120" cy="67" r="0.5" fill="#c0a0ff"/>
    <circle cx="234" cy="14" r="1" fill="#fff"/><circle cx="312" cy="89" r="0.6" fill="#a0e0ff"/>
    <circle cx="445" cy="31" r="0.8" fill="#fff"/><circle cx="567" cy="55" r="0.5" fill="#c0c0ff"/>
    <circle cx="698" cy="18" r="1" fill="#a0c0ff"/><circle cx="812" cy="72" r="0.7" fill="#fff"/>
    <circle cx="920" cy="40" r="0.9" fill="#c0a0ff"/><circle cx="78" cy="145" r="0.6" fill="#fff"/>
    <circle cx="189" cy="178" r="0.8" fill="#a0c0ff"/><circle cx="356" cy="112" r="0.5" fill="#fff"/>
    <circle cx="634" cy="98" r="0.9" fill="#c0c0ff"/><circle cx="745" cy="167" r="0.6" fill="#fff"/>
  </g>
  <!-- Home star (distant) -->
  <circle cx="120" cy="60" r="3" fill="#ffe0a0" opacity="0.5"/>
  <text x="130" y="64" font-size="6" fill="#c0a060" opacity="0.5">A1 (home)</text>
  <!-- Planet A visible as a disc -->
  <circle cx="840" cy="90" r="18" fill="#1a2a40" stroke="#2a3a55" stroke-width="0.5" opacity="0.7"/>
  <ellipse cx="840" cy="90" rx="28" ry="7" fill="none" stroke="#4a6090" stroke-width="0.7" opacity="0.4" transform="rotate(-15,840,90)"/>

  <!-- Crystal ground -->
  <rect x="0" y="285" width="960" height="255" fill="url(#crystalGround)"/>

  <!-- Crystal terrain formations -->
  <g filter="url(#crystalGlow)">
    <polygon points="60,285 74,238 88,285" fill="#1a3a5a" stroke="#3a7aaa" stroke-width="1"/>
    <polygon points="78,285 94,222 110,285" fill="#1e3e5e" stroke="#4a8aba" stroke-width="1"/>
    <polygon points="96,285 112,248 128,285" fill="#1a3a5a" stroke="#3a7aaa" stroke-width="1"/>
    <polygon points="760,285 778,218 796,285" fill="#1a3a5a" stroke="#3a7aaa" stroke-width="1"/>
    <polygon points="782,285 802,205 822,285" fill="#1e3e5e" stroke="#4a8aba" stroke-width="1"/>
    <polygon points="808,285 826,232 844,285" fill="#1a3a5a" stroke="#3a7aaa" stroke-width="1"/>
    <!-- Mid-ground crystals -->
    <polygon points="190,285 200,262 210,285" fill="#12283e" stroke="#2a5a7a" stroke-width="0.5" opacity="0.7"/>
    <polygon points="620,285 634,250 648,285" fill="#12283e" stroke="#2a5a7a" stroke-width="0.5" opacity="0.7"/>
    <polygon points="680,285 698,238 716,285" fill="#12283e" stroke="#2a5a7a" stroke-width="0.5" opacity="0.7"/>
  </g>

  <!-- Ground cracks -->
  <g stroke="#2a4a6a" stroke-width="0.5" opacity="0.5">
    <line x1="150" y1="295" x2="185" y2="318"/>
    <line x1="300" y1="305" x2="340" y2="322"/>
    <line x1="450" y1="298" x2="490" y2="314"/>
    <line x1="580" y1="310" x2="618" y2="296"/>
  </g>

  <!-- Xenite ore deposit (large, glowing purple) -->
  <circle cx="380" cy="370" r="55" fill="url(#xeniteGlow)" opacity="0.8"/>
  <ellipse cx="380" cy="378" rx="42" ry="19" fill="#1a1a38" stroke="#9060e0" stroke-width="2" filter="url(#glowPurple)" opacity="0.95"/>
  <circle cx="364" cy="370" r="11" fill="#2a2060" opacity="0.95"/>
  <circle cx="383" cy="361" r="10" fill="#3a3080" opacity="0.95"/>
  <circle cx="400" cy="372" r="9" fill="#2a2060" opacity="0.95"/>
  <rect x="350" y="340" width="60" height="18" rx="2" fill="#0a0820" stroke="#9060e0" stroke-width="1.5"/>
  <text x="380" y="350" font-size="7" text-anchor="middle" fill="#9060e0" font-weight="bold">XENITE ORE</text>
  <text x="380" y="358" font-size="6" text-anchor="middle" fill="#7040b0">~240 units · B grade</text>

  <!-- Voidfrost gas vent -->
  <ellipse cx="600" cy="410" rx="30" ry="13" fill="#1a1a38" stroke="#5050d0" stroke-width="1" opacity="0.8"/>
  <rect x="576" y="390" width="48" height="16" rx="2" fill="#0a0820" stroke="#6060d0" stroke-width="1"/>
  <text x="600" y="400" font-size="7" text-anchor="middle" fill="#6060d0">VOIDFROST GAS</text>
  <!-- Gas wisps -->
  <ellipse cx="596" cy="390" rx="8" ry="14" fill="#4040a0" opacity="0.15"/>
  <ellipse cx="607" cy="387" rx="6" ry="10" fill="#4040a0" opacity="0.12"/>

  <!-- Crystal shard deposit -->
  <polygon points="520,355 527,330 534,355" fill="#1a3060" stroke="#4a7aff" stroke-width="1.5"/>
  <polygon points="530,357 538,328 546,357" fill="#1a3060" stroke="#4a7aff" stroke-width="1.5"/>
  <text x="533" y="322" font-size="6" text-anchor="middle" fill="#4a7aff">CRYSTAL</text>

  <!-- Portable harvester (player has placed) -->
  <rect x="330" y="335" width="44" height="34" rx="2" fill="#2a3848" stroke="#4caf7d" stroke-width="1.5"/>
  <line x1="352" y1="350" x2="352" y2="368" stroke="#6a8a90" stroke-width="2.5"/>
  <circle cx="352" cy="368" r="4" fill="#8aaa90" stroke="#4caf7d" stroke-width="1"/>
  <circle cx="352" cy="342" r="4" fill="#4caf7d" opacity="0.85"/>
  <text x="352" y="374" font-size="6" text-anchor="middle" fill="#4caf7d">MINING</text>
  <!-- Hopper bar -->
  <rect x="310" y="316" width="84" height="16" rx="2" fill="#05080f" stroke="#4caf7d" stroke-width="1"/>
  <rect x="314" y="320" width="76" height="6" rx="2" fill="#0a1020"/>
  <rect x="314" y="320" width="34" height="6" rx="2" fill="#4caf7d" opacity="0.8"/>
  <text x="352" y="326" font-size="6" text-anchor="middle" fill="#4caf7d">44%</text>

  <!-- Player (in suit) -->
  <circle cx="268" cy="368" r="6" fill="#e8d0a0"/>
  <rect x="263" y="370" width="10" height="14" rx="1" fill="#1a3040"/>
  <!-- Helmet tint (alien atmosphere) -->
  <circle cx="268" cy="368" r="6" fill="#4a8aaa" opacity="0.25"/>

  <!-- Landing pod -->
  <ellipse cx="200" cy="360" rx="30" ry="14" fill="#1a2030" stroke="#4a6080" stroke-width="1.5"/>
  <rect x="175" y="340" width="50" height="24" rx="3" fill="#1a2838" stroke="#4a7090" stroke-width="1.5"/>
  <rect x="180" y="336" width="40" height="8" rx="2" fill="#253040"/>
  <line x1="176" y1="360" x2="162" y2="374" stroke="#3a5070" stroke-width="2"/>
  <line x1="224" y1="360" x2="238" y2="374" stroke="#3a5070" stroke-width="2"/>
  <circle cx="200" cy="348" r="8" fill="#0a1828" stroke="#4a8aaa" stroke-width="1"/>
  <text x="200" y="328" font-size="6" text-anchor="middle" fill="#4a7090">SURVIVAL CRAFT</text>

  <!-- Survival countdown (atmospheric haze, bottom-right of sky) -->
  <rect x="620" y="40" width="332" height="200" rx="3" fill="#050408" stroke="#e05555" stroke-width="2" filter="url(#glowRed)" opacity="0.96"/>
  <rect x="620" y="40" width="332" height="36" rx="3" fill="#200808"/>
  <line x1="620" y1="76" x2="952" y2="76" stroke="#e05555" stroke-width="1.5" opacity="0.8"/>
  <text x="786" y="62" font-size="12" font-weight="bold" text-anchor="middle" fill="#e05555">⚠  SURVIVAL</text>

  <g font-size="9">
    <text x="634" y="92" fill="#e05555" font-weight="bold">RETURN FUEL:</text>
    <rect x="634" y="96" width="304" height="14" rx="2" fill="#1a0808"/>
    <rect x="634" y="96" width="90" height="14" rx="2" fill="#e05555" opacity="0.6"/>
    <text x="786" y="108" font-size="8" text-anchor="middle" fill="#fff">28%  (need 100%)</text>

    <text x="634" y="125" fill="#f5a623">Xenite collected:</text>
    <text x="944" y="125" text-anchor="end" fill="#f5a623">34 / 120 needed</text>
    <rect x="634" y="128" width="304" height="8" rx="2" fill="#1a1000"/>
    <rect x="634" y="128" width="86" height="8" rx="2" fill="#f5a623" opacity="0.6"/>

    <text x="634" y="152" fill="#8a9ab0">Suit power:</text>
    <rect x="720" y="145" width="220" height="7" rx="2" fill="#0a1428"/>
    <rect x="720" y="145" width="132" height="7" rx="2" fill="#4caf7d" opacity="0.8"/>
    <text x="944" y="152" text-anchor="end" fill="#4caf7d">60%  (2h 24m)</text>

    <text x="634" y="168" fill="#4a9fd4">Surface temp:</text>
    <text x="944" y="168" text-anchor="end" fill="#4a9fd4">−140°C  ⚠ COLD</text>

    <text x="634" y="184" fill="#8a9ab0">Supplies:</text>
    <text x="944" y="184" text-anchor="end" fill="#e8d0a0">Food 8  ·  Water 5  ·  FC 3</text>

    <text x="634" y="200" fill="#f5a623">Craft fuel at:</text>
    <text x="944" y="200" text-anchor="end" fill="#f5a623">Portable Crafter [ C ]</text>
														 <text x="634" y="214" fill="#3a4a60" font-size="8">Need 86 more Xenite to fill tank</text>
  </g>

  <!-- Warning banner -->
  <rect x="0" y="464" width="960" height="36" fill="#1a0808" stroke="#e05555" stroke-width="1" opacity="0.9"/>
  <text x="480" y="486" font-size="12" font-weight="bold" text-anchor="middle" fill="#e05555" filter="url(#glowRed)">⚠  MINE 86 MORE XENITE  ·  CRAFT RETURN FUEL  ·  SUIT POWER: 60%  (2h 24m)  ⚠</text>

  <!-- HUD top bar -->
  <rect x="0" y="0" width="960" height="32" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="32" x2="960" y2="32" stroke="#4a9fd4" stroke-width="1" opacity="0.6"/>
  <text x="14" y="20" font-size="14" font-weight="bold" fill="#4a9fd4">◈ 42,600</text>
  <text x="480" y="20" font-size="12" text-anchor="middle" fill="#4a9fd4">PLANET B — Crystalis Surface</text>
  <text x="946" y="20" font-size="14" text-anchor="end" fill="#e8d0a0">03:58:44</text>

  <!-- Bottom bar -->
  <rect x="0" y="506" width="960" height="34" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="506" x2="960" y2="506" stroke="#4a9fd4" stroke-width="0.8" opacity="0.6"/>
  <text x="480" y="527" font-size="10" text-anchor="middle" fill="#4a9fd4">[Q] SURVEY  ·  [C] CRAFT  ·  [E] INTERACT  ·  XENITE: 34/120  ·  RETURN FUEL: 28%</text>
</svg>

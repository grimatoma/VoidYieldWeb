<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141a0e"/>
      <stop offset="100%" stop-color="#0c1008"/>
    </linearGradient>
    <filter id="glowAmber">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#f5a623" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGold">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tooltipShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#f5a623" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a6090"/>
      <stop offset="100%" stop-color="#4a9fd4"/>
    </linearGradient>
    <linearGradient id="barGradGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a4a10"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
  </defs>

  <!-- World background -->
  <rect width="960" height="270" fill="url(#skyGrad)"/>
  <g opacity="0.5">
    <circle cx="45" cy="23" r="0.8" fill="#fff"/>
    <circle cx="234" cy="14" r="1.0" fill="#fff"/>
    <circle cx="698" cy="18" r="1.0" fill="#e0ffff"/>
    <circle cx="812" cy="72" r="0.7" fill="#fff"/>
  </g>
  <rect x="0" y="270" width="960" height="270" fill="url(#groundGrad)"/>
  <g stroke="#1a2010" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="310" x2="960" y2="310"/>
    <line x1="0" y1="350" x2="960" y2="350"/>
    <line x1="80" y1="270" x2="80" y2="510"/>
    <line x1="240" y1="270" x2="240" y2="510"/>
    <line x1="400" y1="270" x2="400" y2="510"/>
    <line x1="560" y1="270" x2="560" y2="510"/>
    <line x1="720" y1="270" x2="720" y2="510"/>
    <line x1="880" y1="270" x2="880" y2="510"/>
  </g>

  <!-- Deposit node in world — glowing, being inspected -->
  <circle cx="340" cy="360" r="22" fill="#1a0f08" stroke="#ffd700" stroke-width="2.5" filter="url(#glowGold)"/>
  <polygon points="340,348 352,355 352,369 340,376 328,369 328,355" fill="#2a1808" stroke="#ffd700" stroke-width="1"/>
  <text x="340" y="368" font-size="12" text-anchor="middle" fill="#ffd700">⬡</text>
  <!-- Cursor inspect indicator -->
  <circle cx="340" cy="360" r="35" fill="none" stroke="#ffd700" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="340" y="408" font-size="8" text-anchor="middle" fill="#ffd700" opacity="0.7">INSPECTING</text>

  <!-- HUD top bar -->
  <rect x="0" y="0" width="960" height="32" fill="#050d20" opacity="0.92"/>
  <line x1="0" y1="32" x2="960" y2="32" stroke="#f5a623" stroke-width="0.8" opacity="0.6"/>
  <text x="14" y="21" font-size="13" fill="#ffd700" letter-spacing="2">[E] INSPECT NODE</text>
  <text x="480" y="21" font-size="11" text-anchor="middle" fill="#8a9ab0">A1 — Voidstone Prime</text>

  <!-- ═══ QUALITY INSPECTOR POPUP ═══ -->
  <rect x="490" y="42" width="448" height="488" rx="4" fill="#07101e" stroke="#f5a623" stroke-width="2" filter="url(#tooltipShadow)"/>
  <rect x="490" y="42" width="448" height="50" rx="4" fill="#0d1e38"/>
  <rect x="490" y="79" width="448" height="13" fill="#0d1e38"/>
  <line x1="490" y1="92" x2="938" y2="92" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>

  <!-- Header: ore name + grade badge -->
  <text x="714" y="72" font-size="17" font-weight="bold" text-anchor="middle" fill="#ffd700" filter="url(#glowAmber)">Krysite Ore</text>
  <rect x="500" y="50" width="56" height="20" rx="2" fill="#103a10"/>
  <text x="528" y="64" font-size="11" text-anchor="middle" fill="#4caf7d" font-weight="bold">GRADE A</text>

  <!-- Star rating -->
  <text x="714" y="86" font-size="10" text-anchor="middle" fill="#ffd700" opacity="0.7">★ ★ ★ ★ ☆</text>

  <!-- Deposit info -->
  <g font-size="10">
    <text x="508" y="110" fill="#8a9ab0">Deposit:</text>
    <text x="930" y="110" text-anchor="end" fill="#e8d0a0">Krysite Vein #12 — Sector NW-4</text>
    <text x="508" y="126" fill="#8a9ab0">Size:</text>
    <text x="930" y="126" text-anchor="end" fill="#e8d0a0">Large  ·  ~12,400 units remaining</text>
    <text x="508" y="142" fill="#8a9ab0">Concentration:</text>
    <rect x="600" y="133" width="200" height="8" rx="2" fill="#0a1428"/>
    <rect x="600" y="133" width="172" height="8" rx="2" fill="url(#barGradGold)" opacity="0.9"/>
    <text x="808" y="142" fill="#ffd700">86%</text>
    <text x="508" y="158" fill="#8a9ab0">Purity:</text>
    <text x="930" y="158" text-anchor="end" fill="#4caf7d">High</text>
  </g>

  <line x1="498" y1="165" x2="930" y2="165" stroke="#1a2a40" stroke-width="0.5"/>

  <!-- SWG-style attribute table -->
  <text x="508" y="182" font-size="10" fill="#f5a623" letter-spacing="2">RESOURCE ATTRIBUTES</text>
  <text x="930" y="182" font-size="10" text-anchor="end" fill="#8a9ab0">Max: 1000 each</text>
  <line x1="498" y1="186" x2="930" y2="186" stroke="#f5a623" stroke-width="0.5" opacity="0.3"/>

  <!-- Attribute rows: 10 attributes -->
  <g font-size="10">
    <!-- ER -->
    <text x="508" y="204" fill="#e8d0a0">ER  Energy Resistance</text>
    <rect x="660" y="196" width="220" height="8" rx="2" fill="#0a1428"/>
    <rect x="660" y="196" width="186" height="8" rx="2" fill="url(#barGrad)" opacity="0.9"/>
    <text x="888" y="204" fill="#4a9fd4" font-weight="bold">847</text>
    <text x="930" y="204" text-anchor="end" fill="#4caf7d" font-size="8">HIGH</text>

    <!-- CR -->
    <text x="508" y="222" fill="#e8d0a0">CR  Cold Resistance</text>
    <rect x="660" y="214" width="220" height="8" rx="2" fill="#0a1428"/>
    <rect x="660" y="214" width="134" height="8" rx="2" fill="url(#barGrad)" opacity="0.9"/>
    <text x="888" y="222" fill="#4a9fd4" font-weight="bold">612</text>
    <text x="930" y="222" text-anchor="end" fill="#f5a623" font-size="8">MED</text>

    <!-- CD -->
    <text x="508" y="240" fill="#e8d0a0">CD  Conductivity</text>
    <rect x="660" y="232" width="220" height="8" rx="2" fill="#0a1428"/>
    <rect x="660" y="232" width="52" height="8" rx="2" fill="url(#barGrad)" opacity="0.9"/>
    <text x="888" y="240" fill="#4a9fd4" font-weight="bold">234</text>
    <text x="930" y="240" text-anchor="end" fill="#e05555" font-size="8">LOW</text>

    <!-- DR -->
    <text x="508" y="258" fill="#e8d0a0">DR  Decay Resistance</text>
    <rect x="660" y="250" width="220" height="8" rx="2" fill="#0a1428"/>
    <rect x="660" y="250" width="40" height="8" rx="2" fill="url(#barGrad)" opacity="0.9"/>
    <text x="888" y="258" fill="#4a9fd4" font-weight="bold">180</text>
    <text x="930" y="258" text-anchor="end" fill="#e05555" font-size="8">LOW</text>

    <!-- FL -->
    <text x="508" y="276" fill="#e8d0a0">FL  Flexibility</text>
    <rect x="660" y="268" width="220" height="8" rx="2" fill="#0a1428"/>
    <rect x="660" y="268" width="21" height="8" rx="2" fill="url(#barGrad)" opacity="0.9"/>
    <text x="888" y="276" fill="#4a9fd4" font-weight="bold">95</text>
    <text x="930" y="276" text-anchor="end" fill="#e05555" font-size="8">LOW</text>

    <!-- HR -->
    <text x="508" y="294" fill="#e8d0a0">HR  Heat Resistance</text>
    <rect x="660" y="286" width="220" height="8" rx="2" fill="#0a1428"/>
    <rect x="660" y="286" width="75" height="8" rx="2" fill="url(#barGrad)" opacity="0.9"/>
    <text x="888" y="294" fill="#4a9fd4" font-weight="bold">340</text>
    <text x="930" y="294" text-anchor="end" fill="#f5a623" font-size="8">MED</text>

    <!-- MA -->
    <text x="508" y="312" fill="#e8d0a0">MA  Malleability</text>
    <rect x="660" y="304" width="220" height="8" rx="2" fill="#0a1428"/>
    <rect x="660" y="304" width="114" height="8" rx="2" fill="url(#barGrad)" opacity="0.9"/>
    <text x="888" y="312" fill="#4a9fd4" font-weight="bold">520</text>
    <text x="930" y="312" text-anchor="end" fill="#f5a623" font-size="8">MED</text>

    <!-- PE -->
    <text x="508" y="330" fill="#e8d0a0">PE  Pliability Efficiency</text>
    <rect x="660" y="322" width="220" height="8" rx="2" fill="#0a1428"/>
    <rect x="660" y="322" width="150" height="8" rx="2" fill="url(#barGrad)" opacity="0.9"/>
    <text x="888" y="330" fill="#4a9fd4" font-weight="bold">680</text>
    <text x="930" y="330" text-anchor="end" fill="#4caf7d" font-size="8">HIGH</text>

    <!-- SR -->
    <text x="508" y="348" fill="#e8d0a0">SR  Shock Resistance</text>
    <rect x="660" y="340" width="220" height="8" rx="2" fill="#0a1428"/>
    <rect x="660" y="340" width="64" height="8" rx="2" fill="url(#barGrad)" opacity="0.9"/>
    <text x="888" y="348" fill="#4a9fd4" font-weight="bold">290</text>
    <text x="930" y="348" text-anchor="end" fill="#e05555" font-size="8">LOW</text>

    <!-- UT -->
    <text x="508" y="366" fill="#e8d0a0">UT  Unit Toughness</text>
    <rect x="660" y="358" width="220" height="8" rx="2" fill="#0a1428"/>
    <rect x="660" y="358" width="90" height="8" rx="2" fill="url(#barGrad)" opacity="0.9"/>
    <text x="888" y="366" fill="#4a9fd4" font-weight="bold">410</text>
    <text x="930" y="366" text-anchor="end" fill="#f5a623" font-size="8">MED</text>
  </g>

  <line x1="498" y1="374" x2="930" y2="374" stroke="#1a2a40" stroke-width="0.5"/>

  <!-- Quality score -->
  <text x="508" y="392" font-size="11" fill="#8a9ab0">Overall Quality Score:</text>
  <text x="930" y="392" font-size="15" font-weight="bold" text-anchor="end" fill="#ffd700">847 / 1000</text>
  <rect x="508" y="396" width="422" height="10" rx="3" fill="#0a1428"/>
  <rect x="508" y="396" width="357" height="10" rx="3" fill="#ffd700" opacity="0.6"/>

  <!-- Best use note -->
  <rect x="498" y="414" width="432" height="36" rx="2" fill="#0d1828" stroke="#2a3a50" stroke-width="0.5"/>
  <text x="508" y="428" font-size="9" fill="#8a9ab0">Best for:</text>
  <text x="568" y="428" font-size="9" fill="#4a9fd4">Crystal Drills (ER primary), Energy Cells (ER+PE), Warp Cores (ER+MA)</text>
  <text x="508" y="444" font-size="9" fill="#8a9ab0">Caution:</text>
  <text x="568" y="444" font-size="9" fill="#f5a623">Low FL — avoid for flexible components</text>

  <!-- Action buttons -->
  <rect x="498" y="458" width="130" height="28" rx="2" fill="#0d1428" stroke="#3a4a60" stroke-width="1"/>
  <text x="563" y="476" font-size="10" text-anchor="middle" fill="#8a9ab0">MARK DEPOSIT</text>
  <rect x="636" y="458" width="130" height="28" rx="2" fill="#0d1428" stroke="#3a4a60" stroke-width="1"/>
  <text x="701" y="476" font-size="10" text-anchor="middle" fill="#8a9ab0">ADD TO LOG</text>
  <rect x="774" y="458" width="156" height="28" rx="2" fill="#1a2848" stroke="#f5a623" stroke-width="1.5"/>
  <text x="852" y="476" font-size="10" text-anchor="middle" fill="#ffd700">PLACE HARVESTER</text>

  <text x="714" y="504" font-size="9" text-anchor="middle" fill="#4a5a70">[E] CLOSE INSPECTOR  ·  [H] HARVEST NOW  ·  [M] MARK ON MAP</text>

  <!-- Bottom bar -->
  <rect x="0" y="506" width="960" height="34" fill="#050d20" opacity="0.92"/>
  <line x1="0" y1="506" x2="960" y2="506" stroke="#f5a623" stroke-width="0.8" opacity="0.6"/>
  <text x="240" y="527" font-size="11" text-anchor="middle" fill="#f5a623">◈ 48,320  ⬡ 2,840 RP  ·  A1 — Voidstone Prime  ·  02:14:37</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141a0e"/>
      <stop offset="100%" stop-color="#0c1008"/>
    </linearGradient>
    <linearGradient id="hudBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1e38" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#080e20" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glowRed">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#e05555" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowAmber">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#f5a623" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#4caf7d" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- World (red-tinted atmosphere — crisis) -->
  <rect width="960" height="270" fill="url(#skyGrad)"/>
  <!-- Red crisis tint over sky -->
  <rect width="960" height="270" fill="#300000" opacity="0.25"/>
  <g opacity="0.4">
    <circle cx="45" cy="23" r="0.8" fill="#fff"/><circle cx="234" cy="14" r="1.0" fill="#fff"/>
    <circle cx="698" cy="18" r="1.0" fill="#e0ffff"/><circle cx="812" cy="72" r="0.7" fill="#fff"/>
  </g>
  <rect x="0" y="270" width="960" height="270" fill="url(#groundGrad)"/>
  <g stroke="#1a2010" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="310" x2="960" y2="310"/><line x1="0" y1="350" x2="960" y2="350"/>
    <line x1="0" y1="390" x2="960" y2="390"/><line x1="0" y1="430" x2="960" y2="430"/>
    <line x1="80" y1="270" x2="80" y2="540"/><line x1="240" y1="270" x2="240" y2="540"/>
    <line x1="400" y1="270" x2="400" y2="540"/><line x1="560" y1="270" x2="560" y2="540"/>
    <line x1="720" y1="270" x2="720" y2="540"/>
  </g>
  <line x1="0" y1="270" x2="960" y2="270" stroke="#2a3820" stroke-width="1"/>

  <!-- Colony buildings (same layout, but distressed) -->
  <!-- Habitation Module 1 -->
  <rect x="150" y="330" width="100" height="80" rx="3" fill="#1a2030" stroke="#e05555" stroke-width="2" filter="url(#glowRed)"/>
  <rect x="155" y="324" width="90" height="10" rx="1" fill="#252030"/>
  <rect x="164" y="345" width="16" height="12" rx="1" fill="#ffd700" opacity="0.2"/>
  <rect x="188" y="345" width="16" height="12" rx="1" fill="#e05555" opacity="0.3"/>
  <rect x="212" y="345" width="16" height="12" rx="1" fill="#ffd700" opacity="0.15"/>
  <rect x="195" y="390" width="20" height="20" rx="1" fill="#0d1020"/>
  <circle cx="200" cy="334" r="4" fill="#e05555" opacity="0.9" filter="url(#glowRed)"/>
  <text x="200" y="417" font-size="7" text-anchor="middle" fill="#e05555">HAB MOD 1</text>

  <!-- Habitation Module 2 -->
  <rect x="290" y="330" width="100" height="80" rx="3" fill="#1a2030" stroke="#e05555" stroke-width="1.5"/>
  <rect x="295" y="324" width="90" height="10" rx="1" fill="#252030"/>
  <rect x="304" y="345" width="16" height="12" rx="1" fill="#ffd700" opacity="0.3"/>
  <rect x="328" y="345" width="16" height="12" rx="1" fill="#e05555" opacity="0.2"/>
  <rect x="325" y="390" width="20" height="20" rx="1" fill="#0d1020"/>
  <circle cx="340" cy="334" r="4" fill="#f5a623" opacity="0.9"/>
  <text x="340" y="417" font-size="7" text-anchor="middle" fill="#f5a623">HAB MOD 2</text>

  <!-- Water Pump — BROKEN indicator -->
  <rect x="420" y="345" width="60" height="65" rx="2" fill="#1a1018" stroke="#e05555" stroke-width="2" filter="url(#glowRed)"/>
  <rect x="426" y="340" width="48" height="8" rx="1" fill="#201018"/>
  <circle cx="450" cy="365" r="10" fill="#200810" stroke="#e05555" stroke-width="1"/>
  <text x="450" y="369" font-size="8" text-anchor="middle" fill="#e05555">✗</text>
  <text x="450" y="395" font-size="6" text-anchor="middle" fill="#e05555">WATER</text>
  <text x="450" y="403" font-size="6" text-anchor="middle" fill="#e05555">OFFLINE</text>
  <!-- Leak effect -->
  <line x1="442" y1="408" x2="440" y2="420" stroke="#4a9fd4" stroke-width="1.5" opacity="0.5"/>
  <line x1="458" y1="408" x2="460" y2="422" stroke="#4a9fd4" stroke-width="1.5" opacity="0.4"/>
  <circle cx="441" cy="422" r="3" fill="#4a9fd4" opacity="0.3"/>

  <!-- Food Dome (running but stressed) -->
  <ellipse cx="550" cy="385" rx="45" ry="30" fill="#0d1f0d" stroke="#f5a623" stroke-width="1.5" opacity="0.8"/>
  <text x="550" y="420" font-size="7" text-anchor="middle" fill="#f5a623">FOOD DOME</text>

  <!-- Power Generator (running) -->
  <rect x="640" y="355" width="55" height="50" rx="2" fill="#1a1a10" stroke="#4caf7d" stroke-width="1.5"/>
  <text x="667" y="384" font-size="8" text-anchor="middle" fill="#4caf7d">⚡</text>
  <text x="667" y="398" font-size="6" text-anchor="middle" fill="#4caf7d">POWER OK</text>

  <!-- Factory pause overlay (large red X banner) -->
  <rect x="120" y="440" width="560" height="24" rx="2" fill="#200808" stroke="#e05555" stroke-width="1" opacity="0.9"/>
  <text x="400" y="456" font-size="9" text-anchor="middle" fill="#e05555" font-weight="bold">⚠ PRODUCTION PAUSED — Water shortage affects 3 factories</text>

  <!-- Pioneer fleeing animation -->
  <!-- Pioneer 1 (running right, distressed) -->
  <circle cx="530" cy="370" r="5" fill="#e8d0a0"/>
  <rect x="526" y="372" width="8" height="12" rx="1" fill="#3a4060"/>
  <line x1="526" y1="376" x2="520" y2="384" stroke="#3a4060" stroke-width="1.5"/>
  <!-- Running legs -->
  <line x1="534" y1="376" x2="540" y2="382" stroke="#3a4060" stroke-width="1.5"/>
  <!-- Arrow showing direction of leaving -->
  <text x="545" y="368" font-size="8" fill="#e05555">→</text>

  <!-- Pioneer 2 (walking away) -->
  <circle cx="610" cy="378" r="5" fill="#d4b890"/>
  <rect x="606" y="380" width="8" height="12" rx="1" fill="#3a3050"/>
  <text x="618" y="376" font-size="8" fill="#e05555">→</text>

  <!-- ═══ CRISIS ALERT PANEL ═══ (right) -->
  <rect x="730" y="40" width="222" height="450" rx="3" fill="#050408" stroke="#e05555" stroke-width="2" filter="url(#glowRed)" opacity="0.97"/>
  <rect x="730" y="40" width="222" height="36" rx="3" fill="#200808"/>
  <line x1="730" y1="76" x2="952" y2="76" stroke="#e05555" stroke-width="1.5" opacity="0.8"/>
  <text x="841" y="62" font-size="12" font-weight="bold" text-anchor="middle" fill="#e05555">⚠  CRISIS</text>

  <g font-size="9">
    <text x="742" y="90" fill="#e05555" font-weight="bold">WATER: CRITICAL</text>
    <rect x="742" y="94" width="198" height="12" rx="2" fill="#1a0808"/>
    <rect x="742" y="94" width="18" height="12" rx="2" fill="#e05555" opacity="0.8"/>
    <text x="841" y="104" font-size="8" text-anchor="middle" fill="#e05555">9%  — CRITICALLY LOW</text>

    <line x1="738" y1="112" x2="944" y2="112" stroke="#2a0808" stroke-width="0.5"/>

    <!-- Needs status (all) -->
    <text x="742" y="126" fill="#8a9ab0" letter-spacing="1">COLONY NEEDS</text>

    <text x="742" y="142" fill="#e05555" font-weight="bold">Water:</text>
    <rect x="800" y="135" width="140" height="7" rx="2" fill="#1a0808"/>
    <rect x="800" y="135" width="13" height="7" rx="2" fill="#e05555" opacity="0.9"/>
    <text x="942" y="142" text-anchor="end" fill="#e05555">CRITICAL</text>

    <text x="742" y="157" fill="#4caf7d">Food:</text>
    <rect x="800" y="150" width="140" height="7" rx="2" fill="#0a1020"/>
    <rect x="800" y="150" width="100" height="7" rx="2" fill="#4caf7d" opacity="0.7"/>
    <text x="942" y="157" text-anchor="end" fill="#4caf7d">OK</text>

    <text x="742" y="172" fill="#4caf7d">Power:</text>
    <rect x="800" y="165" width="140" height="7" rx="2" fill="#0a1020"/>
    <rect x="800" y="165" width="118" height="7" rx="2" fill="#4caf7d" opacity="0.7"/>
    <text x="942" y="172" text-anchor="end" fill="#4caf7d">OK</text>

    <text x="742" y="187" fill="#f5a623">Luxury:</text>
    <rect x="800" y="180" width="140" height="7" rx="2" fill="#0a1020"/>
    <rect x="800" y="180" width="35" height="7" rx="2" fill="#f5a623" opacity="0.6"/>
    <text x="942" y="187" text-anchor="end" fill="#f5a623">Low</text>

    <line x1="738" y1="194" x2="944" y2="194" stroke="#2a0808" stroke-width="0.5"/>

    <!-- Population / morale -->
    <text x="742" y="208" fill="#8a9ab0" letter-spacing="1">POPULATION</text>
    <text x="742" y="224" fill="#6a7a90">Pioneers:</text>
    <text x="942" y="224" text-anchor="end" fill="#e8d0a0">7  (was 9)</text>
    <text x="742" y="239" fill="#e05555" font-weight="bold">Abandoning:</text>
    <text x="942" y="239" text-anchor="end" fill="#e05555">2 leaving NOW</text>
    <text x="742" y="254" fill="#6a7a90">Morale:</text>
    <rect x="800" y="247" width="140" height="7" rx="2" fill="#0a1020"/>
    <rect x="800" y="247" width="31" height="7" rx="2" fill="#e05555" opacity="0.8"/>
    <text x="942" y="254" text-anchor="end" fill="#e05555">22% ▼</text>

    <line x1="738" y1="261" x2="944" y2="261" stroke="#2a0808" stroke-width="0.5"/>

    <!-- Production impact -->
    <text x="742" y="275" fill="#8a9ab0" letter-spacing="1">PRODUCTION IMPACT</text>
    <text x="742" y="291" fill="#e05555">Processing Plant:</text>
    <text x="942" y="291" text-anchor="end" fill="#e05555">HALTED</text>
    <text x="742" y="306" fill="#e05555">Fabricator:</text>
    <text x="942" y="306" text-anchor="end" fill="#e05555">HALTED</text>
    <text x="742" y="321" fill="#f5a623">Assembly:</text>
    <text x="942" y="321" text-anchor="end" fill="#f5a623">50% capacity</text>
    <text x="742" y="336" fill="#6a7a90">Loss/min:</text>
    <text x="942" y="336" text-anchor="end" fill="#e05555">−◈ 284/min</text>

    <line x1="738" y1="343" x2="944" y2="343" stroke="#2a0808" stroke-width="0.5"/>

    <!-- Fix options -->
    <text x="742" y="357" fill="#8a9ab0" letter-spacing="1">RESOLUTION</text>
    <!-- Option 1: repair pump -->
    <rect x="742" y="362" width="198" height="34" rx="2" fill="#200808" stroke="#e05555" stroke-width="1.5" filter="url(#glowRed)"/>
    <text x="841" y="375" font-size="8" text-anchor="middle" fill="#e05555">REPAIR WATER PUMP</text>
    <text x="841" y="388" font-size="7" text-anchor="middle" fill="#8a9ab0">Repair Kit ×3  ·  ~45s  ·  URGENT</text>
    <!-- Option 2: emergency ration -->
    <rect x="742" y="400" width="198" height="34" rx="2" fill="#1a1000" stroke="#f5a623" stroke-width="1"/>
    <text x="841" y="413" font-size="8" text-anchor="middle" fill="#f5a623">EMERGENCY WATER DROP</text>
    <text x="841" y="426" font-size="7" text-anchor="middle" fill="#8a9ab0">◈ 400  ·  Buys 10 min  ·  one-time</text>
    <!-- Timer countdown -->
    <rect x="742" y="438" width="198" height="24" rx="2" fill="#100408"/>
    <text x="841" y="454" font-size="9" text-anchor="middle" fill="#e05555" font-weight="bold">Pioneers leave in:  0:47</text>
  </g>

  <!-- Warning banner (bottom) -->
  <rect x="0" y="464" width="960" height="36" fill="#180505" stroke="#e05555" stroke-width="1" opacity="0.95"/>
  <text x="480" y="486" font-size="12" font-weight="bold" text-anchor="middle" fill="#e05555" filter="url(#glowRed)">⚠  WATER CRITICAL — 2 PIONEERS ABANDONING — REPAIR WATER PUMP IMMEDIATELY  ⚠</text>

  <!-- HUD top bar -->
  <rect x="0" y="0" width="960" height="32" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="32" x2="960" y2="32" stroke="#e05555" stroke-width="1" opacity="0.7"/>
  <text x="14" y="11" font-size="9" fill="#f5a623" opacity="0.7">CREDITS</text>
  <text x="14" y="26" font-size="14" font-weight="bold" fill="#ffd700">◈ 22,800</text>
  <line x1="100" y1="5" x2="100" y2="28" stroke="#2a3a50" stroke-width="0.5"/>
  <text x="113" y="11" font-size="9" fill="#9090f0" opacity="0.7">RESEARCH</text>
  <text x="113" y="26" font-size="14" font-weight="bold" fill="#a0a8f8">⬡ 1,820</text>
  <line x1="200" y1="5" x2="200" y2="28" stroke="#2a3a50" stroke-width="0.5"/>
  <text x="213" y="20" font-size="10" fill="#e05555">Pioneers: 7 ▼</text>
  <text x="480" y="20" font-size="12" text-anchor="middle" fill="#e05555" filter="url(#glowRed)">⚠  COLONY CRISIS — WATER OFFLINE</text>
  <text x="946" y="20" font-size="14" text-anchor="end" fill="#e8d0a0">02:18:09</text>

  <!-- Bottom bar -->
  <rect x="0" y="506" width="960" height="34" fill="url(#hudBarGrad)"/>
  <line x1="0" y1="506" x2="960" y2="506" stroke="#e05555" stroke-width="1" opacity="0.7"/>
  <text x="480" y="527" font-size="10" text-anchor="middle" fill="#e05555">[E] REPAIR WATER PUMP  ·  MORALE: 22%  ·  2 PIONEERS LEAVING  ·  PRODUCTION HALTED</text>
</svg>

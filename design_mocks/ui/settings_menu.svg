<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1428"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111928"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="sliderFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <filter id="panelShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#f5a623" flood-opacity="0.15"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#f5a623" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background world (blurred) -->
  <rect width="960" height="540" fill="url(#bgGrad)"/>
  <!-- Star field faint -->
  <g opacity="0.3">
    <circle cx="45" cy="23" r="0.8" fill="#ffffff"/>
    <circle cx="120" cy="67" r="0.5" fill="#e0e0ff"/>
    <circle cx="234" cy="14" r="1.0" fill="#ffffff"/>
    <circle cx="812" cy="72" r="0.7" fill="#ffffff"/>
    <circle cx="920" cy="40" r="0.9" fill="#ffffff"/>
    <circle cx="78" cy="445" r="0.6" fill="#ffffff"/>
    <circle cx="856" cy="412" r="0.8" fill="#ffe0a0"/>
  </g>

  <!-- Overlay darken -->
  <rect width="960" height="540" fill="#000010" opacity="0.5"/>

  <!-- Main settings panel -->
  <rect x="155" y="45" width="650" height="460" rx="4" fill="url(#panelGrad)" stroke="#f5a623" stroke-width="1.5" filter="url(#panelShadow)"/>
  <rect x="155" y="45" width="650" height="460" rx="4" fill="none" stroke="#ffd700" stroke-width="0.4" opacity="0.3"/>

  <!-- Panel header -->
  <rect x="155" y="45" width="650" height="48" rx="4" fill="#0d1e38"/>
  <rect x="155" y="80" width="650" height="13" fill="#0d1e38"/>
  <line x1="155" y1="93" x2="805" y2="93" stroke="#f5a623" stroke-width="1.5" opacity="0.8"/>
  <text x="480" y="76" font-family="'Courier New', monospace" font-size="18" font-weight="bold" text-anchor="middle" fill="#ffd700" letter-spacing="6" filter="url(#glow)">⚙  SETTINGS</text>

  <!-- Tab bar -->
  <rect x="170" y="104" width="100" height="28" rx="2" fill="#1a2848" stroke="#f5a623" stroke-width="1"/>
  <text x="220" y="122" font-size="11" text-anchor="middle" fill="#ffd700" letter-spacing="1">AUDIO</text>
  <rect x="278" y="104" width="100" height="28" rx="2" fill="#0d1428" stroke="#3a4060" stroke-width="1"/>
  <text x="328" y="122" font-size="11" text-anchor="middle" fill="#8a9ab0" letter-spacing="1">DISPLAY</text>
  <rect x="386" y="104" width="100" height="28" rx="2" fill="#0d1428" stroke="#3a4060" stroke-width="1"/>
  <text x="436" y="122" font-size="11" text-anchor="middle" fill="#8a9ab0" letter-spacing="1">CONTROLS</text>
  <rect x="494" y="104" width="100" height="28" rx="2" fill="#0d1428" stroke="#3a4060" stroke-width="1"/>
  <text x="544" y="122" font-size="11" text-anchor="middle" fill="#8a9ab0" letter-spacing="1">GAMEPLAY</text>

  <!-- AUDIO SECTION -->
  <text x="185" y="162" font-size="11" fill="#f5a623" letter-spacing="2" opacity="0.8">AUDIO</text>
  <line x1="185" y1="167" x2="790" y2="167" stroke="#f5a623" stroke-width="0.5" opacity="0.3"/>

  <!-- Master Volume -->
  <text x="185" y="195" font-size="12" fill="#e8d0a0">Master Volume</text>
  <rect x="330" y="182" width="330" height="8" rx="4" fill="#1a2035"/>
  <rect x="330" y="182" width="248" height="8" rx="4" fill="url(#sliderFill)" opacity="0.9"/>
  <circle cx="578" cy="186" r="7" fill="#ffd700" stroke="#ffffff" stroke-width="1.5"/>
  <text x="680" y="193" font-size="12" fill="#e8d0a0">75%</text>

  <!-- Music Volume -->
  <text x="185" y="225" font-size="12" fill="#e8d0a0">Music Volume</text>
  <rect x="330" y="212" width="330" height="8" rx="4" fill="#1a2035"/>
  <rect x="330" y="212" width="176" height="8" rx="4" fill="url(#sliderFill)" opacity="0.9"/>
  <circle cx="506" cy="216" r="7" fill="#ffd700" stroke="#ffffff" stroke-width="1.5"/>
  <text x="680" y="223" font-size="12" fill="#e8d0a0">53%</text>

  <!-- SFX Volume -->
  <text x="185" y="255" font-size="12" fill="#e8d0a0">SFX Volume</text>
  <rect x="330" y="242" width="330" height="8" rx="4" fill="#1a2035"/>
  <rect x="330" y="242" width="297" height="8" rx="4" fill="url(#sliderFill)" opacity="0.9"/>
  <circle cx="627" cy="246" r="7" fill="#ffd700" stroke="#ffffff" stroke-width="1.5"/>
  <text x="680" y="253" font-size="12" fill="#e8d0a0">90%</text>

  <!-- Ambient Volume -->
  <text x="185" y="285" font-size="12" fill="#e8d0a0">Ambient Volume</text>
  <rect x="330" y="272" width="330" height="8" rx="4" fill="#1a2035"/>
  <rect x="330" y="272" width="132" height="8" rx="4" fill="url(#sliderFill)" opacity="0.9"/>
  <circle cx="462" cy="276" r="7" fill="#ffd700" stroke="#ffffff" stroke-width="1.5"/>
  <text x="680" y="283" font-size="12" fill="#e8d0a0">40%</text>

  <!-- DISPLAY SECTION -->
  <text x="185" y="316" font-size="11" fill="#f5a623" letter-spacing="2" opacity="0.8">DISPLAY</text>
  <line x1="185" y1="321" x2="790" y2="321" stroke="#f5a623" stroke-width="0.5" opacity="0.3"/>

  <!-- Fullscreen toggle -->
  <text x="185" y="348" font-size="12" fill="#e8d0a0">Fullscreen</text>
  <rect x="330" y="335" width="54" height="22" rx="11" fill="#1a4a2a" stroke="#4caf7d" stroke-width="1"/>
  <circle cx="373" cy="346" r="9" fill="#4caf7d"/>
  <text x="415" y="350" font-size="11" fill="#4caf7d">ON</text>

  <!-- Resolution -->
  <text x="185" y="378" font-size="12" fill="#e8d0a0">Resolution</text>
  <rect x="330" y="365" width="200" height="24" rx="2" fill="#0d1428" stroke="#3a4a60" stroke-width="1"/>
  <text x="345" y="381" font-size="12" fill="#e8d0a0">1920 × 1080</text>
  <text x="518" y="381" font-size="12" fill="#f5a623">▾</text>

  <!-- VSync -->
  <text x="185" y="408" font-size="12" fill="#e8d0a0">V-Sync</text>
  <rect x="330" y="395" width="54" height="22" rx="11" fill="#2a1a1a" stroke="#5a3a3a" stroke-width="1"/>
  <circle cx="341" cy="406" r="9" fill="#3a2a2a"/>
  <text x="400" y="410" font-size="11" fill="#6a5a5a">OFF</text>

  <!-- CONTROLS section header -->
  <text x="185" y="438" font-size="11" fill="#f5a623" letter-spacing="2" opacity="0.8">CONTROLS  (PREVIEW)</text>
  <line x1="185" y1="443" x2="790" y2="443" stroke="#f5a623" stroke-width="0.5" opacity="0.3"/>

  <!-- Key bindings preview -->
  <g font-size="11" fill="#8a9ab0">
    <text x="200" y="462">Move</text>
    <rect x="310" y="452" width="36" height="16" rx="2" fill="#1a2035" stroke="#3a4a60" stroke-width="1"/>
    <text x="328" y="464" text-anchor="middle" fill="#e8d0a0">W</text>
    <rect x="350" y="452" width="36" height="16" rx="2" fill="#1a2035" stroke="#3a4a60" stroke-width="1"/>
    <text x="368" y="464" text-anchor="middle" fill="#e8d0a0">A</text>
    <rect x="390" y="452" width="36" height="16" rx="2" fill="#1a2035" stroke="#3a4a60" stroke-width="1"/>
    <text x="408" y="464" text-anchor="middle" fill="#e8d0a0">S</text>
    <rect x="430" y="452" width="36" height="16" rx="2" fill="#1a2035" stroke="#3a4a60" stroke-width="1"/>
    <text x="448" y="464" text-anchor="middle" fill="#e8d0a0">D</text>

    <text x="490" y="462">Production</text>
    <rect x="590" y="452" width="24" height="16" rx="2" fill="#1a2035" stroke="#3a4a60" stroke-width="1"/>
    <text x="602" y="464" text-anchor="middle" fill="#e8d0a0">P</text>

    <text x="630" y="462">Galaxy Map</text>
    <rect x="730" y="452" width="24" height="16" rx="2" fill="#1a2035" stroke="#3a4a60" stroke-width="1"/>
    <text x="742" y="464" text-anchor="middle" fill="#e8d0a0">M</text>
  </g>

  <!-- Buttons row -->
  <rect x="320" y="482" width="140" height="36" rx="3" fill="#0d1428" stroke="#4a5a70" stroke-width="1"/>
  <text x="390" y="505" font-size="13" text-anchor="middle" fill="#8a9ab0" letter-spacing="2">CANCEL</text>

  <rect x="480" y="482" width="140" height="36" rx="3" fill="#1a2848" stroke="#f5a623" stroke-width="1.5"/>
  <text x="550" y="505" font-size="13" text-anchor="middle" fill="#ffd700" letter-spacing="2">APPLY</text>

  <!-- Corner decorations -->
  <g stroke="#f5a623" stroke-width="1" fill="none" opacity="0.3">
    <path d="M 20 20 L 20 45 L 45 45"/>
    <path d="M 940 20 L 940 45 L 915 45"/>
    <path d="M 20 520 L 20 495 L 45 495"/>
    <path d="M 940 520 L 940 495 L 915 495"/>
  </g>
</svg>

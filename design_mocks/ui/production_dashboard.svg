    <linearGradient id="barAmber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a4a10"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="barRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6a1a1a"/>
      <stop offset="100%" stop-color="#e05555"/>
    </linearGradient>
  </defs>

  <rect width="960" height="540" fill="url(#bgGrad)"/>

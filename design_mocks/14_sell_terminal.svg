<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" shape-rendering="crispEdges" font-family="monospace">
  <rect width="960" height="540" fill="#1a1a1d"/>
  <text x="40" y="270" fill="#4a4a50" font-size="28">(game world dimmed — player at sell terminal)</text>

  <g transform="translate(340,130)">
    <rect width="280" height="280" fill="#2a2a2e" stroke="#4a4a50" stroke-width="2"/>
    <g fill="#d4a843">
      <rect x="4" y="4" width="3" height="3"/>
      <rect x="273" y="4" width="3" height="3"/>
      <rect x="4" y="273" width="3" height="3"/>
      <rect x="273" y="273" width="3" height="3"/>
    </g>
    <rect x="0" y="0" width="280" height="32" fill="#15151a"/>
    <text x="10" y="22" fill="#d4a843" font-size="13" font-weight="bold">SELL TERMINAL</text>
    <g transform="translate(252,8)">
      <rect width="18" height="18" fill="#2a2a2e" stroke="#8b3a2a"/>
      <text x="4" y="14" fill="#8b3a2a" font-size="12">X</text>
    </g>

    <!-- Amber LED screen -->
    <g transform="translate(14,44)">
      <rect width="252" height="60" fill="#15151a" stroke="#4a4a50"/>
      <!-- scanlines -->
      <g fill="#d4a843" fill-opacity="0.08">
        <rect y="4" width="252" height="1"/>
        <rect y="12" width="252" height="1"/>
        <rect y="20" width="252" height="1"/>
        <rect y="28" width="252" height="1"/>
        <rect y="36" width="252" height="1"/>
        <rect y="44" width="252" height="1"/>
        <rect y="52" width="252" height="1"/>
      </g>
      <text x="10" y="20" fill="#a88a4a" font-size="9">POOL</text>
      <text x="60" y="22" fill="#d4a843" font-size="16" font-weight="bold">047 / 050</text>
      <g transform="translate(10,28)">
        <rect width="232" height="10" fill="#0a0a10" stroke="#4a4a50"/>
        <g fill="#d4a843">
          <rect x="2" y="2" width="16" height="6"/>
          <rect x="20" y="2" width="16" height="6"/>
          <rect x="38" y="2" width="16" height="6"/>
          <rect x="56" y="2" width="16" height="6"/>
          <rect x="74" y="2" width="16" height="6"/>
          <rect x="92" y="2" width="16" height="6"/>
          <rect x="110" y="2" width="16" height="6"/>
          <rect x="128" y="2" width="16" height="6"/>
          <rect x="146" y="2" width="16" height="6"/>
          <rect x="164" y="2" width="16" height="6"/>
          <rect x="182" y="2" width="16" height="6"/>
        </g>
      </g>
      <text x="10" y="54" fill="#a88a4a" font-size="9">RATE: 1 CR / ORE</text>
      <text x="148" y="54" fill="#7cb87c" font-size="9">= 047 CR</text>
    </g>

    <!-- SELL ALL button -->
    <g transform="translate(24,120)">
      <rect width="232" height="46" fill="#2a2a2e" stroke="#d4a843" stroke-width="2"/>
      <rect x="2" y="2" width="228" height="2" fill="#4a4a50"/>
      <rect x="2" y="42" width="228" height="2" fill="#15151a"/>
      <text x="76" y="29" fill="#d4a843" font-size="16" font-weight="bold">SELL ALL</text>
      <text x="94" y="40" fill="#a88a4a" font-size="7">[E] / TAP</text>
    </g>

    <!-- Auto sell toggle -->
    <g transform="translate(14,180)">
      <rect width="252" height="48" fill="#1a1a1d" stroke="#4a4a50"/>
      <text x="10" y="18" fill="#a88a4a" font-size="10">AUTO-SELL</text>
      <text x="10" y="30" fill="#4a4a50" font-size="8">Sells at 80% capacity</text>
      <!-- locked toggle -->
      <g transform="translate(170,12)">
        <rect width="70" height="24" fill="#2a2a2e" stroke="#8b3a2a"/>
        <rect x="2" y="2" width="32" height="20" fill="#1a1a1d"/>
        <!-- padlock -->
        <rect x="12" y="10" width="12" height="8" fill="#8b3a2a"/>
        <rect x="15" y="6" width="6" height="4" fill="none" stroke="#8b3a2a"/>
        <text x="38" y="17" fill="#8b3a2a" font-size="8">500 CR</text>
      </g>
    </g>

    <!-- flavor -->
    <text x="14" y="254" fill="#4a4a50" font-size="8">SCREEN FLICKERS OCCASIONALLY — COSMETIC</text>
  </g>

  <g>
    <rect x="0" y="516" width="960" height="24" fill="#1a1a1d"/>
    <text x="8" y="532" fill="#a88a4a" font-size="10">04 — SELL TERMINAL  ·  amber LED screen, segmented bar, SELL ALL stamp button, auto-sell locked</text>
  </g>
</svg>

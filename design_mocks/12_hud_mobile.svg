<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" shape-rendering="crispEdges" font-family="monospace">
  <defs>
    <pattern id="stars2" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="#0a0a10"/>
      <rect x="10" y="15" width="1" height="1" fill="#d4a843"/>
      <rect x="40" y="30" width="1" height="1" fill="#a88a4a"/>
    </pattern>
    <pattern id="rock2" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="#3a3a3e"/>
      <rect x="6" y="8" width="3" height="2" fill="#2a2a2e"/>
      <rect x="18" y="20" width="4" height="3" fill="#2a2a2e"/>
    </pattern>
  </defs>
  <rect width="960" height="540" fill="url(#stars2)"/>
  <rect x="0" y="120" width="960" height="420" fill="url(#rock2)"/>

  <!-- player + ore -->
  <rect x="460" y="280" width="24" height="32" fill="#5a8fa8"/>
  <rect x="600" y="310" width="28" height="24" fill="#8b5a2a"/>

  <!-- =========== TOP-LEFT: COMPACT HORIZONTAL RESOURCE RAIL (mobile) =========== -->
  <g transform="translate(8,8)">
    <rect width="440" height="34" fill="#2a2a2e" stroke="#4a4a50" stroke-width="2"/>
    <g fill="#d4a843">
      <rect x="3" y="3" width="3" height="3"/>
      <rect x="434" y="3" width="3" height="3"/>
      <rect x="3" y="28" width="3" height="3"/>
      <rect x="434" y="28" width="3" height="3"/>
    </g>

    <!-- ore -->
    <g transform="translate(8,6)">
      <rect x="0" y="4" width="14" height="14" fill="#8b5a2a"/>
      <rect x="2" y="4" width="10" height="3" fill="#a86a33"/>
      <text x="18" y="14" fill="#d4a843" font-size="12" font-weight="bold">0047</text>
      <text x="18" y="22" fill="#a88a4a" font-size="6">38/50</text>
    </g>

    <!-- divider -->
    <rect x="92" y="6" width="1" height="20" fill="#4a4a50"/>

    <!-- crystal -->
    <g transform="translate(100,6)">
      <polygon points="2,18 8,2 14,18 8,22" fill="#5a8fa8"/>
      <polygon points="4,18 8,6 12,18" fill="#8fc0d8"/>
      <text x="20" y="14" fill="#d4a843" font-size="12" font-weight="bold">012</text>
      <text x="20" y="22" fill="#a88a4a" font-size="6">12/50</text>
    </g>

    <rect x="176" y="6" width="1" height="20" fill="#4a4a50"/>

    <!-- fuel crystal -->
    <g transform="translate(184,6)">
      <polygon points="2,18 8,2 14,18" fill="#7cb87c"/>
      <rect x="6" y="10" width="4" height="4" fill="#aae5aa"/>
      <text x="20" y="14" fill="#d4a843" font-size="12" font-weight="bold">003</text>
      <text x="20" y="22" fill="#a88a4a" font-size="6">RARE</text>
    </g>

    <rect x="252" y="6" width="1" height="20" fill="#4a4a50"/>

    <!-- rare metal (locked) -->
    <g transform="translate(260,6)" opacity="0.45">
      <rect x="0" y="4" width="14" height="14" fill="#8b7a50"/>
      <text x="18" y="14" fill="#4a4a50" font-size="12" font-weight="bold">---</text>
      <text x="18" y="22" fill="#4a4a50" font-size="6">A3 LOCK</text>
    </g>

    <rect x="336" y="6" width="1" height="20" fill="#4a4a50"/>

    <!-- void stone (locked) -->
    <g transform="translate(344,6)" opacity="0.45">
      <rect x="0" y="4" width="14" height="14" fill="#3a2a4a"/>
      <rect x="3" y="7" width="8" height="6" fill="#5a3a6a"/>
      <text x="18" y="14" fill="#4a4a50" font-size="12" font-weight="bold">---</text>
      <text x="18" y="22" fill="#4a4a50" font-size="6">A3 LOCK</text>
    </g>
  </g>

  <!-- inventory pill below rail -->
  <g transform="translate(8,48)">
    <rect width="120" height="20" fill="#2a2a2e" stroke="#4a4a50"/>
    <text x="6" y="9" fill="#a88a4a" font-size="7">INVENTORY</text>
    <text x="6" y="18" fill="#d4a843" font-size="10" font-weight="bold">07/10</text>
    <rect x="56" y="5" width="58" height="10" fill="#0a0a10"/>
    <g fill="#8b5a2a">
      <rect x="58" y="7" width="4" height="6"/>
      <rect x="64" y="7" width="4" height="6"/>
      <rect x="70" y="7" width="4" height="6"/>
      <rect x="76" y="7" width="4" height="6"/>
      <rect x="82" y="7" width="4" height="6"/>
      <rect x="88" y="7" width="4" height="6"/>
      <rect x="94" y="7" width="4" height="6"/>
    </g>
  </g>

  <!-- CREDITS + area tag top-right -->
  <g transform="translate(800,8)">
    <rect width="152" height="28" fill="#2a2a2e" stroke="#4a4a50"/>
    <rect x="6" y="6" width="16" height="16" fill="#d4a843"/>
    <text x="28" y="16" fill="#a88a4a" font-size="8">CR</text>
    <text x="28" y="26" fill="#d4a843" font-size="12" font-weight="bold">000,230</text>
  </g>
  <g transform="translate(800,40)">
    <rect width="152" height="18" fill="#2a2a2e" stroke="#4a4a50"/>
    <text x="6" y="12" fill="#a88a4a" font-size="8">A1 · IRON ROCK</text>
  </g>

  <!-- menu button -->
  <g transform="translate(908,62)">
    <rect width="44" height="44" fill="#2a2a2e" stroke="#4a4a50"/>
    <rect x="10" y="14" width="24" height="3" fill="#d4a843"/>
    <rect x="10" y="22" width="24" height="3" fill="#d4a843"/>
    <rect x="10" y="30" width="24" height="3" fill="#d4a843"/>
  </g>

  <!-- VIRTUAL JOYSTICK bottom-left -->
  <g transform="translate(40,380)">
    <circle cx="60" cy="60" r="60" fill="#2a2a2e" fill-opacity="0.6" stroke="#4a4a50" stroke-width="2"/>
    <circle cx="60" cy="60" r="44" fill="none" stroke="#4a4a50" stroke-dasharray="2,2"/>
    <circle cx="72" cy="52" r="22" fill="#4a4a50" fill-opacity="0.9" stroke="#d4a843"/>
    <text x="20" y="140" fill="#a88a4a" font-size="8">MOVE</text>
  </g>

  <!-- ACTION BUTTON bottom-right -->
  <g transform="translate(820,380)">
    <rect width="100" height="100" fill="#2a2a2e" stroke="#d4a843" stroke-width="2"/>
    <rect x="2" y="2" width="3" height="3" fill="#d4a843"/>
    <rect x="95" y="2" width="3" height="3" fill="#d4a843"/>
    <rect x="2" y="95" width="3" height="3" fill="#d4a843"/>
    <rect x="95" y="95" width="3" height="3" fill="#d4a843"/>
    <g transform="translate(32,24)" fill="#d4a843">
      <rect x="16" y="0" width="4" height="20"/>
      <rect x="4" y="4" width="28" height="4"/>
      <rect x="0" y="0" width="4" height="4"/>
      <rect x="32" y="0" width="4" height="4"/>
    </g>
    <text x="28" y="76" fill="#d4a843" font-size="14" font-weight="bold">MINE</text>
    <text x="8" y="96" fill="#a88a4a" font-size="7">TAP TO ACT</text>
  </g>

  <g>
    <rect x="0" y="516" width="960" height="24" fill="#1a1a1d"/>
    <text x="8" y="532" fill="#a88a4a" font-size="10">02 — HUD (MOBILE)  ·  horizontal multi-resource rail, inventory pill, joystick + action</text>
  </g>
</svg>

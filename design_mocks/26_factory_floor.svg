<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560">
  <defs>
    <style>
      text { font-family: monospace; }
      .title { fill: #E8C87A; font-size: 12px; font-weight: bold; }
      .label { fill: #C8C8D8; font-size: 9px; }
      .dim   { fill: #4A4A5A; font-size: 9px; }
      .slot  { fill: #2A3A5A; font-size: 8px; }
    </style>
    <marker id="arw" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#7ABCD4" opacity="0.9"/>
    </marker>
    <marker id="arwR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#D46060" opacity="0.9"/>
    </marker>
    <marker id="arwG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#7ABD7A" opacity="0.9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="560" fill="#0D1B3E"/>
  <rect x="1" y="1" width="958" height="558" fill="none" stroke="#1E3060" stroke-width="1"/>

  <!-- Title -->
  <text x="20" y="26" class="title">INDUSTRIAL SITE — FACTORY CHAIN: PROCESSING PLANT → FABRICATOR → ASSEMBLY COMPLEX</text>
  <line x1="20" y1="33" x2="940" y2="33" stroke="#2A4080" stroke-width="1"/>

  <!-- Ground grid -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#141E38" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect x="20" y="40" width="920" height="480" fill="url(#grid)"/>

  <!-- ═══════════════ PROCESSING PLANT (1 slot, left) ═══════════════ -->
  <!-- Slot badge -->
  <rect x="60" y="50" width="50" height="16" rx="3" fill="#1A2A4A" stroke="#2A5080" stroke-width="1"/>
  <text x="85" y="62" fill="#5A90C0" font-family="monospace" font-size="9" text-anchor="middle">1 SLOT</text>

  <rect x="40" y="70" width="200" height="160" rx="6" fill="#141E38" stroke="#5A90C0" stroke-width="2"/>
  <!-- Inner machinery -->
  <rect x="55" y="85" width="170" height="90" rx="4" fill="#0D1628" stroke="#2A4060" stroke-width="1"/>
  <!-- Conveyor belt representation -->
  <rect x="65" y="100" width="150" height="14" rx="2" fill="#0A1020" stroke="#3A6080" stroke-width="1"/>
  <rect x="68" y="102" width="22" height="10" rx="1" fill="#3A6080" opacity="0.6"/>
  <rect x="96" y="102" width="22" height="10" rx="1" fill="#3A6080" opacity="0.6"/>
  <rect x="124" y="102" width="22" height="10" rx="1" fill="#3A6080" opacity="0.6"/>
  <rect x="152" y="102" width="22" height="10" rx="1" fill="#3A6080" opacity="0.6"/>
  <rect x="180" y="102" width="22" height="10" rx="1" fill="#3A6080" opacity="0.6"/>
  <!-- Smelter furnace -->
  <ellipse cx="140" cy="148" rx="28" ry="22" fill="#1A1008" stroke="#C87820" stroke-width="2"/>
  <ellipse cx="140" cy="148" rx="18" ry="14" fill="#301808" stroke="#C87820" stroke-width="1"/>
  <ellipse cx="140" cy="148" rx="8" ry="6" fill="#D48030" opacity="0.8"/>
  <!-- Smoke vent -->
  <rect x="158" y="78" width="6" height="20" rx="2" fill="#3A4A5A" stroke="#5A7A8A" stroke-width="1"/>
  <ellipse cx="161" cy="76" rx="5" ry="3" fill="#4A5A6A" opacity="0.6"/>
  <ellipse cx="163" cy="72" rx="6" ry="4" fill="#4A5A6A" opacity="0.4"/>
  <ellipse cx="160" cy="67" rx="7" ry="5" fill="#4A5A6A" opacity="0.2"/>

  <!-- Building label -->
  <text x="140" y="198" fill="#5A90C0" font-family="monospace" font-size="11" text-anchor="middle" font-weight="bold">PROCESSING PLANT</text>
  <text x="140" y="213" fill="#8AACCB" font-family="monospace" font-size="9" text-anchor="middle">Ore Smelter</text>

  <!-- Status: RUNNING -->
  <rect x="60" y="220" width="160" height="16" rx="3" fill="#0A1A0A" stroke="#3A7A3A" stroke-width="1"/>
  <circle cx="72" cy="228" r="4" fill="#5ABD5A"/>
  <text x="82" y="232" fill="#7ABD7A" font-family="monospace" font-size="9">RUNNING  12 bars/min</text>

  <!-- Input label -->
  <text x="40" y="248" fill="#4A4A5A" font-family="monospace" font-size="8">IN: Vorax Ore →  Steel Bars</text>

  <!-- I/O arrows going right -->
  <!-- Steel Bars output -->
  <line x1="240" y1="148" x2="330" y2="148" stroke="#7ABCD4" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arw)"/>
  <text x="278" y="142" fill="#7ABCD4" font-family="monospace" font-size="8" text-anchor="middle">Steel Bars</text>
  <text x="278" y="158" fill="#4A6A7A" font-family="monospace" font-size="7" text-anchor="middle">12/min</text>

  <!-- Second Processing Plant — Alloy Refinery -->
  <rect x="60" y="310" width="50" height="16" rx="3" fill="#1A2A4A" stroke="#2A5080" stroke-width="1"/>
  <text x="85" y="322" fill="#5A90C0" font-family="monospace" font-size="9" text-anchor="middle">1 SLOT</text>

  <rect x="40" y="330" width="200" height="140" rx="6" fill="#141E38" stroke="#5A90C0" stroke-width="2"/>
  <rect x="55" y="345" width="170" height="80" rx="4" fill="#0D1628" stroke="#2A4060" stroke-width="1"/>
  <!-- Alloy refinery cylinders -->
  <ellipse cx="100" cy="385" rx="20" ry="26" fill="#0A1428" stroke="#7AA0B8" stroke-width="1.5"/>
  <ellipse cx="100" cy="372" rx="20" ry="6" fill="#1A2A3A" stroke="#7AA0B8" stroke-width="1"/>
  <rect x="80" y="372" width="40" height="26" fill="#0A1428" stroke="none"/>
  <ellipse cx="140" cy="385" rx="20" ry="26" fill="#0A1428" stroke="#7AA0B8" stroke-width="1.5"/>
  <ellipse cx="140" cy="372" rx="20" ry="6" fill="#1A2A3A" stroke="#7AA0B8" stroke-width="1"/>
  <rect x="120" y="372" width="40" height="26" fill="#0A1428" stroke="none"/>
  <!-- Pipe connecting them -->
  <rect x="118" y="383" width="24" height="4" fill="#5A8AA8"/>

  <text x="140" y="443" fill="#5A90C0" font-family="monospace" font-size="11" text-anchor="middle" font-weight="bold">PROCESSING PLANT</text>
  <text x="140" y="458" fill="#8AACCB" font-family="monospace" font-size="9" text-anchor="middle">Alloy Refinery</text>

  <rect x="60" y="464" width="160" height="16" rx="3" fill="#0A1A0A" stroke="#3A7A3A" stroke-width="1"/>
  <circle cx="72" cy="472" r="4" fill="#5ABD5A"/>
  <text x="82" y="476" fill="#7ABD7A" font-family="monospace" font-size="9">RUNNING  6 rods/min</text>

  <!-- Alloy Rods output arrow -->
  <line x1="240" y1="400" x2="330" y2="300" stroke="#7ABCD4" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arw)"/>
  <text x="300" y="345" fill="#7ABCD4" font-family="monospace" font-size="8">Alloy Rods</text>
  <text x="300" y="357" fill="#4A6A7A" font-family="monospace" font-size="7">6/min</text>

  <!-- ═══════════════ FABRICATOR (2 slots, center) ═══════════════ -->
  <rect x="360" y="50" width="50" height="16" rx="3" fill="#2A1A4A" stroke="#6040A0" stroke-width="1"/>
  <text x="385" y="62" fill="#9070D0" font-family="monospace" font-size="9" text-anchor="middle">2 SLOTS</text>

  <!-- RUNNING Fabricator -->
  <rect x="330" y="70" width="220" height="200" rx="6" fill="#1A142A" stroke="#9070D0" stroke-width="2"/>
  <!-- Teal energy conduits -->
  <line x1="350" y1="90" x2="530" y2="90" stroke="#40C0C0" stroke-width="1.5" opacity="0.5"/>
  <line x1="350" y1="260" x2="530" y2="260" stroke="#40C0C0" stroke-width="1.5" opacity="0.5"/>
  <line x1="350" y1="90" x2="350" y2="260" stroke="#40C0C0" stroke-width="1.5" opacity="0.5"/>
  <line x1="530" y1="90" x2="530" y2="260" stroke="#40C0C0" stroke-width="1.5" opacity="0.5"/>
  <!-- Assembly arm -->
  <rect x="370" y="110" width="180" height="120" rx="4" fill="#0F0A20" stroke="#3A2A60" stroke-width="1"/>
  <line x1="460" y1="115" x2="460" y2="225" stroke="#40C0C0" stroke-width="1" opacity="0.4"/>
  <!-- Rotating arm -->
  <line x1="420" y1="170" x2="500" y2="170" stroke="#7060C0" stroke-width="3" stroke-linecap="round"/>
  <circle cx="460" cy="170" r="10" fill="#1A1030" stroke="#9070D0" stroke-width="2"/>
  <circle cx="460" cy="170" r="4" fill="#9070D0" opacity="0.8"/>
  <!-- Component on track -->
  <rect x="480" y="158" width="18" height="18" rx="3" fill="#3A2A5A" stroke="#C0A040" stroke-width="1.5"/>
  <text x="489" y="170" fill="#C0A040" font-family="monospace" font-size="7" text-anchor="middle">DH</text>
  <!-- Energy pulse dots -->
  <circle cx="355" cy="120" r="3" fill="#40C0C0" opacity="0.8"/>
  <circle cx="355" cy="140" r="3" fill="#40C0C0" opacity="0.5"/>
  <circle cx="355" cy="160" r="3" fill="#40C0C0" opacity="0.3"/>

  <text x="440" y="248" fill="#9070D0" font-family="monospace" font-size="11" text-anchor="middle" font-weight="bold">FABRICATOR</text>
  <text x="440" y="262" fill="#B090E0" font-family="monospace" font-size="9" text-anchor="middle">Drill Head recipe</text>

  <rect x="350" y="275" width="200" height="16" rx="3" fill="#0A0A1A" stroke="#4A3A8A" stroke-width="1"/>
  <circle cx="363" cy="283" r="4" fill="#5ABD5A"/>
  <text x="373" y="287" fill="#7ABD7A" font-family="monospace" font-size="9">RUNNING  3 heads/hr</text>

  <!-- STALLED Fabricator (second, below) -->
  <rect x="360" y="310" width="50" height="16" rx="3" fill="#3A1A1A" stroke="#A04040" stroke-width="1"/>
  <text x="385" y="322" fill="#C06060" font-family="monospace" font-size="9" text-anchor="middle">2 SLOTS</text>

  <rect x="330" y="330" width="220" height="160" rx="6" fill="#1A0A0A" stroke="#A04040" stroke-width="2"/>
  <!-- Red stall overlay hint -->
  <rect x="330" y="330" width="220" height="160" rx="6" fill="#400000" opacity="0.15"/>
  <!-- Dim machinery -->
  <rect x="370" y="355" width="180" height="100" rx="4" fill="#0A0408" stroke="#3A1A1A" stroke-width="1"/>
  <line x1="420" y1="405" x2="500" y2="405" stroke="#4A3030" stroke-width="3" stroke-linecap="round"/>
  <circle cx="460" cy="405" r="10" fill="#0A0408" stroke="#5A2020" stroke-width="2"/>
  <circle cx="460" cy="405" r="4" fill="#5A2020" opacity="0.5"/>

  <text x="440" y="448" fill="#C06060" font-family="monospace" font-size="11" text-anchor="middle" font-weight="bold">FABRICATOR</text>
  <text x="440" y="462" fill="#A04040" font-family="monospace" font-size="9" text-anchor="middle">Sensor Array recipe</text>

  <!-- Stall badge -->
  <rect x="370" y="470" width="140" height="20" rx="3" fill="#3A0808" stroke="#A04040" stroke-width="1.5"/>
  <text x="415" y="484" fill="#E06060" font-family="monospace" font-size="9" text-anchor="middle">⚠ STALLED — NO INPUT</text>
  <text x="440" y="502" fill="#4A4A5A" font-family="monospace" font-size="8" text-anchor="middle">Crystal Lattice depleted</text>

  <!-- Drone carrying goods between Fabricator and Assembly Complex -->
  <!-- Drone body -->
  <g transform="translate(596,220)">
    <polygon points="0,-8 -5,6 5,6" fill="#E8C87A" opacity="0.95"/>
    <ellipse cx="0" cy="8" rx="4" ry="2.5" fill="#E8C87A" opacity="0.5"/>
    <!-- Held item -->
    <rect x="-6" y="6" width="12" height="8" rx="2" fill="#3A2A5A" stroke="#C0A040" stroke-width="1"/>
    <text x="0" y="13" fill="#C0A040" font-family="monospace" font-size="5" text-anchor="middle">DH</text>
    <!-- Trail -->
    <line x1="-3" y1="9" x2="-20" y2="15" stroke="#E8C87A" stroke-width="1" opacity="0.3"/>
    <line x1="-3" y1="9" x2="-35" y2="20" stroke="#E8C87A" stroke-width="0.8" opacity="0.15"/>
  </g>

  <!-- Arrow from Fabricator to Assembly Complex -->
  <line x1="555" y1="240" x2="640" y2="240" stroke="#7ABD7A" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arwG)"/>
  <text x="597" y="234" fill="#7ABD7A" font-family="monospace" font-size="8" text-anchor="middle">Drill Heads</text>
  <text x="597" y="258" fill="#4A6A4A" font-family="monospace" font-size="7" text-anchor="middle">drone carry</text>

  <!-- ═══════════════ ASSEMBLY COMPLEX (3 slots, right) ═══════════════ -->
  <rect x="690" y="50" width="50" height="16" rx="3" fill="#2A1A10" stroke="#C07828" stroke-width="1"/>
  <text x="715" y="62" fill="#E08830" font-family="monospace" font-size="9" text-anchor="middle">3 SLOTS</text>

  <rect x="650" y="70" width="270" height="280" rx="6" fill="#1A1208" stroke="#C07828" stroke-width="2.5"/>
  <!-- Large imposing structure -->
  <rect x="670" y="90" width="230" height="200" rx="4" fill="#0E0A04" stroke="#4A3010" stroke-width="1"/>
  <!-- Arc welder glow -->
  <ellipse cx="785" cy="170" rx="50" ry="40" fill="#301808" opacity="0.6"/>
  <ellipse cx="785" cy="170" rx="30" ry="24" fill="#502008" opacity="0.7"/>
  <!-- Welder arms -->
  <line x1="730" y1="120" x2="760" y2="155" stroke="#C07828" stroke-width="3" stroke-linecap="round"/>
  <line x1="840" y1="120" x2="810" y2="155" stroke="#C07828" stroke-width="3" stroke-linecap="round"/>
  <!-- Arc flash -->
  <circle cx="785" cy="162" r="8" fill="#FFD060" opacity="0.9"/>
  <circle cx="785" cy="162" r="4" fill="#FFFFFF" opacity="0.8"/>
  <!-- Spark lines -->
  <line x1="785" y1="154" x2="793" y2="145" stroke="#FFD060" stroke-width="1" opacity="0.7"/>
  <line x1="785" y1="154" x2="777" y2="146" stroke="#FFD060" stroke-width="1" opacity="0.7"/>
  <line x1="793" y1="160" x2="804" y2="155" stroke="#FFD060" stroke-width="1" opacity="0.5"/>
  <line x1="777" y1="160" x2="766" y2="155" stroke="#FFD060" stroke-width="1" opacity="0.5"/>
  <!-- Component track -->
  <rect x="680" y="200" width="210" height="12" rx="2" fill="#0A0804" stroke="#3A2808" stroke-width="1"/>
  <rect x="690" y="203" width="30" height="6" rx="1" fill="#3A2808" opacity="0.8"/>
  <rect x="730" y="203" width="30" height="6" rx="1" fill="#3A2808" opacity="0.8"/>
  <rect x="770" y="203" width="30" height="6" rx="1" fill="#3A2808" opacity="0.8"/>
  <!-- Output component forming -->
  <rect x="818" y="199" width="26" height="14" rx="3" fill="#1A1208" stroke="#E08830" stroke-width="1.5"/>
  <text x="831" y="209" fill="#E08830" font-family="monospace" font-size="7" text-anchor="middle">RE</text>

  <text x="785" y="308" fill="#C07828" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">ASSEMBLY COMPLEX</text>
  <text x="785" y="326" fill="#E0A050" font-family="monospace" font-size="9" text-anchor="middle">Rocket Engine recipe</text>

  <rect x="680" y="338" width="210" height="16" rx="3" fill="#0A0804" stroke="#6A4010" stroke-width="1"/>
  <circle cx="694" cy="346" r="4" fill="#5ABD5A"/>
  <text x="704" y="350" fill="#7ABD7A" font-family="monospace" font-size="9">RUNNING  1 engine/45 min</text>

  <!-- Inputs to Assembly Complex: Combustion Housing, Fuel Injector, Refined Alloy -->
  <text x="660" y="410" fill="#4A4A5A" font-family="monospace" font-size="8">INPUTS REQUIRED:</text>
  <text x="660" y="424" fill="#C8C8D8" font-family="monospace" font-size="8">• Combustion Housing (Fabricator)</text>
  <text x="660" y="438" fill="#C8C8D8" font-family="monospace" font-size="8">• Fuel Injector (Fabricator)</text>
  <text x="660" y="452" fill="#C8C8D8" font-family="monospace" font-size="8">• Refined Alloy (Processing Plant)</text>

  <!-- Proximity bonus badge -->
  <rect x="660" y="464" width="250" height="18" rx="3" fill="#0A1A0A" stroke="#3A6A3A" stroke-width="1"/>
  <text x="785" y="477" fill="#7ABD7A" font-family="monospace" font-size="8" text-anchor="middle">★ PROXIMITY BONUS ACTIVE +10% throughput</text>

  <!-- ═══ LEGEND / INFO PANEL ═══ -->
  <rect x="20" y="470" width="290" height="70" rx="4" fill="#0E1628" stroke="#2A4060" stroke-width="1"/>
  <text x="30" y="486" fill="#E8C87A" font-family="monospace" font-size="9" font-weight="bold">INDUSTRIAL SITE SLOTS USED</text>
  <text x="30" y="502" fill="#5A90C0" font-family="monospace" font-size="9">● Processing Plant ×2 = 2 slots</text>
  <text x="30" y="516" fill="#9070D0" font-family="monospace" font-size="9">● Fabricator ×2 = 4 slots</text>
  <text x="30" y="530" fill="#C07828" font-family="monospace" font-size="9">● Assembly Complex ×1 = 3 slots   TOTAL: 9 / 14</text>

  <!-- Status legend -->
  <rect x="320" y="470" width="220" height="70" rx="4" fill="#0E1628" stroke="#2A4060" stroke-width="1"/>
  <text x="330" y="486" fill="#E8C87A" font-family="monospace" font-size="9" font-weight="bold">STATUS LEGEND</text>
  <circle cx="340" cy="502" r="4" fill="#5ABD5A"/>
  <text x="350" y="506" fill="#7ABD7A" font-family="monospace" font-size="9">Running at full rate</text>
  <circle cx="340" cy="518" r="4" fill="#D46060"/>
  <text x="350" y="522" fill="#D46060" font-family="monospace" font-size="9">Stalled — input depleted</text>
  <circle cx="340" cy="534" r="4" fill="#E8C87A"/>
  <text x="350" y="538" fill="#E8C87A" font-family="monospace" font-size="9">Drone in transit</text>

  <!-- Quality flow callout -->
  <rect x="550" y="470" width="390" height="70" rx="4" fill="#0E1628" stroke="#2A4060" stroke-width="1"/>
  <text x="560" y="486" fill="#E8C87A" font-family="monospace" font-size="9" font-weight="bold">QUALITY FLOW EXAMPLE</text>
  <text x="560" y="502" fill="#4A6A4A" font-family="monospace" font-size="8">Krysite deposit  UT:880 →  Alloy Refinery  →  Alloy Rods (UT:880)</text>
  <text x="560" y="516" fill="#7ABCD4" font-family="monospace" font-size="8">Drill Head Fab:  UT×60% + MA×25% + OQ×15%  →  DH output</text>
  <text x="560" y="530" fill="#9070D0" font-family="monospace" font-size="8">UT:880 → mine_speed_bonus: +35%   vs  UT:400 → +14%</text>
  <text x="560" y="544" fill="#4A4A5A" font-family="monospace" font-size="8">Route high-UT ore deliberately — don't mix into general storage</text>
</svg>

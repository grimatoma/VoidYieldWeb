<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" shape-rendering="crispEdges" font-family="monospace">
  <rect width="960" height="540" fill="#1a1a1d"/>
  <text x="40" y="270" fill="#4a4a50" font-size="24">(world dimmed — player at cargo dock)</text>

  <g transform="translate(220,40)">
    <rect width="520" height="460" fill="#2a2a2e" stroke="#4a4a50" stroke-width="2"/>
    <g fill="#d4a843">
      <rect x="4" y="4" width="3" height="3"/>
      <rect x="513" y="4" width="3" height="3"/>
      <rect x="4" y="453" width="3" height="3"/>
      <rect x="513" y="453" width="3" height="3"/>
    </g>
    <rect x="0" y="0" width="520" height="36" fill="#15151a"/>
    <text x="12" y="24" fill="#d4a843" font-size="14" font-weight="bold">CARGO DOCK — ROUTES</text>
    <g transform="translate(492,10)">
      <rect width="18" height="18" fill="#2a2a2e" stroke="#8b3a2a"/>
      <text x="4" y="14" fill="#8b3a2a" font-size="12">X</text>
    </g>

    <!-- ACTIVE ROUTES list -->
    <text x="14" y="56" fill="#a88a4a" font-size="10">ACTIVE ROUTES (2)</text>

    <g transform="translate(14,66)">
      <rect width="492" height="44" fill="#1a1a1d" stroke="#4a4a50"/>
      <!-- from -->
      <circle cx="22" cy="22" r="10" fill="#3a2a1e"/>
      <text x="36" y="18" fill="#d4a843" font-size="10" font-weight="bold">A1</text>
      <!-- arrow -->
      <rect x="54" y="21" width="24" height="2" fill="#d4a843"/>
      <polygon points="78,18 84,22 78,26" fill="#d4a843"/>
      <!-- to -->
      <circle cx="100" cy="22" r="10" fill="#2a3a4a"/>
      <text x="114" y="18" fill="#d4a843" font-size="10" font-weight="bold">A2</text>
      <!-- resource -->
      <rect x="140" y="14" width="12" height="12" fill="#8b5a2a"/>
      <text x="156" y="24" fill="#d4a843" font-size="10">ORE ×50</text>
      <!-- interval -->
      <text x="234" y="24" fill="#a88a4a" font-size="9">EVERY 120s</text>
      <!-- status -->
      <rect x="322" y="12" width="80" height="20" fill="#2a2a2e" stroke="#7cb87c"/>
      <text x="338" y="26" fill="#7cb87c" font-size="10">RUNNING</text>
      <!-- edit/delete -->
      <g transform="translate(410,12)">
        <rect width="32" height="20" fill="#2a2a2e" stroke="#4a4a50"/>
        <text x="4" y="14" fill="#d4a843" font-size="9">EDIT</text>
      </g>
      <g transform="translate(446,12)">
        <rect width="40" height="20" fill="#2a2a2e" stroke="#8b3a2a"/>
        <text x="5" y="14" fill="#8b3a2a" font-size="9">DELETE</text>
      </g>
    </g>

    <g transform="translate(14,116)">
      <rect width="492" height="44" fill="#1a1a1d" stroke="#4a4a50"/>
      <circle cx="22" cy="22" r="10" fill="#2a3a4a"/>
      <text x="36" y="18" fill="#d4a843" font-size="10" font-weight="bold">A2</text>
      <rect x="54" y="21" width="24" height="2" fill="#d4a843"/>
      <polygon points="78,18 84,22 78,26" fill="#d4a843"/>
      <circle cx="100" cy="22" r="10" fill="#3a2a1e"/>
      <text x="114" y="18" fill="#d4a843" font-size="10" font-weight="bold">A1</text>
      <polygon points="142,28 148,16 154,28 148,32" fill="#5a8fa8"/>
      <text x="160" y="24" fill="#d4a843" font-size="10">CRYSTAL ×10</text>
      <text x="258" y="24" fill="#a88a4a" font-size="9">EVERY 180s</text>
      <rect x="322" y="12" width="80" height="20" fill="#2a2a2e" stroke="#4a4a50"/>
      <text x="342" y="26" fill="#a88a4a" font-size="10">PAUSED</text>
      <g transform="translate(410,12)">
        <rect width="32" height="20" fill="#2a2a2e" stroke="#4a4a50"/>
        <text x="4" y="14" fill="#d4a843" font-size="9">EDIT</text>
      </g>
      <g transform="translate(446,12)">
        <rect width="40" height="20" fill="#2a2a2e" stroke="#8b3a2a"/>
        <text x="5" y="14" fill="#8b3a2a" font-size="9">DELETE</text>
      </g>
    </g>

    <!-- NEW ROUTE button -->
    <g transform="translate(14,170)">
      <rect width="492" height="28" fill="#2a2a2e" stroke="#d4a843" stroke-dasharray="4,2"/>
      <text x="204" y="18" fill="#d4a843" font-size="11" font-weight="bold">+ NEW ROUTE</text>
    </g>

    <!-- divider -->
    <rect x="14" y="214" width="492" height="2" fill="#4a4a50"/>
    <text x="14" y="232" fill="#a88a4a" font-size="10">EDIT ROUTE (NEW)</text>

    <!-- FROM / TO dropdowns -->
    <g transform="translate(14,244)">
      <text x="0" y="14" fill="#a88a4a" font-size="9">FROM</text>
      <rect x="46" y="2" width="120" height="18" fill="#15151a" stroke="#4a4a50"/>
      <text x="54" y="14" fill="#d4a843" font-size="10">A1 · IRON ROCK</text>
      <polygon points="154,6 162,6 158,14" fill="#d4a843"/>

      <text x="178" y="14" fill="#a88a4a" font-size="9">TO</text>
      <rect x="202" y="2" width="140" height="18" fill="#15151a" stroke="#4a4a50"/>
      <text x="210" y="14" fill="#d4a843" font-size="10">A2 · CRYSTAL DRIFT</text>
      <polygon points="330,6 338,6 334,14" fill="#d4a843"/>
    </g>

    <!-- RESOURCE -->
    <g transform="translate(14,276)">
      <text x="0" y="14" fill="#a88a4a" font-size="9">RESOURCE</text>
      <rect x="70" y="2" width="140" height="18" fill="#15151a" stroke="#4a4a50"/>
      <rect x="76" y="6" width="10" height="10" fill="#8b5a2a"/>
      <text x="92" y="14" fill="#d4a843" font-size="10">ORE</text>
      <polygon points="198,6 206,6 202,14" fill="#d4a843"/>
    </g>

    <!-- AMOUNT -->
    <g transform="translate(14,304)">
      <text x="0" y="14" fill="#a88a4a" font-size="9">AMOUNT</text>
      <rect x="70" y="2" width="22" height="18" fill="#2a2a2e" stroke="#4a4a50"/>
      <text x="80" y="14" fill="#d4a843" font-size="11">-</text>
      <rect x="94" y="2" width="60" height="18" fill="#15151a" stroke="#4a4a50"/>
      <text x="112" y="14" fill="#d4a843" font-size="11" font-weight="bold">050</text>
      <rect x="156" y="2" width="22" height="18" fill="#2a2a2e" stroke="#4a4a50"/>
      <text x="164" y="14" fill="#d4a843" font-size="11">+</text>
      <text x="188" y="14" fill="#a88a4a" font-size="9">PER SHIPMENT</text>
    </g>

    <!-- INTERVAL -->
    <g transform="translate(14,332)">
      <text x="0" y="14" fill="#a88a4a" font-size="9">INTERVAL</text>
      <rect x="70" y="2" width="22" height="18" fill="#2a2a2e" stroke="#4a4a50"/>
      <text x="80" y="14" fill="#d4a843" font-size="11">-</text>
      <rect x="94" y="2" width="60" height="18" fill="#15151a" stroke="#4a4a50"/>
      <text x="106" y="14" fill="#d4a843" font-size="11" font-weight="bold">120s</text>
      <rect x="156" y="2" width="22" height="18" fill="#2a2a2e" stroke="#4a4a50"/>
      <text x="164" y="14" fill="#d4a843" font-size="11">+</text>
      <text x="188" y="14" fill="#a88a4a" font-size="9">BETWEEN SHIPMENTS</text>
    </g>

    <!-- rate summary -->
    <g transform="translate(14,362)">
      <rect width="492" height="26" fill="#15151a" stroke="#4a4a50"/>
      <text x="10" y="17" fill="#a88a4a" font-size="9">EFFECTIVE RATE:</text>
      <text x="120" y="17" fill="#7cb87c" font-size="11" font-weight="bold">25 ORE / MINUTE</text>
      <text x="280" y="17" fill="#a88a4a" font-size="9">REQUIRES 1 CARGO DRONE</text>
    </g>

    <!-- SAVE/CANCEL -->
    <g transform="translate(14,404)">
      <rect width="160" height="36" fill="#2a2a2e" stroke="#7cb87c" stroke-width="2"/>
      <text x="64" y="23" fill="#7cb87c" font-size="12" font-weight="bold">SAVE</text>
    </g>
    <g transform="translate(184,404)">
      <rect width="160" height="36" fill="#2a2a2e" stroke="#4a4a50"/>
      <text x="60" y="23" fill="#d4a843" font-size="12">CANCEL</text>
    </g>
    <g transform="translate(354,404)">
      <rect width="152" height="36" fill="#2a2a2e" stroke="#8b3a2a"/>
      <text x="52" y="23" fill="#8b3a2a" font-size="12">DELETE</text>
    </g>
  </g>

  <g>
    <rect x="0" y="516" width="960" height="24" fill="#1a1a1d"/>
    <text x="8" y="532" fill="#a88a4a" font-size="10">11 — CARGO DOCK / ROUTE CONFIGURATOR</text>
  </g>
</svg>
